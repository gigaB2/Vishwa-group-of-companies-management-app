    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- Debugging & Error Handling ---
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.padding = '20px';
            errorDiv.style.background = '#fee2e2';
            errorDiv.style.color = '#991b1b';
            errorDiv.style.border = '2px solid #ef4444';
            errorDiv.style.margin = '20px';
            errorDiv.style.borderRadius = '8px';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = `<h3>⚠️ Application Error</h3><p>${message}</p><small>at ${source}:${lineno}:${colno}</small>`;
            document.body.prepend(errorDiv);
            return false;
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px', textAlign: 'center' }}>
                            <h2 style={{ color: '#ef4444' }}>Something went wrong.</h2>
                            <p style={{ color: '#666', margin: '10px 0' }}>{this.state.error?.message}</p>
                            <button className="btn btn-primary" onClick={() => window.location.reload()}>Reload Page</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Custom Hook for LocalStorage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    if (!item) return window.localStorage.getItem('vishwa_fashions_factory_reset_active') === 'true' && Array.isArray(initialValue) ? [] : initialValue;
                    let parsed = JSON.parse(item);
                    if (window.localStorage.getItem('vishwa_fashions_factory_reset_active') !== 'true') {
                        if (Array.isArray(parsed) && parsed.length === 0 && Array.isArray(initialValue) && initialValue.length > 0) {
                            return initialValue;
                        }
                    }
                    if (key === 'warp-beams' && Array.isArray(parsed)) {
                        parsed = parsed.map(b => {
                            if (b.machineNumber && b.status === 'Available') {
                                return { ...b, status: 'On Loom' };
                            }
                            return b;
                        });
                    }
                    return (parsed !== null && parsed !== undefined) ? parsed : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === key) {
                        try {
                            const item = window.localStorage.getItem(key);
                            let newValue = item ? JSON.parse(item) : initialValue;
                            if (key === 'warp-beams' && Array.isArray(newValue)) {
                                newValue = newValue.map(b => {
                                    if (b.machineNumber && b.status === 'Available') {
                                        return { ...b, status: 'On Loom' };
                                    }
                                    return b;
                                });
                            }
                            setStoredValue(newValue);
                        } catch (error) {
                            console.error('Error parsing storage change:', error);
                        }
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [key, initialValue]);

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;

            const now = new Date();
            const pad = (num) => String(num).padStart(2, '0');
            const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${String(now.getMilliseconds()).padStart(3, '0')}`;
            return `${dateStr}T${timeStr}`;

            const parts = dateOnly.split(/[-/]/);

            if (parts[0].length === 4) {

                return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateOnly;

            const month = date.getMonth();
            if (month >= 3) {

            } else {

            // --- Undo Functionality ---
            const [undoStack, setUndoStack] = useState([]);

            const pushToUndo = () => {

            const undo = () => {
                if (undoStack.length === 0) return;
                const lastSnapshot = undoStack[undoStack.length - 1];
                const { beams: prevBeams, issues: prevIssues, beamLoadings: prevBeamLoadings } = JSON.parse(lastSnapshot);
                
                setBeams(prevBeams);
                setIssues(prevIssues);
                if (prevBeamLoadings) setBeamLoadings(prevBeamLoadings);
                setUndoStack(prev => prev.slice(0, -1));
                console.log("Undo performed");
            };

            const getPissingDetails = (beam) => {
                if (!beam) return { date: '—', person: '—' };
                const hist = beam.history || [];
                let lastLoad = null;
                for (let i = hist.length - 1; i >= 0; i--) {
                    const e = (hist[i].event || '').toLowerCase();
                    if (e.includes('loaded on') || e.includes('pissing on') || e.includes('piecing on') || e.includes('jala piecing')) {
                        lastLoad = hist[i];
                        break;
                    }
                }
                if (!lastLoad) return { date: '—', person: '—' };
                let person = '—';
                if (lastLoad.event) {
                    const eventText = lastLoad.event;
                    if (/jala piecing by/i.test(eventText)) {
                        const match = eventText.match(/Jala Piecing by (.+?) on (?:Machine\s+)?(.+)$/i);
                        if (match && match[1]) person = match[1].trim();
                    } else {
                        const match = eventText.match(/(?:Loaded on|Pissing on|Jala Piecing on) (?:Machine\s+)?(.+?)(?:\s+by\s+(.+))?$/i);
                        if (match && match[2]) person = match[2].trim();
                    }
                }
                return { date: lastLoad.date, person };
            };

            const getBeamTimeline = (beam) => {
                if (!beam) return [];
                
                const beamLogs = productionLogs.filter(l => l.beamNumber === beam.beamNumber);
                const hasAnyProduction = beamLogs.length > 0;

                // 1. Get beam loading events from Beam Loading module
                const loadingEvents = (beamLoadings || [])
                    .filter(bl => bl.beamNumber === beam.beamNumber)
                    .map(bl => {
                        let roleLabel = '';
                        let workerName = '';
                        if (bl.piecein) { roleLabel = 'Piece In'; workerName = bl.piecein; }
                        else if (bl.drawingIn) { roleLabel = 'Drawing In'; workerName = bl.drawingIn; }
                        else if (bl.fani) { roleLabel = 'Fani (Reed)'; workerName = bl.fani; }
                        else if (bl.dropPinJog) { roleLabel = 'Drop pin/Jog'; workerName = bl.dropPinJog; }

                        return {
                            date: bl.date,
                            event: `${roleLabel} by ${workerName} on Machine ${bl.machineNumber}`,
                            type: 'beam-loading',
                            category: 'derived'
                        };
                    });

                // 2. Start with system history combined with loading events
                let baseTimeline = [
                    ...((beam.history || [])
                        .map((h, idx) => ({ ...h, historyIndex: idx, category: 'history', type: h.type || 'system' }))
                        .filter(h => {
                            const e = (h.event || '').toLowerCase();
                            if (e.includes('sync from production sheet')) return false;
                            if (e.includes('was removed') || e.includes('returned to available')) return false;
                            return true;
                        })
                        .filter(h => {
                            const e = (h.event || '').toLowerCase();
                            if (e.includes('pissing') || e.includes('piecing')) return true;
                            if (e.includes('unloaded')) return hasAnyProduction;
                            if (!hasAnyProduction && e.includes('machine')) return false;
                            return true;
                        })
                        .map(h => {
                            let event = h.event;
                            if (event === 'Beam Created' || event === 'Beam manufactured') {
                                event = `Beam manufactured by ${beam.warpingPerson || 'Unknown'}`;
                            }
                            return { ...h, event };
                        })),
                    ...loadingEvents
                ];

                // Sort baseTimeline chronologically
                baseTimeline.sort((a, b) => a.date.localeCompare(b.date));

                // Helper to extract machine object from event text
                const getMachineFromEvent = (eventStr) => {
                    if (!eventStr) return null;
                    const lower = eventStr.toLowerCase();
                    const sortedMachines = [...machines].sort((a, b) => b.name.length - a.name.length);
                    for (const m of sortedMachines) {
                        const mNameEscaped = m.name.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                        const regex1 = new RegExp(`(?:machine|no\\.?|on|from|completed on|unloaded from)\\s*(?:machine\\s+)?\\b${mNameEscaped}\\b`, 'i');
                        const regex2 = new RegExp(`\\b${mNameEscaped}\\b`, 'i');
                        if (regex1.test(lower) || regex2.test(lower)) {
                            return m;
                        }
                    }
                    return null;
                };

                // 2. Identify all cycles (loading events) in base history
                const cycles = [];
                baseTimeline.forEach((item) => {
                    const eventText = (item.event || '').toLowerCase();
                    if (eventText.includes('pissing on') || eventText.includes('jala piecing') || eventText.includes('loaded on')) {
                        const mach = getMachineFromEvent(item.event);
                        if (mach) {
                            cycles.push({
                                machine: mach,
                                startEvent: item,
                                startDate: item.date,
                                endDate: null,
                                logs: []
                            });
                        }
                    }
                });

                // Define start and end date ranges for each cycle
                cycles.forEach((cycle) => {
                    let foundEnd = false;
                    const startIndex = baseTimeline.indexOf(cycle.startEvent);
                    
                    for (let j = startIndex + 1; j < baseTimeline.length; j++) {
                        const nextItem = baseTimeline[j];
                        const nextEventText = (nextItem.event || '').toLowerCase();
                        const isUnload = nextEventText.includes('unloaded') || nextEventText.includes('completed') || nextEventText.includes('removed');
                        const itemMach = getMachineFromEvent(nextItem.event);
                        
                        if (isUnload && itemMach && (itemMach.id === cycle.machine.id || itemMach.name === cycle.machine.name)) {
                            cycle.endDate = nextItem.date;
                            foundEnd = true;
                            break;
                        }
                        
                        if (nextEventText.includes('pissing on') || nextEventText.includes('jala piecing') || nextEventText.includes('loaded on')) {
                            cycle.endDate = nextItem.date;
                            foundEnd = true;
                            break;
                        }
                    }
                    
                    if (!foundEnd) {
                        cycle.endDate = '9999-12-31';
                    }
                });

                // Distribute production logs to cycles
                beamLogs.forEach(log => {
                    let bestCycle = null;
                    cycles.forEach(cycle => {
                        if (log.machineNumber == cycle.machine.id || log.machineNumber == cycle.machine.name) {
                            if (log.productionDate >= cycle.startDate && log.productionDate <= cycle.endDate) {
                                if (!bestCycle || cycle.startDate > bestCycle.startDate) {
                                    bestCycle = cycle;
                                }
                            }
                        }
                    });
                    
                    if (bestCycle) {
                        bestCycle.logs.push({
                            productionDate: log.productionDate,
                            foldingDate: log.foldingDate,
                            takaSerial: log.takaSerial || 'Pending',
                            meters: parseFloat(log.totalMeters) || 0,
                            weight: parseFloat(log.takaWeight) || 0
                        });
                    } else if (cycles.length > 0) {
                        const sameMachineCycles = cycles.filter(c => log.machineNumber == c.machine.id || log.machineNumber == c.machine.name);
                        if (sameMachineCycles.length > 0) {
                            sameMachineCycles[sameMachineCycles.length - 1].logs.push({
                                productionDate: log.productionDate,
                                foldingDate: log.foldingDate,
                                takaSerial: log.takaSerial || 'Pending',
                                meters: parseFloat(log.totalMeters) || 0,
                                weight: parseFloat(log.takaWeight) || 0
                            });
                        }
                    }
                });

                // Build final timeline strictly preserving cycle history order
                const finalTimeline = [];

                // Add pre-cycle events (e.g. Beam manufactured)
                const firstCycleIdx = cycles.length > 0 ? baseTimeline.indexOf(cycles[0].startEvent) : baseTimeline.length;
                for (let i = 0; i < firstCycleIdx; i++) {
                    finalTimeline.push(baseTimeline[i]);
                }

                // Append each cycle's Pissing -> Production Details -> Unload in exact sequence
                cycles.forEach(cycle => {
                    finalTimeline.push(cycle.startEvent);

                    if (cycle.logs.length > 0) {
                        cycle.logs.sort((a, b) => a.productionDate.localeCompare(b.productionDate));
                        const mDisp = cycle.machine.name.toString().toLowerCase().includes('machine') ? cycle.machine.name : `Machine No. ${cycle.machine.name}`;
                        const subTotalMeters = cycle.logs.reduce((acc, l) => acc + l.meters, 0);
                        const uniqueTakas = {};
                        cycle.logs.forEach(l => {
                            if (l.takaSerial && l.takaSerial !== 'Pending') {
                                uniqueTakas[l.takaSerial] = l.weight;
                            }
                        });
                        const subTotalWeight = Object.values(uniqueTakas).reduce((acc, w) => acc + w, 0);
                        const prodDate = cycle.logs[0].productionDate;

                        finalTimeline.push({
                            date: prodDate,
                            event: `Production Details for ${mDisp}`,
                            type: 'production',
                            category: 'derived',
                            details: {
                                machineNumber: cycle.machine.name,
                                logs: cycle.logs,
                                subTotalMeters,
                                subTotalWeight
                            }
                        });
                    }

                    // Find unload/completion events between this cycle's start and the next cycle's start
                    const startPos = baseTimeline.indexOf(cycle.startEvent);
                    const nextCyclePos = cycles.indexOf(cycle) + 1 < cycles.length ? baseTimeline.indexOf(cycles[cycles.indexOf(cycle) + 1].startEvent) : baseTimeline.length;
                    for (let i = startPos + 1; i < nextCyclePos; i++) {
                        if (!finalTimeline.includes(baseTimeline[i])) {
                            finalTimeline.push(baseTimeline[i]);
                        }
                    }
                });

                // Add any remaining trailing history items
                baseTimeline.forEach(item => {
                    if (!finalTimeline.includes(item)) {
                        finalTimeline.push(item);
                    }
                });

                return finalTimeline;
            };

            const getMachineTimelineData = (machine) => {
                if (!machine) return [];
                const machineEvents = [];
                const mNameEscaped = machine.name.toString().replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex1 = new RegExp('(?:machine|no\\.?|on|from|completed on|unloaded from)\\s*(?:machine\\s+)?\\b' + mNameEscaped + '\\b', 'i');
                const regex2 = new RegExp('\\b' + mNameEscaped + '\\b', 'i');
                
                const matchesMachine = (eventStr) => {
                    if (!eventStr) return false;
                    const lower = eventStr.toLowerCase();
                    return regex1.test(lower) || regex2.test(lower);
                };

                (machine.history || []).forEach(h => {
                    machineEvents.push({
                        date: h.date,
                        event: h.event,
                        type: h.type || 'machine',
                        beam: null,
                        beamNumber: null,
                        category: 'machine-config'
                    });
                });

                beams.forEach(beam => {
                    (beam.history || []).forEach(h => {
                        if (matchesMachine(h.event)) {
                            machineEvents.push({
                                date: h.date,
                                event: h.event,
                                type: h.type || 'system',
                                beam: beam,
                                beamNumber: beam.beamNumber,
                                category: 'history'
                            });
                        }
                    });
                });

                (beamLoadings || []).forEach(bl => {
                    if (String(bl.machineNumber).trim() === String(machine.id).trim() || String(bl.machineNumber).trim() === String(machine.name).trim()) {
                         let roleLabel = '';
                         let workerName = '';
                         if (bl.piecein) { roleLabel = 'Piece In'; workerName = bl.piecein; }
                         else if (bl.drawingIn) { roleLabel = 'Drawing In'; workerName = bl.drawingIn; }
                         else if (bl.fani) { roleLabel = 'Fani (Reed)'; workerName = bl.fani; }
                         else if (bl.dropPinJog) { roleLabel = 'Drop pin/Jog'; workerName = bl.dropPinJog; }
                         
                         const beam = beams.find(b => b.beamNumber === bl.beamNumber);
                         machineEvents.push({
                             date: bl.date,
                             event: roleLabel + " by " + workerName,
                             type: 'beam-loading',
                             beam: beam,
                             beamNumber: bl.beamNumber,
                             category: 'derived'
                         });
                    }
                });

                machineEvents.sort((a, b) => a.date.localeCompare(b.date));

                const configEvents = machineEvents.filter(e => e.category === 'machine-config');
                const beamEvents = machineEvents.filter(e => e.category !== 'machine-config');

                const cycles = [];
                let currentCycle = null;

                beamEvents.forEach(item => {
                    const eventText = (item.event || '').toLowerCase();
                    const isLoad = eventText.includes('pissing') || eventText.includes('piecing') || eventText.includes('loaded') || item.type === 'beam-loading';
                    const isUnload = eventText.includes('unloaded') || eventText.includes('completed') || eventText.includes('removed');
                    
                    if (isLoad) {
                        if (!currentCycle || currentCycle.beamNumber !== item.beamNumber) {
                            if (currentCycle) {
                                currentCycle.endDate = item.date;
                            }
                            currentCycle = {
                                beam: item.beam,
                                beamNumber: item.beamNumber,
                                startDate: item.date,
                                endDate: null,
                                logs: [],
                                events: [item]
                            };
                            cycles.push(currentCycle);
                        } else {
                            currentCycle.events.push(item);
                        }
                    } else if (isUnload) {
                        if (currentCycle && currentCycle.beamNumber === item.beamNumber) {
                            currentCycle.endDate = item.date;
                            currentCycle.events.push(item);
                            currentCycle = null;
                        } else {
                            const openCycle = cycles.find(c => c.beamNumber === item.beamNumber && !c.endDate);
                            if (openCycle) {
                                openCycle.endDate = item.date;
                                openCycle.events.push(item);
                            } else {
                                cycles.push({
                                    beam: item.beam,
                                    beamNumber: item.beamNumber,
                                    startDate: item.date,
                                    endDate: item.date,
                                    logs: [],
                                    events: [item]
                                });
                            }
                        }
                    } else {
                        if (currentCycle) {
                            currentCycle.events.push(item);
                        } else {
                            const lastCycle = [...cycles].reverse().find(c => c.beamNumber === item.beamNumber);
                            if (lastCycle) {
                                lastCycle.events.push(item);
                            } else {
                                cycles.push({
                                    beam: item.beam,
                                    beamNumber: item.beamNumber,
                                    startDate: item.date,
                                    endDate: item.date,
                                    logs: [],
                                    events: [item]
                                });
                            }
                        }
                    }
                });

                cycles.forEach(c => {
                    if (!c.endDate) {
                        c.endDate = '9999-12-31';
                    }
                });

                const machineLogs = productionLogs.filter(log => 
                    String(log.machineNumber).trim() === String(machine.id).trim() || 
                    String(log.machineNumber).trim() === String(machine.name).trim()
                );

                machineLogs.forEach(log => {
                    let bestCycle = null;
                    cycles.forEach(cycle => {
                        if (cycle.beamNumber === log.beamNumber) {
                            if (log.productionDate >= cycle.startDate && log.productionDate <= cycle.endDate) {
                                if (!bestCycle || cycle.startDate > bestCycle.startDate) {
                                    bestCycle = cycle;
                                }
                            }
                        }
                    });
                    
                    if (bestCycle) {
                        bestCycle.logs.push({
                            productionDate: log.productionDate,
                            foldingDate: log.foldingDate,
                            takaSerial: log.takaSerial || 'Pending',
                            meters: parseFloat(log.totalMeters) || 0,
                            weight: parseFloat(log.takaWeight) || 0
                        });
                    } else {
                        const sameBeamCycles = cycles.filter(c => c.beamNumber === log.beamNumber);
                        if (sameBeamCycles.length > 0) {
                            sameBeamCycles[sameBeamCycles.length - 1].logs.push({
                                productionDate: log.productionDate,
                                foldingDate: log.foldingDate,
                                takaSerial: log.takaSerial || 'Pending',
                                meters: parseFloat(log.totalMeters || log.meters) || 0,
                                weight: parseFloat(log.takaWeight || log.weight) || 0
                            });
                        } else {
                            const beam = beams.find(b => b.beamNumber === log.beamNumber);
                            const newCycle = {
                                beam: beam,
                                beamNumber: log.beamNumber,
                                startDate: log.productionDate,
                                endDate: '9999-12-31',
                                logs: [{
                                    productionDate: log.productionDate,
                                    foldingDate: log.foldingDate,
                                    takaSerial: log.takaSerial || 'Pending',
                                    meters: parseFloat(log.totalMeters || log.meters) || 0,
                                    weight: parseFloat(log.takaWeight || log.weight) || 0
                                }],
                                events: [{
                                    date: log.productionDate,
                                    event: 'Production started',
                                    type: 'production',
                                    beamNumber: log.beamNumber,
                                    beam: beam,
                                    category: 'derived'
                                }]
                            };
                            cycles.push(newCycle);
                        }
                    }
                });

                const finalTimeline = [];
                cycles.sort((a, b) => a.startDate.localeCompare(b.startDate));

                cycles.forEach(cycle => {
                    cycle.events.sort((a, b) => a.date.localeCompare(b.date));
                    cycle.logs.sort((a, b) => a.productionDate.localeCompare(b.productionDate));
                    
                    const subTotalMeters = cycle.logs.reduce((acc, l) => acc + l.meters, 0);
                    const uniqueTakas = {};
                    cycle.logs.forEach(l => {
                        if (l.takaSerial && l.takaSerial !== 'Pending') {
                            uniqueTakas[l.takaSerial] = l.weight;
                        }
                    });
                    const subTotalWeight = Object.values(uniqueTakas).reduce((acc, w) => acc + w, 0);

                    finalTimeline.push({
                        date: cycle.startDate,
                        event: `Beam Cycle: Beam #${cycle.beamNumber}` + (cycle.beam ? ` (${cycle.beam.quality} | ${cycle.beam.code} / ${cycle.beam.color})` : ''),
                        type: 'beam-cycle',
                        category: 'derived',
                        details: {
                            beamNumber: cycle.beamNumber,
                            beam: cycle.beam,
                            startDate: cycle.startDate,
                            endDate: cycle.endDate,
                            events: cycle.events,
                            logs: cycle.logs,
                            subTotalMeters,
                            subTotalWeight
                        }
                    });
                });

                configEvents.forEach(item => finalTimeline.push(item));
                finalTimeline.sort((a, b) => a.date.localeCompare(b.date));

                return finalTimeline;
            };

            // Sync selectedBeam with beams
            useEffect(() => {

                    if (latest && JSON.stringify(latest) !== JSON.stringify(selectedBeam)) {

            useEffect(() => {

                    }
                };

            }, [undoStack, beams, issues, beamLoadings]);

            const deleteLedgerEntry = (row) => {

            // Sidebar active class syncing useEffect
            useEffect(() => {

            }, [activeTab]);
            
            // Ledger Filters
            const [ledgerFilters, setLedgerFilters] = useState({ quality: '', code: '', color: '' });
            const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });

            useEffect(() => {

            useEffect(() => {

            // Cleanup: Permanently remove legacy "Machine removed" history entries and heal missing IDs
            useEffect(() => {
                let hasChanged = false;
                const cleanedBeams = beams.map(b => {
                    let updatedBeam = { ...b };
                    let localChanged = false;

                    if (!b.id) {
                        updatedBeam.id = b.beamNumber ? `b${b.beamNumber}` : 'beam_' + Math.random().toString(36).substr(2, 9);
                        localChanged = true;
                    }

                    const originalHistory = b.history || [];
                    let filteredHistory = originalHistory.filter(h => {
                        const e = (h.event || '').toLowerCase();
                        if (e.includes('was removed') || e.includes('returned to available')) return false;
                        return true;
                    });
                    


                    if (b.status === 'Empty') {
                        updatedBeam.status = 'Completed';
                        localChanged = true;
                    }
                    if (b.status === 'Active') {
                        updatedBeam.status = b.machineNumber ? 'On Loom' : 'Available';
                        localChanged = true;
                    }

                    // Remove duplicate unload events in the same cycle
                    let finalHistory = [];
                    let hasUnloadInCycle = false;
                    filteredHistory.forEach(h => {
                        const event = (h.event || '').toLowerCase();
                        const isLoad = event.includes('loaded on') || event.includes('pissing on') || event.includes('jala piecing');
                        const isUnload = event.includes('unloaded') || event.includes('removed');
                        
                        if (isLoad) {
                            hasUnloadInCycle = false;
                            finalHistory.push(h);
                        } else if (isUnload) {
                            if (!hasUnloadInCycle) {
                                hasUnloadInCycle = true;
                                finalHistory.push(h);
                            } else {
                                localChanged = true;
                            }
                        } else {
                            finalHistory.push(h);
                        }
                    });

                    // Migrate history events format to: Jala Piecing by [Person] on [Machine]
                    let historyMigrated = false;
                    const migratedHistory = finalHistory.map(h => {
                        const eventText = h.event || '';
                        // 1. "Pissing on Machine X by Person" / "Jala Piecing on Machine X by Person"
                        if (/(?:Pissing on|Jala Piecing on) (?:Machine\s+)?(.+?)\s+by\s+(.+)$/i.test(eventText)) {
                            const match = eventText.match(/(?:Pissing on|Jala Piecing on) (?:Machine\s+)?(.+?)\s+by\s+(.+)$/i);
                            if (match) {
                                const machine = match[1].trim();
                                const person = match[2].trim();
                                const mDisp = machine.toLowerCase().includes('machine') ? machine : `Machine ${machine}`;
                                const targetEvent = `Jala Piecing by ${person} on ${mDisp}`;
                                if (eventText !== targetEvent) {
                                    historyMigrated = true;
                                    return { ...h, event: targetEvent };
                                }
                            }
                        }
                        // 2. "Loaded on Machine X by Person"
                        if (/Loaded on (?:Machine\s+)?(.+?)\s+by\s+(.+)$/i.test(eventText)) {
                            const match = eventText.match(/Loaded on (?:Machine\s+)?(.+?)\s+by\s+(.+)$/i);
                            if (match) {
                                const machine = match[1].trim();
                                const person = match[2].trim();
                                const mDisp = machine.toLowerCase().includes('machine') ? machine : `Machine ${machine}`;
                                const targetEvent = `Jala Piecing by ${person} on ${mDisp}`;
                                if (eventText !== targetEvent) {
                                    historyMigrated = true;
                                    return { ...h, event: targetEvent };
                                }
                            }
                        }
                        // 3. "Pissing on Machine X" / "Jala Piecing on Machine X" without "by"
                        if (/(?:Pissing on|Jala Piecing on) (?:Machine\s+)?(.+?)$/i.test(eventText) && !eventText.includes(' by ')) {
                            const match = eventText.match(/(?:Pissing on|Jala Piecing on) (?:Machine\s+)?(.+?)$/i);
                            if (match) {
                                const machine = match[1].trim();
                                const mDisp = machine.toLowerCase().includes('machine') ? machine : `Machine ${machine}`;
                                const targetEvent = `Jala Piecing on ${mDisp}`;
                                if (eventText !== targetEvent) {
                                    historyMigrated = true;
                                    return { ...h, event: targetEvent };
                                }
                            }
                        }
                        return h;
                    });

                    if (historyMigrated) {
                        finalHistory = migratedHistory;
                        localChanged = true;
                    }
                    
                    if (finalHistory.length !== originalHistory.length || localChanged) {
                        updatedBeam.history = finalHistory;
                        localChanged = true;
                    }

                    if (localChanged) {
                        hasChanged = true;
                        return updatedBeam;
                    }
                    return b;
                });

                if (hasChanged) {
                    console.log("Migrated beams and cleaned up legacy timeline entries.");
                    setBeams(cleanedBeams);
                }
            }, [beams]);

            // Data Processing
            const warpOrders = orders.filter(o => o.type === 'Warp');

            const stockData = useMemo(() => {
                const { start, end } = getFYDateRange(selectedFY);
                const combinations = new Set();
                warpOrders.forEach(o => combinations.add(`${o.quality}|${o.code}|${o.color}`));
                issues.forEach(i => combinations.add(`${i.quality}|${i.code}|${i.color}`));
                beams.forEach(b => combinations.add(`${b.quality}|${b.code}|${b.color}`));
                
                const results = {};
                combinations.forEach(combo => {
                    const [quality, code, color] = combo.split('|');
                    const match = (item) => (item.quality === quality && item.code === code && item.color === color);

                    const itemOrders = warpOrders.filter(match);
                    const itemIssues = issues.filter(match);
                    const itemBeams = beams.filter(match);

                    // Build chronological history
                    const history = [];
                    
                    // Add Arrivals
                    itemOrders.forEach(o => {
                        (o.batches || []).forEach(b => {
                            if (!b.receiveDate) return;
                            if (end && b.receiveDate > end) return;
                            history.push({
                                id: b.id,
                                date: b.receiveDate,
                                type: 'In',
                                amount: parseFloat(b.totalWeight) || 0,
                                details: `Challan: ${b.challanNumber}`,
                                beamNumber: null
                            });
                        });
                    });

                    // Add Issues
                    itemIssues.forEach(i => {
                        if (!i.date) return;
                        if (end && i.date > end) return;
                        const beam = beams.find(b => b.id === i.beamId);
                        history.push({
                            id: i.id,
                            date: i.date,
                            type: 'Issue',
                            amount: parseFloat(i.issuedWeight) || 0,
                            details: i.type || 'Manual Issue',
                            beamNumber: beam ? beam.beamNumber : (i.details || '-'),
                            warpingPerson: beam ? beam.warpingPerson : '-',
                            beamEnds: beam ? (parseInt(beam.ends) || 0) : null,
                            beamMeters: beam ? (parseFloat(beam.meters) || 0) : null,
                            beamId: i.beamId
                        });
                    });

                    // Add Beam Creations
                    itemBeams.forEach(b => {
                        if (!b.createdAt) return;
                        if (end && b.createdAt > end) return;
                        history.push({
                            id: b.id,
                            date: b.createdAt,
                            type: 'Beam',
                            amount: 0,
                            details: `Beam Created: #${b.beamNumber}`,
                            beamNumber: b.beamNumber,
                            warpingPerson: b.warpingPerson,
                            beamEnds: b.ends,
                            beamMeters: b.meters,
                            beamId: b.id
                        });
                    });

                    // Sort history by date, then type (In -> Issue -> Beam)
                    history.sort((a, b) => {
                        const dateCompare = new Date(a.date) - new Date(b.date);
                        if (dateCompare !== 0) return dateCompare;
                        
                        // Same day priority: In (1) -> Issue (2) -> Beam (3)
                        const priority = { 'In': 1, 'Issue': 2, 'Beam': 3 };
                        return (priority[a.type] || 99) - (priority[b.type] || 99);
                    });

                    // Calculate Open/Close
                    let runningStock = 0;
                    let openingStock = 0;

                    if (start) {
                        history.forEach(h => {
                            if (h.date < start) {
                                if (h.type === 'In') runningStock += h.amount;
                                else runningStock -= h.amount;
                            }
                        });
                        openingStock = runningStock;
                    }

                    const activeHistory = history.filter(h => !start || h.date >= start);
                    const ledger = [];
                    
                    if (start) {
                        ledger.push({
                            id: 'opening',
                            date: start,
                            type: 'Opening',
                            amount: 0,
                            details: 'Opening Balance (Carried Forward)',
                            beamNumber: null,
                            open: openingStock,
                            close: openingStock
                        });
                    }

                    activeHistory.forEach(h => {
                        const open = runningStock;
                        if (h.type === 'In') runningStock += h.amount;
                        else runningStock -= h.amount;
                        ledger.push({ ...h, open, close: runningStock });
                    });

                    if (activeHistory.length > 0 || openingStock > 0 || !start) {
                        results[combo] = {
                            quality, code, color,
                            ledger,
                            totalStock: runningStock
                        };
                    }
                });
                return results;
            }, [orders, issues, beams, selectedFY]);

            const dashboardStats = useMemo(() => {
                const totalStock = Object.values(stockData).reduce((acc, curr) => acc + curr.totalStock, 0);
                const activeBeams = visibleBeams.filter(b => b.status !== 'Completed').length;
                const totalIssued = issues
                    .filter(i => {

                    .reduce((acc, curr) => acc + (parseFloat(curr.issuedWeight) || 0), 0);
                return { totalStock, activeBeams, totalIssued };
            }, [stockData, visibleBeams, issues, selectedFY]);

            const matchesLoomHistory = (beam, searchLoom) => {
                const sLoom = searchLoom.trim().toLowerCase();
                return (beam.history || []).some(h => {
                    const evt = (h.event || '').toLowerCase();
                    const cleanEvt = evt.replace(/\s+/g, ' ');
                    if (cleanEvt.includes(`machine ${sLoom}`) || cleanEvt.includes(`loom ${sLoom}`)) {
                        return true;
                    }
                    const escaped = sLoom.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    try {
                        return !!cleanEvt.match(new RegExp(`\\b${escaped}\\b`));
                    } catch (e) {
                        return cleanEvt.includes(sLoom);
                    }
                });
            };

            const getCompletedLoomNumber = (beam) => {
                const hist = beam.history || [];
                for (let i = hist.length - 1; i >= 0; i--) {
                    const event = hist[i].event || '';
                    const eLower = event.toLowerCase();
                    if (eLower.includes('loaded on') || eLower.includes('pissing on') || eLower.includes('jala piecing') || eLower.includes('completed')) {
                        if (/jala piecing by/i.test(event)) {
                            const match = event.match(/Jala Piecing by (.+?) on (?:Machine |Loom )?(.+)$/i);
                            if (match) return match[2].trim();
                        }
                        const match = event.match(/(?:Loaded on|Pissing on|Jala Piecing on|Completed on|Completed) (?:Machine |Loom )?(.+?)(?: by|$)/i);
                        if (match) {
                            return match[1].trim();
                        }
                    }
                }
                return '';
            };

            // Split search query by commas, trim whitespace, ignore empty terms, and strip surrounding quotes
            const searchTerms = useMemo(() => {
                return universalSearch.split(',')
                    .map(t => t.trim().toLowerCase().replace(/^['"]|['"]$/g, ''))
                    .filter(t => t);
            }, [universalSearch]);

            const matchesTerm = useCallback((beam, term) => {
                // Check if term starts with 'loom ' to do a loom history search
                if (term === 'loom' || term.startsWith('loom ')) {
                    const targetLoom = term.startsWith('loom ') ? term.slice(5).trim() : '';
                    if (!targetLoom) return true;
                    return matchesLoomHistory(beam, targetLoom);
                }

                // 1. Beam Number matching (partial match)
                const bNum = (beam.beamNumber || '').toLowerCase();
                const beamNoMatch = bNum.includes(term);

                // 2. Other beam fields: quality, code, color, ends, meters, warpingPerson, status, machineNumber
                const qualityMatch = (beam.quality || '').toLowerCase().includes(term);
                const codeMatch = (beam.code || '').toLowerCase().includes(term);
                const colorMatch = (beam.color || '').toLowerCase().includes(term);
                const endsMatch = (beam.ends || '').toString().includes(term);
                const metersMatch = (beam.meters || '').toString().includes(term);
                const personMatch = (beam.warpingPerson || '').toLowerCase().includes(term);
                const statusMatch = (beam.status || '').toLowerCase().includes(term);
                const machineNoMatch = (beam.machineNumber || '').toLowerCase().includes(term);

                // 3. Beam History event text matching
                const historyMatch = (beam.history || []).some(h => 
                    (h.event || '').toLowerCase().includes(term) ||
                    (h.date || '').toLowerCase().includes(term) ||
                    (h.type || '').toLowerCase().includes(term)
                );

                // 4. Current machine details matching (if loaded on a loom)
                let machineMatch = false;
                if (beam.machineNumber) {
                    const machine = machines.find(m => m.name == beam.machineNumber);
                    if (machine) {
                        machineMatch = 
                            (machine.name || '').toLowerCase().includes(term) ||
                            (machine.id || '').toLowerCase().includes(term) ||
                            (machine.rapier || '').toLowerCase().includes(term) ||
                            (machine.jacquard || '').toLowerCase().includes(term) ||
                            (machine.hooks || '').toString().includes(term) ||
                            (machine.jala || '').toLowerCase().includes(term) ||
                            (machine.fani || '').toLowerCase().includes(term);
                    }
                }

                // 5. Beam Loadings logs matching
                let loadingsMatch = false;
                if (beamLoadings) {
                    const logs = beamLoadings.filter(l => l.beamNumber === beam.beamNumber);
                    loadingsMatch = logs.some(l => 
                        (l.piecein || '').toLowerCase().includes(term) ||
                        (l.drawingIn || '').toLowerCase().includes(term) ||
                        (l.fani || '').toLowerCase().includes(term) ||
                        (l.dropPinJog || '').toLowerCase().includes(term)
                    );
                }

                return beamNoMatch || qualityMatch || codeMatch || colorMatch || endsMatch || 
                       metersMatch || personMatch || statusMatch || machineNoMatch || 
                       historyMatch || machineMatch || loadingsMatch;
            }, [machines, beamLoadings]);

            const filteredBeams = useMemo(() => {
                if (searchTerms.length === 0) return visibleBeams;
                return visibleBeams.filter(b => 
                    searchTerms.some(term => matchesTerm(b, term))
                );
            }, [visibleBeams, searchTerms, matchesTerm]);

            const displayAvailableBeams = useMemo(() => {
                return filteredBeams.filter(b => 
                    (b.status === 'Available' || b.status === 'Ready') && 
                    (!b.machineNumber || !machines.some(m => m.name == b.machineNumber || m.id == b.loomNo))
                );
            }, [filteredBeams, machines]);

            const displayBeamsOnLoom = useMemo(() => {

                );
            }, [filteredBeams, machines]);

            const displayCompletedBeams = useMemo(() => {

            const getBeamMaxDate = (beam) => {
                if (!beam) return null;
                
                let maxDate = beam.createdAt || null;

                // Only consider production logs for validation
                productionLogs.forEach(l => {

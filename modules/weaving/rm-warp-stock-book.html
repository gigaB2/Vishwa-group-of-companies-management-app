                        if (l.productionDate && (!maxDate || l.productionDate > maxDate)) maxDate = l.productionDate;
                        if (l.pissingDate && (!maxDate || l.pissingDate > maxDate)) maxDate = l.pissingDate;
                    }
                });

                return maxDate;
            };

            const getBeamStats = (beam) => {
                if (!beam) return { used: 0, remaining: 0, shortagePercent: 0 };
                const used = productionLogs
                    .filter(l => l.beamNumber === beam.beamNumber)
                    .reduce((acc, log) => acc + (parseFloat(log.totalMeters) || 0), 0);
                const remaining = (parseFloat(beam.meters) || 0) - used;
                const shortagePercent = beam.meters > 0 ? (remaining / beam.meters) * 100 : 0;
                return { used, remaining, shortagePercent };
            };


            const handleJalaChange = (machineId, newJalaName, changeDate) => {
                const machine = machines.find(m => m.id === machineId);
                const oldJala = machine ? machine.jala : null;
                const oldFani = machine ? machine.fani : null;

                // Deduce fani
                const selJala = availableJalas.find(j => j.name === newJalaName);
                const deductedFani = (selJala && selJala.stockportReed && selJala.fabricWidth)
                    ? `${selJala.stockportReed} x ${selJala.fabricWidth}`
                    : null;

                const updatedMachines = machines.map(m => {
                    if (m.id === machineId) {
                        const newHistory = [...(m.history || [])];
                        let eventText = `Jala changed: ${oldJala || 'None'} \u2192 ${newJalaName}`;
                        let updatedFani = m.fani;
                        if (deductedFani && oldFani !== deductedFani) {
                            updatedFani = deductedFani;
                            eventText += ` | Fani auto-changed: ${oldFani || 'None'} \u2192 ${deductedFani}`;
                        }
                        newHistory.push({
                            date: changeDate,
                            event: eventText,
                            type: 'machine'
                        });
                        return { ...m, jala: newJalaName, fani: updatedFani, history: newHistory };
                    }
                    return m;
                });
                setMachines(updatedMachines);
                setShowJalaSelection(null);
            };

            const handleFaniChange = (machineId, newFaniName, changeDate) => {
                const machine = machines.find(m => m.id === machineId);
                const oldFani = machine ? machine.fani : null;

                const updatedMachines = machines.map(m => {
                    if (m.id === machineId) {
                        const newHistory = [...(m.history || [])];
                        let eventText = `Fani changed: ${oldFani || 'None'} \u2192 ${newFaniName}`;
                        newHistory.push({
                            date: changeDate,
                            event: eventText,
                            type: 'machine'
                        });
                        return { ...m, fani: newFaniName, history: newHistory };
                    }
                    return m;
                });
                setMachines(updatedMachines);
                setShowFaniSelection(null);
            };

            const addIssue = (issue) => {
                pushToUndo();
                const newIssue = { 
                    ...issue, 
                    date: addTimestampToDate(issue.date),
                    id: Date.now().toString(),
                    issuedWeight: parseFloat(issue.issuedWeight) || 0
                };
                setIssues([...issues, newIssue]);
                setShowIssueModal(false);
            };

            const addBeam = (beam) => {
                pushToUndo();
                const timestamp = new Date().toISOString();
                const newBeam = { 
                    ...beam, 
                    id: Date.now().toString(), 
                    status: 'Available', 
                    ends: parseInt(beam.ends) || 0,
                    meters: parseFloat(beam.meters) || 0,
                    createdAt: timestamp,
                    history: [{ date: timestamp, event: 'Beam manufactured', type: 'system' }]
                };
                setBeams([...beams, newBeam]);
                setShowBeamModal(false);
            };

            const rollbackTimeline = (beamId) => {
                pushToUndo();
                let updatedBeam = null;
                const updatedBeams = beams.map(b => {
                    if (b.id === beamId) {
                        const hist = b.history || [];
                        if (hist.length <= 1) return b;

                        const newHistory = hist.slice(0, -1);
                        let newMachine = null;
                        for (let i = newHistory.length - 1; i >= 0; i--) {
                            const event = newHistory[i].event || '';
                            const eLower = event.toLowerCase();
                            if (eLower.includes('loaded on') || eLower.includes('pissing on') || eLower.includes('jala piecing')) {
                                if (/jala piecing by/i.test(event)) {
                                    const match = event.match(/Jala Piecing by (.+?) on (?:Machine )?(.+)$/i);
                                    if (match) {
                                        newMachine = match[2].trim();
                                        break;
                                    }
                                }
                                const match = event.match(/(?:Loaded on|Pissing on|Jala Piecing on) (?:Machine )?(.+?)(?: by|$)/i);
                                if (match) {
                                    newMachine = match[1].trim();
                                    break;
                                }
                            }
                        }
                        updatedBeam = { ...b, history: newHistory, machineNumber: newMachine };
                        return updatedBeam;
                    }
                    return b;
                });
                if (updatedBeam) {
                    setBeams(updatedBeams);
                    setSelectedBeam(updatedBeam);
                }
            };

            const updateBeamStatus = (beamId, newStatus, eventDetails, isRollback = false, customDate = null) => {
                const targetBeam = beams.find(b => b.id === beamId);
                if (!targetBeam) return;

                let eventDate = customDate || new Date().toISOString().split('T')[0];
                
                if (!isRollback && newStatus === 'Completed') {
                    // Ensure completion date is on or after the last production date
                    let lastProdDate = null;
                    productionLogs.forEach(l => {
                        if (l.beamNumber === targetBeam.beamNumber && l.productionDate) {
                            if (!lastProdDate || l.productionDate > lastProdDate) {
                                lastProdDate = l.productionDate;
                            }
                        }
                    });
                    if (lastProdDate && eventDate < lastProdDate) {
                        eventDate = lastProdDate;
                    }
                }

                if (!isRollback && newStatus !== 'Completed') {
                    const maxDate = getBeamMaxDate(targetBeam);
                    if (eventDate < maxDate) {
                        alert(`Invalid Date! Event date (${formatDate(eventDate)}) cannot be before the last event date (${formatDate(maxDate)}).`);
                        return;
                    }
                }

                pushToUndo();
                setBeams(beams.map(b => {
                    if (b.id === beamId) {
                        let newHistory;
                        if (isRollback) {
                            const hist = b.history || [];
                            // Find the last index where event includes "Completed"
                            let lastCompIdx = -1;
                            for (let i = hist.length - 1; i >= 0; i--) {
                                if (hist[i].event && hist[i].event.includes('Completed')) {
                                    lastCompIdx = i;
                                    break;
                                }
                            }
                            if (lastCompIdx !== -1) {
                                // Convert Completed event to unloaded event
                                newHistory = hist.map((h, idx) => {
                                    if (idx === lastCompIdx) {
                                        const match = h.event.match(/Completed on (.*)$/i);
                                        const mDisp = match ? match[1] : 'Machine';
                                        return {
                                            ...h,
                                            event: `unloaded from ${mDisp}`,
                                            type: 'machine',
                                            hideDate: true
                                        };
                                    }
                                    return h;
                                });
                            } else {
                                newHistory = hist.slice(0, -1);
                            }
                        } else {
                            newHistory = [...(b.history || []), {
                                date: eventDate,
                                event: eventDetails,
                                type: 'status',
                                hideDate: newStatus === 'Completed'
                            }];
                        }
                        return { 
                            ...b, 
                            status: newStatus, 
                            completedAt: newStatus === 'Completed' ? eventDate : null, 
                            machineNumber: newStatus === 'Completed' ? null : b.machineNumber, 
                            history: newHistory 
                        };
                    }
                    return b;
                }));

                if (newStatus === 'Completed') {
                    if (typeof window.showToast === 'function') {
                        window.showToast(`Beam #${targetBeam.beamNumber} marked as completed!`, 'success');
                    }
                } else if (isRollback) {
                    if (typeof window.showToast === 'function') {
                        window.showToast(`Beam #${targetBeam.beamNumber} status reverted!`, 'info');
                    }
                }
            };

            const removeLastUnload = (history) => {
                let cleanHist = [...(history || [])];
                let lastUnloadIdx = -1;
                for (let i = cleanHist.length - 1; i >= 0; i--) {
                    const e = (cleanHist[i].event || '').toLowerCase();
                    if (e.includes('unloaded') || e.includes('removed')) {
                        lastUnloadIdx = i;
                        break;
                    }
                }
                if (lastUnloadIdx !== -1) {
                    cleanHist.splice(lastUnloadIdx, 1);
                }
                return cleanHist;
            };

            const loadOnMachine = (beamId, machineNumber, pissingDate, pissingPerson) => {
                const targetBeam = beams.find(b => b.id === beamId);
                if (!targetBeam) {
                    alert('Cannot load: Beam does not exist in the Stock Book.');
                    return;
                }

                const mDisp = machineNumber.toString().toLowerCase().includes('machine') ? machineNumber : `Machine ${machineNumber}`;
                const hist = targetBeam.history || [];
                const filteredHist = removeLastUnload(hist);

                pushToUndo();
                const updatedBeams = beams.map(b => {
                    if (b.id === beamId) {
                        const newHistory = [...filteredHist, {
                            date: pissingDate || new Date().toISOString().split('T')[0],
                            event: `Jala Piecing${pissingPerson ? ' by ' + pissingPerson : ''} on ${mDisp}`,
                            type: 'machine'
                        }];
                        
                        return {
                            ...b,
                            machineNumber,
                            status: 'On Loom',
                            history: newHistory
                        };
                    }
                    return b;
                });
                setBeams(updatedBeams);

                if (selectedBeam && selectedBeam.id === beamId) {
                    const newlyUpdatedBeam = updatedBeams.find(b => b.id === beamId);
                    if (newlyUpdatedBeam) {
                        setSelectedBeam(newlyUpdatedBeam);
                    }
                }

                if (typeof window.showToast === 'function') {
                    window.showToast(`Beam #${targetBeam.beamNumber} loaded on ${mDisp} successfully!`, 'success');
                }
            };

            const updatePissingDetails = (beamId, newMachine, newDate, newPerson) => {
                const targetBeam = beams.find(b => b.id === beamId);
                if (!targetBeam) return;

                pushToUndo();
                setBeams(beams.map(b => {
                    if (b.id === beamId) {
                        const hist = b.history || [];
                        let lastLoadIdx = -1;
                        for (let i = hist.length - 1; i >= 0; i--) {
                            const e = (hist[i].event || '').toLowerCase();
                            if (e.includes('loaded on') || e.includes('pissing on') || e.includes('jala piecing')) {
                                lastLoadIdx = i;
                                break;
                            }
                        }

                        let newHistory = [...hist];
                        const mDisp = newMachine.toString().toLowerCase().includes('machine') ? newMachine : `Machine ${newMachine}`;

                        if (lastLoadIdx !== -1) {
                            newHistory[lastLoadIdx] = {
                                ...newHistory[lastLoadIdx],
                                date: newDate,
                                event: `Jala Piecing${newPerson ? ' by ' + newPerson : ''} on ${mDisp}`
                            };
                        } else {
                            newHistory.push({
                                date: newDate,
                                event: `Jala Piecing${newPerson ? ' by ' + newPerson : ''} on ${mDisp}`,
                                type: 'machine'
                            });
                        }

                        return {
                            ...b,
                            machineNumber: newMachine || null,
                            history: newHistory
                        };
                    }
                    return b;
                }));
            };

            const cutBeam = (beamId) => {
                const targetBeam = beams.find(b => b.id === beamId);
                if (!targetBeam) return;

                const mDisp = String(targetBeam.machineNumber).toLowerCase().includes('machine') ? targetBeam.machineNumber : `Machine ${targetBeam.machineNumber}`;
                let today = new Date().toISOString().split('T')[0];

                const onConfirm = () => {
                    pushToUndo();
                    setBeams(prevBeams => prevBeams.map(b => {
                        if (b.id === beamId) {
                            const hist = b.history || [];
                            let lastLoadIdx = -1;
                            for (let i = hist.length - 1; i >= 0; i--) {
                                const e = (hist[i].event || '').toLowerCase();
                                if (e.includes('loaded on') || e.includes('pissing on') || e.includes('jala piecing')) {
                                    lastLoadIdx = i;
                                    break;
                                }
                            }

                            let hasProduction = false;
                            if (lastLoadIdx !== -1) {
                                const loadDate = hist[lastLoadIdx].date;
                                hasProduction = productionLogs.some(l => 
                                    l.beamNumber === b.beamNumber && 
                                    (machines.find(m => m.name == b.machineNumber)?.id == l.machineNumber || l.machineNumber == b.machineNumber) && 
                                    l.productionDate >= loadDate
                                );
                            }

                            let unloadDate = today;
                            if (lastLoadIdx !== -1) {
                                const loadDate = hist[lastLoadIdx].date;
                                if (loadDate && unloadDate < loadDate) {
                                    unloadDate = loadDate;
                                }
                            }

                            let lastProdDate = null;
                            productionLogs.forEach(l => {
                                if (l.beamNumber === b.beamNumber && l.productionDate) {
                                    if (!lastProdDate || l.productionDate > lastProdDate) {
                                        lastProdDate = l.productionDate;
                                    }
                                }
                            });
                            if (lastProdDate && unloadDate < lastProdDate) {
                                unloadDate = lastProdDate;
                            }

                            let newHistory = [...hist];
                            if (!hasProduction && lastLoadIdx !== -1) {
                                // NO PRODUCTION: Remove the pissing/load event so it vanishes from history
                                newHistory = hist.filter((_, idx) => idx !== lastLoadIdx);
                            } else {
                                // NORMAL UNLOAD: Add history entry
                                newHistory.push({
                                    date: unloadDate,
                                    event: `unloaded from ${mDisp}`,
                                    type: 'machine',
                                    hideDate: true
                                });
                            }

                            return {
                                ...b,
                                machineNumber: null,
                                status: 'Available',
                                history: newHistory
                            };
                        }
                        return b;
                    }));
                    if (typeof window.showToast === 'function') {
                        window.showToast(`Beam #${targetBeam.beamNumber} cut/unloaded successfully from ${mDisp}!`, 'success');
                    }
                };

                if (typeof window.showConfirmToast === 'function') {
                    window.showConfirmToast(
                        `Are you sure you want to cut/unload Beam #${targetBeam.beamNumber} from ${mDisp}?`,
                        onConfirm,
                        null,
                        'Cut Beam'
                    );
                } else {
                    if (confirm(`Are you sure you want to cut/unload Beam #${targetBeam.beamNumber} from ${mDisp}?`)) {
                        onConfirm();
                    }
                }
            };

            const getLedgerOptions = (field) => {
                const allData = warpOrders.map(o => ({ quality: o.quality, code: o.code, color: o.color }));
                
                let filtered = allData;
                if (field !== 'quality' && ledgerFilters.quality) filtered = filtered.filter(o => o.quality === ledgerFilters.quality);
                if (field !== 'code' && ledgerFilters.code) filtered = filtered.filter(o => o.code === ledgerFilters.code);
                if (field !== 'color' && ledgerFilters.color) filtered = filtered.filter(o => o.color === ledgerFilters.color);
                
                return [...new Set(filtered.map(o => o[field]).filter(Boolean))].sort();
            };

            const handleLedgerFilterChange = (field, value) => {
                const updated = { ...ledgerFilters, [field]: value };
                
                const allData = warpOrders.map(o => ({ quality: o.quality, code: o.code, color: o.color }));

                // Smart Snapping
                let filtered = allData;
                if (updated.quality) filtered = filtered.filter(o => o.quality === updated.quality);
                if (updated.code) filtered = filtered.filter(o => o.code === updated.code);
                if (updated.color) filtered = filtered.filter(o => o.color === updated.color);

                if (filtered.length > 0) {
                    const uniqueQualities = [...new Set(filtered.map(o => o.quality))];
                    const uniqueCodes = [...new Set(filtered.map(o => o.code))];
                    const uniqueColors = [...new Set(filtered.map(o => o.color))];

                    if (uniqueQualities.length === 1) updated.quality = uniqueQualities[0];
                    if (uniqueCodes.length === 1) updated.code = uniqueCodes[0];
                    if (uniqueColors.length === 1) updated.color = uniqueColors[0];
                }

                setLedgerFilters(updated);
            };

            return (
                <div className="app-container">
                    <header>
                        <div className="logo-section">
                            <span className="logo" onClick={() => setActiveTab('ledger')}>
                                {activeTab === 'dashboard' ? 'Beams overview' :
                                 activeTab === 'ledger' ? 'Warp yarn stock' :
                                 activeTab === 'tracker' ? 'Beam tracker' : 'RM Warp Stock Book'}
                            </span>
                            <div className="nav-tabs">
                                <div className={`nav-tab ${activeTab === 'ledger' ? 'active' : ''}`} onClick={() => setActiveTab('ledger')}>Warp yarn stock</div>
                                <div className={`nav-tab ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Beams overview</div>
                                <div className={`nav-tab ${activeTab === 'tracker' ? 'active' : ''}`} onClick={() => setActiveTab('tracker')}>Beam tracker</div>
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                        </div>
                    </header>

                    {activeTab === 'tracker' && (
                        <div className="card" style={{ marginBottom: '2rem', padding: '1rem' }}>
                            <div style={{ position: 'relative' }}>
                                <input 
                                    type="text" 
                                    placeholder="Universal Search (Beam No, Code, Color, Ends, Meters)..." 
                                    value={universalSearch}
                                    onChange={(e) => setUniversalSearch(e.target.value)}
                                    style={{ padding: '0.8rem 1.2rem', fontSize: '1rem', borderRadius: '12px' }}
                                />
                                {universalSearch && (
                                    <button 
                                        onClick={() => setUniversalSearch('')}
                                        style={{
                                            position: 'absolute',
                                            right: '1rem',
                                            top: '50%',
                                            transform: 'translateY(-50%)',
                                            background: 'none',
                                            border: 'none',
                                            cursor: 'pointer',
                                            color: 'var(--muted)',
                                            fontSize: '1.2rem'
                                        }}
                                    >✕</button>
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'dashboard' && (
                        <div>
                            <div className="stats-grid">
                                <div className="card">
                                    <div style={{ color: 'var(--muted)', fontSize: '0.9rem', fontWeight: 600 }}>TOTAL WARP STOCK</div>
                                    <div className="stat-value">{dashboardStats.totalStock.toFixed(1)} kg</div>
                                </div>
                                <div className="card">
                                    <div style={{ color: 'var(--muted)', fontSize: '0.9rem', fontWeight: 600 }}>ACTIVE BEAMS</div>
                                    <div className="stat-value">{dashboardStats.activeBeams}</div>
                                </div>
                                <div className="card">
                                    <div style={{ color: 'var(--muted)', fontSize: '0.9rem', fontWeight: 600 }}>{selectedFY === 'All' ? 'TOTAL ISSUED (ALL TIME)' : 'TOTAL ISSUED (THIS FY)'}</div>
                                    <div className="stat-value">{dashboardStats.totalIssued.toFixed(1)} kg</div>
                                </div>
                            </div>
                            {/* Universal Search Bar */}
                            <div className="card" style={{ marginBottom: '1.5rem', padding: '1rem' }}>
                                <div style={{ position: 'relative' }}>
                                    <input 
                                        type="text" 
                                        placeholder="Universal Search (Beam No, Quality, Code, Color, Ends, Meters)..." 
                                        value={universalSearch}
                                        onChange={(e) => setUniversalSearch(e.target.value)}
                                        style={{ padding: '0.8rem 1.2rem', fontSize: '1rem', borderRadius: '12px' }}
                                    />
                                    {universalSearch && (
                                        <button 
                                            onClick={() => setUniversalSearch('')}
                                            style={{
                                                position: 'absolute',
                                                right: '1rem',
                                                top: '50%',
                                                transform: 'translateY(-50%)',
                                                background: 'none',
                                                border: 'none',
                                                cursor: 'pointer',
                                                color: 'var(--muted)',
                                                fontSize: '1.2rem'
                                            }}
                                        >✕</button>
                                    )}
                                </div>
                            </div>

                            {/* Available Beams Container */}
                            <div className="card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                    <h3 style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        Available Beams
                                        <span className="badge badge-active" style={{ fontSize: '0.8rem', padding: '0.25rem 0.6rem' }}>
                                            {displayAvailableBeams.length}
                                        </span>
                                    </h3>
                                </div>
                                <div className="table-container">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Beam #</th>
                                                <th>Quality</th>
                                                <th>Code / Color</th>
                                                <th>Meters</th>
                                                <th>Ends</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayAvailableBeams.slice(0, 10).map(b => (
                                                <tr key={b.id}>
                                                    <td style={{ fontWeight: 700, color: 'var(--accent)', cursor: 'pointer' }} onClick={() => setSelectedBeam(b)} title="Open beam details card">{b.beamNumber}</td>
                                                    <td>{b.quality}</td>
                                                    <td>{b.code} / {b.color}</td>
                                                    <td>{b.meters} m</td>
                                                    <td>{b.ends}</td>
                                                </tr>
                                            ))}
                                            {displayAvailableBeams.length === 0 && (
                                                <tr>
                                                    <td colSpan="5" style={{ color: 'var(--muted)', textAlign: 'center', padding: '2rem' }}>
                                                        No available beams found.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                {displayAvailableBeams.length > 10 && (
                                    <div style={{ marginTop: '1.25rem', textAlign: 'center', fontSize: '0.85rem', color: 'var(--muted)' }}>
                                        Showing first 10 of {displayAvailableBeams.length} available beams. Use the search bar above to filter.
                                    </div>
                                )}
                            </div>

                            {/* Beams on Loom Container */}
                            <div className="card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                    <h3 style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        Beams on Loom
                                        <span className="badge" style={{ fontSize: '0.8rem', padding: '0.25rem 0.6rem', background: 'rgba(236, 72, 153, 0.1)', color: 'var(--accent2)' }}>
                                            {displayBeamsOnLoom.length}
                                        </span>

                                </div>
                                <div className="table-container">
                                    <table>

                                                <th>Loom / Machine</th>
                                                <th>Code / Color</th>
                                                <th>Meters</th>
                                                <th>Ends</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayBeamsOnLoom.slice(0, 10).map(b => (
                                                <tr key={b.id}>
                                                    <td style={{ fontWeight: 700, color: 'var(--accent)', cursor: 'pointer' }} onClick={() => setSelectedBeam(b)} title="Open beam details card">{b.beamNumber}</td>
                                                    <td>{b.quality}</td>
                                                    <td style={{ fontWeight: 600, color: 'var(--accent2)', cursor: 'pointer' }} onClick={() => {
                                                        const m = machines.find(mx => mx.name == b.machineNumber || mx.id == b.machineNumber);
                                                        setSelectedMachine(m || { name: b.machineNumber, id: b.machineNumber, history: [] });
                                                    }} title="Open loom history card">Loom {b.machineNumber}</td>
                                                    <td>{b.code} / {b.color}</td>
                                                    <td>{b.meters} m</td>
                                                    <td>{b.ends}</td>
                                                </tr>
                                            ))}
                                            {displayBeamsOnLoom.length === 0 && (
                                                <tr>
                                                    <td colSpan="6" style={{ color: 'var(--muted)', textAlign: 'center', padding: '2rem' }}>
                                                        No active beams on loom found.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                {displayBeamsOnLoom.length > 10 && (
                                    <div style={{ marginTop: '1.25rem', textAlign: 'center', fontSize: '0.85rem', color: 'var(--muted)' }}>
                                        Showing first 10 of {displayBeamsOnLoom.length} beams on loom. Use the search bar above to filter.
                                    </div>
                                )}
                            </div>

                            {/* Inactive Beams Container */}
                            <div className="card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                    <h3 style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        Inactive Beams (Completed)
                                        <span className="badge badge-completed" style={{ fontSize: '0.8rem', padding: '0.25rem 0.6rem' }}>
                                            {displayCompletedBeams.length}
                                        </span>
                                    </h3>
                                </div>
                                <div className="table-container">
                                    <table>
                                        <thead>
                                            <tr>

                                    </div>
                                    
                                    <div style={{ 
                                        display: 'grid', 
                                        gridTemplateColumns: 'repeat(4, 1fr)', 
                                        gap: '1rem', 
                                        marginBottom: '2rem'

                                        <div className="card" style={{ background: 'var(--bg)', margin: 0, padding: '1rem' }}>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', fontWeight: 600 }}>JALA TYPE</div>
                                            <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{machine.jala || '-'}</div>
                                        </div>
                                        <div className="card" style={{ background: 'var(--bg)', margin: 0, padding: '1rem' }}>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', fontWeight: 600 }}>FANI (REED)</div>
                                            <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{machine.fani || '-'}</div>
                                        </div>
                                        <div className="card" style={{ background: 'var(--bg)', margin: 0, padding: '1rem' }}>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', fontWeight: 600 }}>TOTAL METERS RUN</div>
                                            <div style={{ fontSize: '1.25rem', fontWeight: 700, color: 'var(--accent)' }}>{totalMeters.toFixed(1)} m</div>
                                        </div>
                                        <div className="card" style={{ background: activeBeam ? 'rgba(139, 92, 246, 0.05)' : 'var(--bg)', borderColor: activeBeam ? 'var(--accent)' : 'var(--border)', margin: 0, padding: '1rem', borderStyle: activeBeam ? 'solid' : 'none', borderWidth: '1px' }}>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', fontWeight: 600 }}>ACTIVE BEAM</div>
                                            <div style={{ fontSize: '1.25rem', fontWeight: 700, color: activeBeam ? 'var(--accent)' : 'var(--muted)' }}>
                                                {activeBeam ? `Beam #${activeBeam.beamNumber}` : 'None'}
                                            </div>
                                        </div>
                                    </div>

                                    <h3>Loom History & Beam Timeline</h3>
                                    <div style={{ marginTop: '1rem', paddingRight: '10px' }}>
                                        <div style={{ position: 'relative', padding: '1.5rem 0' }}>
                                            <div style={{ position: 'absolute', top: '20px', bottom: '20px', left: '17px', width: '4px', background: 'var(--border)', borderRadius: '2px' }}></div>
                                            {timelineEvents.length === 0 ? (
                                                <div style={{ color: 'var(--muted)', padding: '2rem', textAlign: 'center' }}>No history found for this machine.</div>
                                            ) : (
                                                timelineEvents.map((h, i) => {
                                                    const isCycle = h.type === 'beam-cycle';
                                                    const dotBg = h.type === 'machine' ? 'var(--accent3)' : 'var(--accent)';
                                                    
                                                    if (isCycle) {
                                                        const isExpanded = !!expandedBeamDetails[i];
                                                        const cycleDetails = h.details;
                                                        
                                                        let groupedLogs = [];
                                                        if (cycleDetails && cycleDetails.logs) {
                                                            const takaGroups = {};
                                                            cycleDetails.logs.forEach(log => {
                                                                const serial = log.takaSerial;
                                                                if (!serial || serial === 'Pending') {
                                                                    groupedLogs.push({
                                                                        productionDates: [log.productionDate],
                                                                        foldingDates: log.foldingDate ? [log.foldingDate] : [],
                                                                        takaSerial: serial || 'Pending',
                                                                        meters: log.meters,
                                                                        weight: log.weight
                                                                    });
                                                                } else {
                                                                    if (!takaGroups[serial]) {
                                                                        takaGroups[serial] = {
                                                                            productionDates: [],
                                                                            foldingDates: [],
                                                                            takaSerial: serial,
                                                                            meters: 0,
                                                                            weight: 0
                                                                        };
                                                                        groupedLogs.push(takaGroups[serial]);
                                                                    }
                                                                    if (!takaGroups[serial].productionDates.includes(log.productionDate)) {
                                                                        takaGroups[serial].productionDates.push(log.productionDate);
                                                                    }
                                                                    if (log.foldingDate && !takaGroups[serial].foldingDates.includes(log.foldingDate)) {
                                                                        takaGroups[serial].foldingDates.push(log.foldingDate);
                                                                    }
                                                                    takaGroups[serial].meters += log.meters;
                                                                    takaGroups[serial].weight = Math.max(takaGroups[serial].weight, log.weight);
                                                                }
                                                            });
                                                        }

                                                        return (
                                                            <div key={i} style={{ position: 'relative', paddingLeft: '45px', marginBottom: '1.5rem', display: 'block', width: '100%' }}>
                                                                <div style={{ position: 'absolute', left: '12px', top: '4px', width: '14px', height: '14px', borderRadius: '50%', background: dotBg, border: '3px solid var(--surface)', boxShadow: '0 0 0 2px rgba(139, 92, 246, 0.15)', zIndex: 2 }}></div>
                                                                <div style={{ 
                                                                    background: 'var(--surface)', 
                                                                    border: '1px solid var(--border)', 
                                                                    padding: '0.85rem 1.15rem', 
                                                                    borderRadius: '12px', 
                                                                    boxShadow: '0 1px 3px rgba(0,0,0,0.05)', 
                                                                    textAlign: 'left',
                                                                    cursor: 'pointer'
                                                                }} onClick={() => setExpandedBeamDetails(prev => ({ ...prev, [i]: !prev[i] }))}>
                                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                                        <div>
                                                                            <div style={{ fontSize: '0.75rem', color: 'var(--muted)', fontWeight: 500, marginBottom: '0.15rem' }}>Loaded: {formatDate(cycleDetails.startDate)} {cycleDetails.endDate !== '9999-12-31' ? `to ${formatDate(cycleDetails.endDate)}` : '(Active)'}</div>
                                                                            <div style={{ fontWeight: 600, color: 'var(--fg)', fontSize: '0.9rem', display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                                                                                <span>📦 Beam #{cycleDetails.beamNumber} Details</span>
                                                                                {cycleDetails.beam && <span style={{ color: 'var(--muted)', fontWeight: 400 }}>{cycleDetails.beam.quality} ({cycleDetails.beam.code} / {cycleDetails.beam.color})</span>}
                                                                                <span style={{ 
                                                                                    fontSize: '0.7rem', 
                                                                                    color: 'var(--accent)', 
                                                                                    background: 'rgba(139, 92, 246, 0.1)', 
                                                                                    padding: '0.15rem 0.4rem', 
                                                                                    borderRadius: '4px',
                                                                                    fontWeight: 500
                                                                                }}>
                                                                                    {isExpanded ? 'Collapse Beam Details ▲' : 'Expand Beam Details ▼'}
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {isExpanded && (
                                                                        <div style={{ marginTop: '1rem', borderTop: '1px solid var(--border)', paddingTop: '1rem' }} onClick={e => e.stopPropagation()}>
                                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', marginBottom: '1rem' }}>
                                                                                {(() => {
                                                                                    const latestSetupMap = {};
                                                                                    (cycleDetails.events || []).forEach(ev => {
                                                                                        const txt = (ev.event || '').toLowerCase();
                                                                                        let typeKey = null;
                                                                                        if (txt.includes('piece in') || txt.includes('piecing') || txt.includes('pissing')) {
                                                                                            typeKey = 'piece-in';
                                                                                        } else if (txt.includes('drawing in')) {
                                                                                            typeKey = 'drawing-in';
                                                                                        } else if (txt.includes('fani')) {
                                                                                            typeKey = 'fani';
                                                                                        } else if (txt.includes('drop pin') || txt.includes('jog')) {
                                                                                            typeKey = 'drop-pin';
                                                                                        }
                                                                                        if (typeKey) {
                                                                                            latestSetupMap[typeKey] = ev;
                                                                                        }
                                                                                    });
                                                                                    const setupEvents = Object.values(latestSetupMap).sort((a, b) => a.date.localeCompare(b.date));
                                                                                    if (setupEvents.length === 0) return null;
                                                                                    return setupEvents.map((ev, evIdx) => {
                                                                                        const parts = ev.event.split(/\s+by\s+/i);
                                                                                        const label = parts[0] || 'Setup Step';
                                                                                        const worker = parts[1] || '—';
                                                                                        return (
                                                                                            <div key={evIdx} className="card" style={{ margin: 0, padding: '0.65rem 0.85rem', background: 'var(--bg)', fontSize: '0.8rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                                                                <div>
                                                                                                    <div style={{ fontSize: '0.65rem', color: 'var(--muted)', fontWeight: 600, textTransform: 'uppercase' }}>{label}</div>
                                                                                                    <div style={{ fontWeight: 700, fontSize: '0.95rem', marginTop: '0.15rem' }}>{worker}</div>
                                                                                                </div>
                                                                                                <div style={{ fontSize: '0.75rem', color: 'var(--accent)', fontWeight: 600 }}>
                                                                                                    📅 {formatDate(ev.date)}
                                                                                                </div>
                                                                                            </div>
                                                                                        );
                                                                                    });
                                                                                })()}
                                                                            </div>

                                                                            {groupedLogs.length === 0 ? (
                                                                                <div style={{ padding: '1rem', color: 'var(--muted)', textAlign: 'center', background: 'var(--bg)', borderRadius: '8px', fontSize: '0.85rem' }}>No production meters logged during this cycle.</div>
                                                                            ) : (
                                                                                <div style={{ padding: '0.75rem', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: '8px', width: '100%', overflowX: 'auto' }}>
                                                                                    <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                                                                                        <thead>
                                                                                            <tr>
                                                                                                <th style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem', textAlign: 'left', background: 'transparent', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', color: 'var(--muted)' }}>Prod. Date</th>
                                                                                                <th style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem', textAlign: 'left', background: 'transparent', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', color: 'var(--muted)' }}>Folding Date</th>
                                                                                                <th style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem', textAlign: 'left', background: 'transparent', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', color: 'var(--muted)' }}>Taka Serial</th>
                                                                                                <th style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem', textAlign: 'right', background: 'transparent', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', color: 'var(--muted)' }}>Meters</th>
                                                                                                <th style={{ fontSize: '0.75rem', padding: '0.4rem 0.8rem', textAlign: 'right', background: 'transparent', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', color: 'var(--muted)' }}>Weight</th>
                                                                                            </tr>
                                                                                        </thead>
                                                                                        <tbody>
                                                                                            {groupedLogs.map((g, idx) => (
                                                                                                <tr key={idx}>
                                                                                                    <td style={{ padding: '0.5rem 0.8rem', fontSize: '0.85rem', textAlign: 'left', borderBottom: '1px solid var(--border)', verticalAlign: 'middle' }}>
                                                                                                        {g.productionDates.map((d, dIdx) => <div key={dIdx}>{formatDate(d)}</div>)}
                                                                                                    </td>
                                                                                                    <td style={{ padding: '0.5rem 0.8rem', fontSize: '0.85rem', textAlign: 'left', borderBottom: '1px solid var(--border)', verticalAlign: 'middle' }}>
                                                                                                        {g.foldingDates.length > 0 ? g.foldingDates.map((d, dIdx) => <div key={dIdx}>{formatDate(d)}</div>) : '—'}
                                                                                                    </td>
                                                                                                    <td style={{ padding: '0.5rem 0.8rem', fontSize: '0.85rem', textAlign: 'left', borderBottom: '1px solid var(--border)', fontWeight: 600, verticalAlign: 'middle' }}>{g.takaSerial}</td>
                                                                                                    <td style={{ padding: '0.5rem 0.8rem', fontSize: '0.85rem', textAlign: 'right', fontWeight: 700, borderBottom: '1px solid var(--border)', verticalAlign: 'middle', color: 'var(--accent)' }}>{g.meters.toFixed(1)} m</td>
                                                                                                    <td style={{ padding: '0.5rem 0.8rem', fontSize: '0.85rem', textAlign: 'right', fontWeight: 700, borderBottom: '1px solid var(--border)', verticalAlign: 'middle' }}>{g.weight > 0 ? `${g.weight.toFixed(2)} kg` : '—'}</td>
                                                                                                </tr>
                                                                                            ))}
                                                                                            <tr style={{ borderTop: '2px solid var(--border)', fontWeight: 800 }}>
                                                                                                <td colSpan="3" style={{ padding: '0.6rem 0.8rem', fontSize: '0.85rem', textAlign: 'left', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Sub Total</td>
                                                                                                <td style={{ padding: '0.6rem 0.8rem', fontSize: '0.85rem', textAlign: 'right', color: 'var(--accent)', fontWeight: 800 }}>{cycleDetails.subTotalMeters.toFixed(1)} m</td>
                                                                                                <td style={{ padding: '0.6rem 0.8rem', fontSize: '0.85rem', textAlign: 'right', color: 'var(--accent)', fontWeight: 800 }}>{cycleDetails.subTotalWeight > 0 ? `${cycleDetails.subTotalWeight.toFixed(2)} kg` : '—'}</td>
                                                                                            </tr>
                                                                                        </tbody>
                                                                                    </table>
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    } else {
                                                        return (
                                                            <div key={i} style={{ position: 'relative', paddingLeft: '45px', marginBottom: '1.5rem', display: 'block', width: '100%' }}>
                                                                <div style={{ position: 'absolute', left: '12px', top: '4px', width: '14px', height: '14px', borderRadius: '50%', background: dotBg, border: '3px solid var(--surface)', boxShadow: '0 0 0 2px rgba(124, 58, 237, 0.15)', zIndex: 2 }}></div>
                                                                <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', padding: '0.85rem 1.15rem', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,0.05)', textAlign: 'left' }}>
                                                                    <div>
                                                                        <div style={{ fontSize: '0.75rem', color: 'var(--muted)', fontWeight: 500, marginBottom: '0.15rem' }}>{formatDate(h.date)}</div>
                                                                        <div style={{ fontWeight: 600, color: 'var(--fg)', fontSize: '0.9rem' }}>{h.event}</div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    }
                                                })
                                            )}
                                        </div>
                                    </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}


                    {showJalaSelection && (
                        <div className="modal-overlay" onClick={() => setShowJalaSelection(null)}>
                            <div className="modal" style={{ maxWidth: '400px' }} onClick={e => e.stopPropagation()}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                    <div>
                                        <h3 style={{ margin: 0 }}>Select Jala</h3>
                                        <p style={{ color: 'var(--muted)', fontSize: '0.8rem', margin: '0.2rem 0 0 0' }}>For Loom {showJalaSelection.machineName}</p>
                                    </div>
                                    <button className="btn btn-outline" onClick={() => setShowJalaSelection(null)}>Close</button>
                                </div>
                                
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '1.2rem', marginTop: '0.5rem' }}>
                                    <div className="input-group" style={{ margin: 0 }}>
                                        <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 600, color: 'var(--muted)', marginBottom: '0.4rem' }}>
                                            {(() => {
                                                const m = machines.find(mx => mx.id === showJalaSelection.machineId);
                                                return m && m.hooks ? `JALAS MATCHING ${m.hooks} HOOKS` : 'AVAILABLE JALAS';
                                            })()}
                                        </label>
                                        <select
                                            value={tempJala}
                                            onChange={(e) => setTempJala(e.target.value)}
                                            style={{
                                                width: '100%',
                                                padding: '0.8rem',
                                                fontSize: '0.95rem',
                                                borderRadius: '12px',
                                                border: '1px solid var(--border)',
                                                background: 'var(--bg)',
                                                color: 'var(--fg)',
                                                outline: 'none',
                                                cursor: 'pointer',
                                                fontWeight: 600
                                            }}
                                        >
                                            {(() => {
                                                const m = machines.find(mx => mx.id === showJalaSelection.machineId);
                                                const filtered = m && m.hooks
                                                    ? availableJalas.filter(j => parseInt(j.ends) === parseInt(m.hooks))
                                                    : availableJalas;
                                                return filtered.length > 0
                                                    ? filtered.map(j => <option key={j.id} value={j.name}>{j.name} ({j.ends} hooks)</option>)
                                                    : availableJalas.map(j => <option key={j.id} value={j.name}>{j.name}</option>);
                                            })()}
                                        </select>
                                    </div>

                                    {/* Selected Jala Details Panel */}
                                    {(() => {
                                        const selectedJalaObj = availableJalas.find(j => j.name === tempJala);
                                        if (!selectedJalaObj) return null;
                                        const b = selectedJalaObj.breakdown || {};
                                        const adj = b.adjustment !== undefined ? parseInt(b.adjustment, 10) || 0 : 0;
                                        
                                        // Calculate total ends
                                        let totalEnds = selectedJalaObj.ends;
                                        if (b.sections && Array.isArray(b.sections)) {
                                            let total = 0;
                                            const leftAdj = Math.floor(adj / 2);
                                            const rightAdj = adj - leftAdj;
                                            b.sections.forEach(sec => {
                                                if (sec.type !== 'empty-hooks') {
                                                    let secEnds = Math.round((sec.hooks || 0) * (sec.repeats !== undefined ? sec.repeats : 1) * (sec.whpd || 1));
                                                    if (sec.type === 'left-selvedge') secEnds += leftAdj;
                                                    if (sec.type === 'right-selvedge') secEnds += rightAdj;
                                                    total += secEnds;
                                                }
                                            });
                                            totalEnds = total;
                                        } else if (b) {
                                            const selvedge = parseInt(b.selvedge, 10) || 0;
                                            const leftSelRepeats = b.leftSelRepeats !== undefined ? b.leftSelRepeats : 1;
                                            const lSelWhpd = b.leftSelWhpd !== undefined ? b.leftSelWhpd : 1;
                                            const leftSelEnds = Math.round(selvedge * leftSelRepeats * lSelWhpd) + Math.floor(adj / 2);

                                            const leftBorder = parseInt(b.leftBorder, 10) || 0;
                                            const leftBorRepeats = b.leftBorRepeats !== undefined ? b.leftBorRepeats : 1;
                                            const lBorWhpd = b.leftBorWhpd !== undefined ? b.leftBorWhpd : 1;
                                            const leftBorderEnds = Math.round(leftBorder * leftBorRepeats * lBorWhpd);

                                            const bodyEnds = parseInt(b.bodyEnds, 10) || 0;
                                            const bodyRepeats = b.bodyRepeats !== undefined ? b.bodyRepeats : 1;
                                            const bdyWhpd = b.bodyWhpd !== undefined ? b.bodyWhpd : 1;
                                            const bodyEndsTotal = Math.round(bodyEnds * bodyRepeats * bdyWhpd);

                                            const rightBorder = parseInt(b.rightBorder, 10) || 0;
                                            const rightBorRepeats = b.rightBorRepeats !== undefined ? b.rightBorRepeats : 1;
                                            const rBorWhpd = b.rightBorWhpd !== undefined ? b.rightBorWhpd : 1;
                                            const rightBorderEnds = Math.round(rightBorder * rightBorRepeats * rBorWhpd);

                                            const rightSelvedge = parseInt(b.rightSelvedge, 10) || 0;
                                            const rightSelRepeats = b.rightSelRepeats !== undefined ? b.rightSelRepeats : 1;
                                            const rSelWhpd = b.rightSelWhpd !== undefined ? b.rightSelWhpd : 1;
                                            const rightSelEnds = Math.round(rightSelvedge * rightSelRepeats * rSelWhpd) + (adj - Math.floor(adj / 2));

                                            totalEnds = leftSelEnds + leftBorderEnds + bodyEndsTotal + rightBorderEnds + rightSelEnds;
                                        }

                                        // Format breakdown string
                                        const selvedgeL = b.selvedge || 0;
                                        const borderL = b.leftBorder || 0;
                                        const bodyEnds = b.bodyEnds || 0;
                                        const bodyRepeats = b.bodyRepeats || 0;
                                        const bodyStr = (bodyRepeats > 0 && bodyEnds > 0) ? `${bodyRepeats} x ${bodyEnds}` : '';
                                        const borderR = b.rightBorder || 0;
                                        const selvedgeR = b.rightSelvedge || 0;
                                        const empty = b.remainingEmpty || 0;
                                        
                                        const parts = [];
                                        if (selvedgeL > 0) parts.push(selvedgeL);
                                        if (borderL > 0) parts.push(borderL);
                                        if (bodyStr) parts.push(bodyStr);
                                        if (borderR > 0) parts.push(borderR);
                                        if (selvedgeR > 0) parts.push(selvedgeR);
                                        const breakdownStr = parts.join(' | ') + (empty > 0 ? ` | ${empty} unallocated` : '') + (adj !== 0 ? ` | Adj: ${adj > 0 ? '+' : ''}${adj} ends` : '');

                                        return (
                                            <div style={{ 
                                                padding: '1rem', 
                                                background: 'var(--bg)', 
                                                borderRadius: '12px', 
                                                border: '1px solid var(--border)',
                                                display: 'flex',
                                                flexDirection: 'column',
                                                gap: '0.6rem'
                                            }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid var(--border)', paddingBottom: '0.4rem', marginBottom: '0.2rem' }}>
                                                    <span style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--muted)' }}>TOTAL HOOKS / ENDS</span>
                                                    <span style={{ fontSize: '0.85rem', fontWeight: 700, color: 'var(--accent)' }}>{selectedJalaObj.ends} Hooks / {totalEnds} Ends</span>
                                                </div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem' }}>
                                                    <span style={{ color: 'var(--muted)' }}>Left Selvedge / Border</span>
                                                    <span style={{ fontWeight: 600 }}>{selvedgeL} / {borderL}</span>
                                                </div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem' }}>
                                                    <span style={{ color: 'var(--muted)' }}>Body Ends x Repeats</span>
                                                    <span style={{ fontWeight: 600 }}>{bodyEnds} x {bodyRepeats} ({(bodyEnds * bodyRepeats)} ends)</span>
                                                </div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem' }}>
                                                    <span style={{ color: 'var(--muted)' }}>Right Border / Selvedge</span>
                                                    <span style={{ fontWeight: 600 }}>{borderR} / {selvedgeR}</span>
                                                </div>
                                                {empty > 0 && (
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--error)' }}>
                                                        <span>Unallocated Hooks</span>
                                                        <span style={{ fontWeight: 700 }}>{empty}</span>
                                                    </div>

  <script id="vishwa-theme-manager-js">
    function toggleTheme() {
      const isDark = !document.body.classList.contains('dark-mode');
      applyTheme(isDark);
      // Dispatch custom event for React components
      window.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark } }));
    }

    function applyTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
        document.body.classList.add('dark-mode');
        localStorage.setItem('vishwa_fashions_theme', 'true');
      } else {
        document.documentElement.classList.remove('dark-mode');
        document.body.classList.remove('dark-mode');
        localStorage.setItem('vishwa_fashions_theme', 'false');
      }
      
      const icon = document.getElementById('theme-toggle-icon');
      const text = document.getElementById('theme-toggle-text');
      if (icon) {
        icon.className = isDark ? 'ri-sun-line text-sm text-accent' : 'ri-moon-line text-sm text-accent';
      }
      if (text) {
        text.innerText = isDark ? 'Light Mode' : 'Dark Mode';
      }
    }

    (function() {
      const isDark = localStorage.getItem('vishwa_fashions_theme') === 'true' || 
                     (localStorage.getItem('vishwa_fashions_theme') === null && true);
      applyTheme(isDark);
    })();

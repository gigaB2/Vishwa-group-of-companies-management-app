  <script>
    (function() {
      /* clear check disabled */
      const isDark = localStorage.getItem('vishwa_fashions_theme') === 'true' || 
                     (localStorage.getItem('vishwa_fashions_theme') === null && true);
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
      } else {
        document.documentElement.classList.remove('dark-mode');
      }
      const isCollapsed = localStorage.getItem('vf_sidebar_collapsed') === 'true';
      if (isCollapsed) {
        document.documentElement.classList.add('vf-sidebar-collapsed');
      }
    })();
  </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Book — Vishwa Fashions</title>
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg:      #F9FAFB;
            --surface: #ffffff;
            --fg:      #1a1a2e;
            --muted:   #8b8fa3;
            --border:  #e8e7f1;
            --accent:  #8b5cf6;
            --accent2: #ec4899;
            --accent3: #f97316;
            --error:   #ef4444;
            --success: #10b981;

            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

            --radius: 16px;
            --container: 1300px;

            --shadow-sm:  0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md:  0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg:  0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-xl:  0 16px 48px rgba(0, 0, 0, 0.12);

            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
            --transition-slow: 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 4px;
            border: 2px solid var(--bg);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .dark-mode body {
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #0f0f1a 100%);
            --bg: #000000;
            --surface: #0a0a0a;
            --fg: #ffffff;
            --muted: #a1a1aa;
            --border: #27272a;
            --accent: #7c3aed;
        }

        /* Dark Mode Input & Dropdown Overrides */
        .dark-mode input:not(.bg-transparent),
        .dark-mode textarea:not(.bg-transparent),
        .dark-mode select:not(.bg-transparent) {
            background-color: var(--surface) !important;
            color: var(--fg) !important;
            border-color: var(--border) !important;
        }

        .dark-mode input,
        .dark-mode select,
        .dark-mode textarea {
            color-scheme: dark !important;
        }

        .dark-mode select option {
            background-color: #0a0a0a !important;
            color: var(--fg) !important;
        }

        .dark-mode input.bg-transparent,
        .dark-mode select.bg-transparent,
        .dark-mode textarea.bg-transparent {
            color: var(--fg) !important;
        }

        .dark-mode input:focus,
        .dark-mode textarea:focus,
        .dark-mode select:focus {
            background-color: var(--surface) !important;
            color: var(--fg) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15) !important;
        }

        .dark-mode input::placeholder,
        .dark-mode textarea::placeholder {
            color: var(--muted) !important;
            opacity: 0.7;
        }

        .app-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            opacity: 0.5;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            border: none;
            font-family: var(--font-body);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--fg);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--fg);
            font-family: var(--font-body);
            transition: all var(--transition-fast);
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .table-responsive table {
            min-width: auto;
            width: 100%;
        }

        .table-responsive th,
        .table-responsive td {
            min-width: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 1rem;
            border-radius: 8px;
            position: relative;
        }

        .table-responsive::-webkit-scrollbar {
            height: 10px;
        }
        .table-responsive::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 5px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        .table-responsive::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        th {
            text-align: center;
            padding: 1rem 0.5rem;
            border-bottom: 2px solid var(--border);
            font-family: var(--font-body);
            font-weight: 700;
            color: var(--fg);
            background: linear-gradient(to bottom, rgba(139, 92, 246, 0.04), transparent);
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        th[onClick] {
            cursor: pointer;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        th[onClick]:hover {
            background: linear-gradient(to bottom, rgba(139, 92, 246, 0.08), rgba(139, 92, 246, 0.02));
            color: var(--accent);
        }

        td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            text-align: center;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
            max-width: 300px;
            overflow: hidden;
        }

        tr:hover td {
            background: rgba(139, 92, 246, 0.02);
        }

        .badge {
            display: inline-flex;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-warp { background: rgba(139, 92, 246, 0.1); color: var(--accent); }
        .badge-weft { background: rgba(236, 72, 153, 0.1); color: var(--accent2); }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-completed { background: rgba(139, 143, 163, 0.1); color: var(--muted); }

        .progress-mini-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-mini-text {
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .progress-mini-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: var(--bg);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 0.75rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.5s ease;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 4rem 1rem;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 800px;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: visible;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card h3 {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: var(--font-display);
            letter-spacing: -1px;
        }

        .variance-positive { color: var(--success); }
        .variance-negative { color: var(--error); }

        /* Searchable Dropdown Styles */
        .select-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .select-input-wrapper i {
            position: absolute;
            right: 1.25rem;
            pointer-events: none;
            color: var(--muted);
            font-size: 1rem;
            font-style: normal;
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 16px;
            margin-top: 0.75rem;
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Specific scrollbar for dropdown list */
        .dropdown-list::-webkit-scrollbar {
            width: 6px;
        }

        .dropdown-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .dropdown-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .dropdown-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            opacity: 0.5;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            color: var(--fg);
            border-bottom: 1px solid var(--border);
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(139, 92, 246, 0.08);
            color: var(--accent);
            padding-left: 1.5rem;
        }

        .dropdown-item.selected {
            background: rgba(139, 92, 246, 0.12);
            color: var(--accent);
            font-weight: 700;
        }

        .dropdown-empty {
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* Timeline styles */
        .timeline-container {
            position: relative;
            padding-left: 2rem;
            border-left: 2px dashed var(--border);
            margin-left: 1rem;
        }

        .timeline-event {
            position: relative;
            padding-bottom: 2rem;
        }

        .timeline-dot {
            position: absolute;
            left: -2.45rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--surface);
            border: 3px solid var(--accent);
            z-index: 2;
        }

        .timeline-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .timeline-card.highlighted {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            transform: scale(1.02);
        }

        /* Heat map styles */
        .heat-map-container {
            padding: 2.5rem;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-top: 1rem;
        }
        .calendar-day {
            min-height: 185px;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .calendar-day:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            z-index: 10;
            border-color: var(--accent);
        }
        .day-number {
            font-weight: 750;
            font-size: 1.05rem;
            color: var(--fg);
            font-family: var(--font-display);
        }
        .day-content {
            font-size: 0.72rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-weight: 600;
            overflow-y: auto;
            max-height: 125px;
            padding-right: 4px;
        }
        .day-content::-webkit-scrollbar { width: 3px; }
        .day-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .item-detail-line {
            padding: 5px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.05);
            line-height: 1.3;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }
        .item-detail-line:hover {
            box-shadow: var(--shadow-sm);
            transform: scale(1.02);
            z-index: 5;
            filter: brightness(0.95);
        }

        .item-pill-ordered {
            background: #E9D5FF;
            color: #333333;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .item-pill-received {
            background: #DCFCE7;
            color: #333333;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .item-pill-gr {
            background: #FFEDD5;
            color: #333333;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .heat-level-0 { background-color: var(--bg); opacity: 0.5; }
        .heat-level-1 { background-color: rgba(139, 92, 246, 0.1); }
        .heat-level-2 { background-color: rgba(139, 92, 246, 0.25); }
        .heat-level-3 { background-color: rgba(139, 92, 246, 0.45); }
        .heat-level-4 { background-color: rgba(139, 92, 246, 0.7); }
        .heat-level-5 { background-color: rgba(139, 92, 246, 0.95); }

        .heat-level-4 .day-number, .heat-level-5 .day-number { color: white; }

        .dark-mode .heat-level-0 { background-color: #1a1a1a; }
        .dark-mode .heat-level-1 { background-color: rgba(124, 58, 237, 0.15); }
        .dark-mode .heat-level-2 { background-color: rgba(124, 58, 237, 0.3); }
        .dark-mode .heat-level-3 { background-color: rgba(124, 58, 237, 0.5); }
        .dark-mode .heat-level-4 { background-color: rgba(124, 58, 237, 0.75); }
        .dark-mode .heat-level-5 { background-color: rgba(124, 58, 237, 1); }

        /* Loading Overlay for Scanning */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: var(--radius);
            backdrop-filter: blur(4px);
        }
        .dark-mode .loading-overlay {
            background: rgba(0, 0, 0, 0.7);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>



  <!-- Vishwa Fashions Moving Background System Styles -->
  <style id="vf-moving-background-styles">
    .mesh-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -50;
      overflow: hidden;
      pointer-events: none;
      transition: background 0.4s ease;
    }
    .mesh-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .orb-purple {
      top: -10%;
      left: -10%;
      width: 55%;
      height: 55%;
      filter: blur(130px);
    }
    .orb-pink {
      bottom: -15%;
      right: -10%;
      width: 60%;
      height: 60%;
      filter: blur(150px);
      animation-delay: 2s !important;
    }
    .orb-orange {
      top: 35%;
      right: 20%;
      width: 45%;
      height: 45%;
      filter: blur(120px);
      animation-delay: 4s !important;
    }
    
    .mesh-grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(139, 92, 246, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Mesh Background Variables & Animations */
    :root {
      --mesh-bg-gradient: linear-gradient(135deg, #f8f7fc 0%, #faf5ff 50%, #f0f4ff 100%);
      --orb-opacity-1: 0.05;
      --orb-opacity-2: 0.04;
      --orb-opacity-3: 0.03;
    }
    .dark-mode {
      --mesh-bg-gradient: #000000;
      --orb-opacity-1: 0.12;
      --orb-opacity-2: 0.08;
      --orb-opacity-3: 0.05;
    }
    @keyframes pulse-slow {
      0%, 100% {
        transform: scale(1) translate(0px, 0px);
      }
      50% {
        transform: scale(1.08) translate(15px, -15px);
      }
    }
    .animate-pulse-slow {
      animation: pulse-slow 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>

  <script src="../../sidebar.js" defer></script>

<body>

  <!-- Background Gradients Mesh (Ethereal Vibe matching design.md) -->
  <div class="mesh-container" style="background: var(--mesh-bg-gradient)">
    <!-- Accent Purple glow top-left -->
    <div class="mesh-orb orb-purple animate-pulse-slow" style="background-color: var(--accent); opacity: var(--orb-opacity-1);"></div>
    <!-- Accent2 Pink glow bottom-right -->
    <div class="mesh-orb orb-pink animate-pulse-slow" style="background-color: var(--accent2); opacity: var(--orb-opacity-2);"></div>
    <!-- Accent3 Orange glow middle-left -->
    <div class="mesh-orb orb-orange animate-pulse-slow" style="background-color: var(--accent3); opacity: var(--orb-opacity-3);"></div>

        // Custom Hook for LocalStorage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.log(error);
                    return initialValue;
                }
            });

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === key) {
                        try {
                            const item = window.localStorage.getItem(key);
                            const newValue = item ? JSON.parse(item) : initialValue;
                            setStoredValue(newValue);
                        } catch (error) {
                            console.error('Error parsing storage change:', error);
                        }
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [key, initialValue]);

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.log(error);
                }
            };

            return [storedValue, setValue];
        }

            const dropdownRef = React.useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                        setSearch('');
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filteredOptions = (options || []).filter(opt => 
                (opt || '').toString().toLowerCase().includes(search.toLowerCase())

                        <input

            if (!dateStr) return dateStr;
            if (dateStr.includes('T') || dateStr.includes(':') || dateStr.length > 10) {
                return dateStr;
            }
            const now = new Date();
            const pad = (num) => String(num).padStart(2, '0');
            const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${String(now.getMilliseconds()).padStart(3, '0')}`;
            return `${dateStr}T${timeStr}`;
        };

            const allCombinations = useMemo(() => {

                    combos.push({ quality: q.quality, supplier: q.supplier, code: q.code, color: q.color, type: 'All' });
                });
                const seen = new Set();
                return combos.filter(c => {
                    const key = `${c.quality}|${c.supplier}|${c.code}|${c.color}|${c.type}`;
                    if (seen.has(key)) return false;
                    seen.add(key);

                });
            }, [qualities, orders]);

            const getOrderOptions = (field) => {
                const otherFilters = { quality: qualityFilter, supplier: supplierFilter, code: codeFilter, color: colorFilter, type: filterType === 'All' ? null : filterType };
                delete otherFilters[field];
                const relevantCombos = allCombinations.filter(c => Object.keys(otherFilters).every(k => !otherFilters[k] || c[k] === otherFilters[k]));
                return [...new Set(relevantCombos.map(c => c[field]).filter(Boolean))].sort();
            };

            const filteredOrders = useMemo(() => {
                let filtered = orders;
                if (filterType !== 'All') filtered = filtered.filter(o => o.type === filterType);
                if (qualityFilter) filtered = filtered.filter(o => o.quality === qualityFilter);
                if (supplierFilter) filtered = filtered.filter(o => o.supplier === supplierFilter);
                if (codeFilter) filtered = filtered.filter(o => o.code === codeFilter);
                if (colorFilter) filtered = filtered.filter(o => o.color === colorFilter);
                if (fromDate || toDate) {
                    filtered = filtered.filter(o => {
                        const d = new Date(o.orderDate || o.createdAt);
                        d.setHours(0,0,0,0);
                        if (fromDate && d < new Date(fromDate)) return false;
                        if (toDate && d > new Date(toDate)) return false;
                        return true;
                    });
                }
                if (orderSearch.trim()) {
                    const isExact = orderSearch.includes(',');
                    const terms = orderSearch.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
                    filtered = filtered.filter(o => {
                        const searchParts = [
                            o.id, o.quality, o.code, o.color, o.supplier, o.type, o.status, o.orderedWeight, o.price, 
                            new Date(o.orderDate || o.createdAt).toLocaleDateString('en-GB')
                        ];
                        
                        let hasActualGR = false;
                        (o.batches || []).forEach(b => {
                            searchParts.push(b.challanNumber, b.lotNumber, b.totalWeight);
                            if (b.receiveDate) searchParts.push(new Date(b.receiveDate).toLocaleDateString('en-GB'));
                            
                            (b.boxes || []).forEach(box => {
                                const weight = Number(box.weight) || 0;
                                const retWeight = Number(box.returnedWeight) || 0;
                                const netWeight = weight - retWeight;
                                searchParts.push(box.boxNumber, box.cones, box.weight, box.returnedWeight, netWeight.toFixed(1));
                                if (box.returnedDate) searchParts.push(new Date(box.returnedDate).toLocaleDateString('en-GB'));
                                if (retWeight > 0) hasActualGR = true;
                            });
                        });
                        
                        const searchPartsLower = searchParts.map(v => (v ?? '').toString().toLowerCase());
                        const finalContent = searchPartsLower.join(' ');
                        
                        return terms.every(term => {
                            if (isExact) {
                                // EXACT MATCH: Check if any field exactly equals the term
                                return searchPartsLower.some(val => val === term) || (term === 'gr' && hasActualGR);
                            } else {
                                // PARTIAL MATCH: Check if any field contains the term as a substring
                                return finalContent.includes(term) || (term === 'gr' && hasActualGR);
                            }
                        });

                    for (const sort of orderSort) {
                        let valA, valB;
                        if (sort.key === 'orderDate' || sort.key === 'createdAt') { valA = new Date(a[sort.key] || a.createdAt); valB = new Date(b[sort.key] || b.createdAt); }
                        else if (sort.key === 'received') { valA = (a.batches || []).reduce((acc, b) => acc + b.totalWeight, 0); valB = (b.batches || []).reduce((acc, b) => acc + b.totalWeight, 0); }
                        else if (sort.key === 'orderedWeight' || sort.key === 'price') { valA = Number(a[sort.key] || 0); valB = Number(b[sort.key] || 0); }
                        else { valA = (a[sort.key] || "").toString().toLowerCase(); valB = (b[sort.key] || "").toString().toLowerCase(); }
                        if (valA < valB) return sort.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sort.direction === 'asc' ? 1 : -1;
                    }
                    // Default / Tie-breaker: Newer orders on top
                    const dateA = new Date(a.orderDate || a.createdAt);
                    const dateB = new Date(b.orderDate || b.createdAt);
                    if (dateB - dateA !== 0) return dateB - dateA;
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });
            }, [orders, filterType, orderSearch, fromDate, toDate, orderSort, qualityFilter, supplierFilter, codeFilter, colorFilter]);

            const [paramsProcessed, setParamsProcessed] = useState(false);

            useEffect(() => {
                if (paramsProcessed) return;

                const params = new URLSearchParams(window.location.search);
                const searchParam = params.get('search');
                const openDetailsParam = params.get('openDetails');

                if (searchParam) {
                    setOrderSearch(searchParam);
                    
                    if (openDetailsParam === 'true') {
                        // Find the order and open it
                        const order = orders.find(o => String(o.id) === searchParam);
                        if (order) {
                            setSelectedOrder(order);
                            setParamsProcessed(true);
                            // Clear params from URL
                            window.history.replaceState({}, '', window.location.pathname);
                        }
                    } else {
                        setParamsProcessed(true);
                        window.history.replaceState({}, '', window.location.pathname);
                    }
                } else {
                    setParamsProcessed(true);
                }
            }, [orders, paramsProcessed]);

            const stats = useMemo(() => {
                const calc = (list) => {
                    let o = 0, r = 0, g = 0;
                    list.forEach(item => {
                        o += Number(item.orderedWeight);
                        (item.batches || []).forEach(b => {
                            r += b.totalWeight;
                            (b.boxes || []).forEach(box => g += (box.returnedWeight || 0));
                        });
                    });
                    return { ordered: o, received: r, gr: g };
                };
                const active = filteredOrders.filter(o => o.status === 'Active');
                const completed = filteredOrders.filter(o => o.status === 'Completed');
                const sA = calc(active), sC = calc(completed), sT = calc(filteredOrders);
                return {
                    active: { count: active.length, load: sA.ordered, gr: sA.gr, pending: Math.max(0, sA.ordered - sA.received) },
                    completed: { count: completed.length, load: sC.ordered, gr: sC.gr, received: sC.received },
                    total: { count: filteredOrders.length, load: sT.ordered, gr: sT.gr, received: sT.received }
                };
            }, [filteredOrders]);

            const toggleSort = (prev, key) => {
                const existingIndex = prev.findIndex(s => s.key === key);
                if (existingIndex > -1) {
                    const current = prev[existingIndex];
                    if (current.direction === 'desc') {
                        const next = [...prev];
                        next[existingIndex] = { key, direction: 'asc' };
                        return next;
                    } else {
                        return prev.filter(s => s.key !== key);
                    }
                } else {
                    return [...prev, { key, direction: 'desc' }];
                }
            };

            const requestOrderSort = (key) => setOrderSort(prev => toggleSort(prev, key));
            const requestQualitySort = (key) => setQualitySort(prev => toggleSort(prev, key));
            const requestSupplierSort = (key) => setSupplierSort(prev => toggleSort(prev, key));

            const addOrder = (o) => {
                const q = qualities.find(x => x.quality === o.quality && x.code === o.code && x.color === o.color && x.supplier === o.supplier);
                const orderDate = addTimestampToDate(o.orderDate);
                setOrders([...orders, { ...o, orderDate, qualityId: q?.id, id: Date.now().toString(), createdAt: new Date().toISOString(), status: 'Active', batches: [] }]);
                setShowOrderModal(false);
            };

            const handleQualitySubmit = (d) => {
                const cap = (s) => {
                    if (!s) return '';
                    return s.trim().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                };
                const fd = { quality: cap(d.quality), code: cap(d.code), color: cap(d.color), type: d.type || 'Other', supplier: cap(d.supplier) };
                if (qualities.some(q => q.quality.toLowerCase() === fd.quality.toLowerCase() && q.code.toLowerCase() === fd.code.toLowerCase() && q.color.toLowerCase() === fd.color.toLowerCase() && q.supplier.toLowerCase() === fd.supplier.toLowerCase() && (!editingQuality || q.id !== editingQuality.id))) {
                    alert('Quality already exists.'); return;
                }
                if (editingQuality) {
                    setQualities(qualities.map(q => q.id === editingQuality.id ? { ...q, ...fd } : q));
                    setOrders(orders.map(o => (o.qualityId === editingQuality.id || (!o.qualityId && o.quality === editingQuality.quality && o.code === editingQuality.code && o.color === editingQuality.color && o.supplier === editingQuality.supplier)) ? { ...o, ...fd, qualityId: editingQuality.id } : o));
                    
                    // Propagate changes to other tables
                    try {
                        const old = editingQuality;
                        const match = (val, target) => (val || '').toString().trim().toLowerCase() === (target || '').toString().trim().toLowerCase();
 
                        // Update Warp Beams
                        const beams = JSON.parse(localStorage.getItem('warp-beams') || '[]');
                        const updatedBeams = beams.map(b => (match(b.quality, old.quality) && match(b.code, old.code) && match(b.color, old.color)) ? { ...b, quality: fd.quality, code: fd.code, color: fd.color } : b);
                        if (JSON.stringify(beams) !== JSON.stringify(updatedBeams)) localStorage.setItem('warp-beams', JSON.stringify(updatedBeams));
 
                        // Update Warp Issues
                        const wIssues = JSON.parse(localStorage.getItem('warp-issues') || '[]');
                        const updatedWIssues = wIssues.map(i => (match(i.quality, old.quality) && match(i.code, old.code) && match(i.color, old.color)) ? { ...i, quality: fd.quality, code: fd.code, color: fd.color } : i);
                        if (JSON.stringify(wIssues) !== JSON.stringify(updatedWIssues)) localStorage.setItem('warp-issues', JSON.stringify(updatedWIssues));
 
                        // Update Weft Issues (yarn-issues)
                        const yIssues = JSON.parse(localStorage.getItem('yarn-issues') || '[]');
                        const updatedYIssues = yIssues.map(i => (match(i.quality, old.quality) && match(i.code, old.code) && match(i.color, old.color) && match(i.supplier, old.supplier)) ? { ...i, quality: fd.quality, code: fd.code, color: fd.color, supplier: fd.supplier } : i);
                        if (JSON.stringify(yIssues) !== JSON.stringify(updatedYIssues)) localStorage.setItem('yarn-issues', JSON.stringify(updatedYIssues));
 
                        // Update Production Logs
                        const pLogs = JSON.parse(localStorage.getItem('productionLogs') || '[]');
                        const matchingBeams = updatedBeams.filter(b => b.quality === fd.quality && b.code === fd.code && b.color === fd.color).map(b => b.beamNumber);
                        const updatedPLogs = pLogs.map(l => {
                            const isMatch = (l.beamNumber && matchingBeams.includes(l.beamNumber)) || match(l.product, old.quality);
                            return isMatch ? { ...l, product: fd.quality } : l;
                        });
                        if (JSON.stringify(pLogs) !== JSON.stringify(updatedPLogs)) localStorage.setItem('productionLogs', JSON.stringify(updatedPLogs));
                    } catch (e) { console.error("Sync error:", e); }
                } else setQualities([...qualities, { ...fd, id: Date.now().toString(), createdAt: new Date().toISOString() }]);
                setShowQualityModal(false); setEditingQuality(null);
            };

            const handleSupplierSubmit = (d) => {
                const cap = (s) => (s || '').trim().charAt(0).toUpperCase() + (s || '').trim().slice(1);
                const fd = { ...d, name: cap(d.name) };
                if (suppliers.some(s => s.name.toLowerCase() === fd.name.toLowerCase() && (!editingSupplier || s.id !== editingSupplier.id))) {
                    alert('Supplier already exists.'); return;
                }
                if (editingSupplier) {
                    setSuppliers(suppliers.map(s => s.id === editingSupplier.id ? { ...s, ...fd } : s));
                    // Also update supplier name in qualities and orders if name changed
                    if (editingSupplier.name !== fd.name) {
                        setQualities(qualities.map(q => q.supplier === editingSupplier.name ? { ...q, supplier: fd.name } : q));
                        setOrders(orders.map(o => o.supplier === editingSupplier.name ? { ...o, supplier: fd.name } : o));

                        // Update Weft Issues (yarn-issues)
                        try {
                            const yIssues = JSON.parse(localStorage.getItem('yarn-issues') || '[]');
                            const updatedYIssues = yIssues.map(i => i.supplier === editingSupplier.name ? { ...i, supplier: fd.name } : i);
                            if (JSON.stringify(yIssues) !== JSON.stringify(updatedYIssues)) localStorage.setItem('yarn-issues', JSON.stringify(updatedYIssues));
                        } catch (e) { console.error("Sync error:", e); }
                    }
                } else setSuppliers([...suppliers, { ...fd, id: Date.now().toString(), createdAt: new Date().toISOString() }]);
                setShowSupplierModal(false); setEditingSupplier(null);
            };

            const deleteQuality = (id) => confirm('Delete quality?') && setQualities(qualities.filter(q => q.id !== id));
            const deleteSupplier = (id) => confirm('Delete supplier?') && setSuppliers(suppliers.filter(s => s.id !== id));
            const updateOrder = (o) => {
                const processed = { ...o, orderDate: addTimestampToDate(o.orderDate) };
                setOrders(orders.map(x => x.id === o.id ? processed : x));
                if (selectedOrder?.id === o.id) setSelectedOrder(processed);
            };
            const completeOrder = (id) => setOrders(orders.map(o => o.id === id ? { ...o, status: 'Completed' } : o));
            const showDeletionToast = (msg) => {
                const toast = document.createElement('div');
                toast.innerText = msg;
                toast.style.position = 'fixed';
                toast.style.bottom = '2rem';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.background = 'linear-gradient(135deg, var(--accent), var(--accent2))';
                toast.style.color = 'white';
                toast.style.padding = '1rem 2rem';
                toast.style.borderRadius = '12px';
                toast.style.boxShadow = 'var(--shadow-lg)';
                toast.style.zIndex = '99999';
                toast.style.fontFamily = 'var(--font-body)';
                toast.style.fontSize = '0.9rem';
                toast.style.fontWeight = '600';
                toast.style.textAlign = 'center';
                toast.style.pointerEvents = 'none';
                toast.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(10px)';
                    setTimeout(() => toast.remove(), 400);
                }, 4000);
            };

            const deleteOrder = (id) => {
                const targetOrder = orders.find(o => o.id === id);
                if (!targetOrder) return;
                
                const warningMsg = `WARNING: Deleting this order will permanently delete all associated stock, issues, and beams for this quality (${targetOrder.quality}) across the entire application!\n\nAre you sure you want to proceed with deleting this item in the whole app?`;
                
                if (confirm(warningMsg)) {
                    setOrders(orders.filter(o => o.id !== id));
                    
                    try {
                        const match = (val, target) => (val || '').toString().trim().toLowerCase() === (target || '').toString().trim().toLowerCase();
                        
                        // Delete associated warp beams
                        const beams = JSON.parse(localStorage.getItem('warp-beams') || '[]');
                        const updatedBeams = beams.filter(b => !(match(b.quality, targetOrder.quality) && match(b.code, targetOrder.code) && match(b.color, targetOrder.color)));
                        localStorage.setItem('warp-beams', JSON.stringify(updatedBeams));

                        // Delete associated warp issues
                        const wIssues = JSON.parse(localStorage.getItem('warp-issues') || '[]');
                        const updatedWIssues = wIssues.filter(i => !(match(i.quality, targetOrder.quality) && match(i.code, targetOrder.code) && match(i.color, targetOrder.color)));
                        localStorage.setItem('warp-issues', JSON.stringify(updatedWIssues));

                        // Delete associated yarn issues (weft)
                        const yIssues = JSON.parse(localStorage.getItem('yarn-issues') || '[]');
                        const updatedYIssues = yIssues.filter(i => !(match(i.quality, targetOrder.quality) && match(i.code, targetOrder.code) && match(i.color, targetOrder.color) && match(i.supplier, targetOrder.supplier)));
                        localStorage.setItem('yarn-issues', JSON.stringify(updatedYIssues));

                        showDeletionToast(`Order for ${targetOrder.quality} deleted. Associated stock, beams, and issues removed across the app.`);
                    } catch (e) {
                        console.error("Propagation error during deletion:", e);
                    }
                }
            };

            const sortedQualities = useMemo(() => {
                let f = qualities;
                if (qualitySearch.trim()) {
                    const ts = qualitySearch.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
                    f = qualities.filter(q => { const c = `${q.quality} ${q.code} ${q.color} ${q.supplier}`.toLowerCase(); return ts.every(t => c.includes(t)); });
                }
                return [...f].sort((a, b) => {
                    if (qualitySort.length === 0) {
                        return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                    for (const sort of qualitySort) {
                        let vA, vB;
                        if (sort.key === 'createdAt') { vA = new Date(a.createdAt); vB = new Date(b.createdAt); }
                        else { vA = (a[sort.key] || "").toString().toLowerCase(); vB = (b[sort.key] || "").toString().toLowerCase(); }
                        if (vA < vB) return sort.direction === 'asc' ? -1 : 1;
                        if (vA > vB) return sort.direction === 'asc' ? 1 : -1;
                    }
                    return 0;
                });
            }, [qualities, qualitySearch, qualitySort]);

            const sortedSuppliers = useMemo(() => {
                let f = suppliers;
                if (supplierSearch.trim()) {
                    const ts = supplierSearch.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
                    f = suppliers.filter(s => { const c = `${s.name} ${s.contact} ${s.phone} ${s.email} ${s.address}`.toLowerCase(); return ts.every(t => c.includes(t)); });
                }
                return [...f].sort((a, b) => {
                    if (supplierSort.length === 0) {
                        return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                    for (const sort of supplierSort) {
                        let vA, vB;
                        if (sort.key === 'createdAt') { vA = new Date(a.createdAt); vB = new Date(b.createdAt); }
                        else { vA = (a[sort.key] || "").toString().toLowerCase(); vB = (b[sort.key] || "").toString().toLowerCase(); }
                        if (vA < vB) return sort.direction === 'asc' ? -1 : 1;
                        if (vA > vB) return sort.direction === 'asc' ? 1 : -1;
                    }
                    return 0;
                });
            }, [suppliers, supplierSearch, supplierSort]);

            const SortIndicator = ({ sortConfig, columnKey }) => {
                const config = sortConfig.find(s => s.key === columnKey);
                const index = sortConfig.findIndex(s => s.key === columnKey);
                if (!config) return <span style={{ opacity: 0.2, marginLeft: '0.4rem' }}>↕</span>;
                return (
                    <span style={{ marginLeft: '0.4rem', color: 'var(--accent)', fontWeight: 'bold' }}>
                        {config.direction === 'asc' ? '↑' : '↓'}
                        {sortConfig.length > 1 && <small style={{fontSize: '0.6rem', marginLeft: '1px', opacity: 0.8}}>{index + 1}</small>}
                    </span>
                );
            };

            const handleOrderFilterSelect = (field, value) => {
                const newFilters = { 
                    quality: qualityFilter, 
                    supplier: supplierFilter, 
                    code: codeFilter, 
                    color: colorFilter,
                    [field]: value 
                };
                
                let filtered = allCombinations.filter(q => {
                    return (!newFilters.quality || q.quality === newFilters.quality) &&
                           (!newFilters.code || q.code === newFilters.code) &&
                           (!newFilters.color || q.color === newFilters.color) &&
                           (!newFilters.supplier || q.supplier === newFilters.supplier) &&
                           (filterType === 'All' || q.type === filterType);
                });

                const fields = ['quality', 'supplier', 'code', 'color'];
                const updated = { ...newFilters };
                fields.forEach(f => {
                    const options = [...new Set(filtered.map(item => item[f]))].filter(Boolean);
                    if (options.length === 1) updated[f] = options[0];
                });

                setQualityFilter(updated.quality);
                setSupplierFilter(updated.supplier);
                setCodeFilter(updated.code);
                setColorFilter(updated.color);
            };

            return (
                <div className="app-container">
                    <header>
                        <div className="logo-section">
                            <span className="logo" onClick={() => setView('orders')} style={{cursor: 'pointer'}}>
                                {view === 'orders' ? 'RM Orders' : view === 'analytics' ? 'RM order analytics' : view === 'heat-map' ? 'RM delivery heat map' : 'RM Order Book'}
                            </span>
                        </div>
                        <div style={{ display: 'flex', gap: '1rem' }}>
                            <button className={`btn vf-top-tab-hidden ${view === 'analytics' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('analytics')}>📊 RM order analytics</button>
                            <button className={`btn vf-top-tab-hidden ${view === 'orders' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('orders')}>📦 RM Orders</button>
                            <button className={`btn vf-top-tab-hidden ${view === 'heat-map' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('heat-map')}>🔥 RM delivery heat map</button>
                            {view !== 'analytics' && (
                                <button className="btn btn-primary" onClick={() => setShowOrderModal(true)}>+ Add New Order</button>
                            )}

                        </div>
                    </header>

                    {view === 'orders' ? (
                        <React.Fragment>
                            <div className="card" style={{ overflow: 'visible', zIndex: 100, marginBottom: '2rem' }}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem'}}>
                                    <h3>Order Filters</h3>
                                    <div style={{display: 'flex', gap: '1rem', alignItems: 'center'}}>
                                        <div style={{display: 'flex', gap: '0.5rem', background: 'var(--bg)', padding: '0.25rem', borderRadius: '10px'}}>
                                            {['All', 'Warp', 'Weft'].map(type => (
                                                <button 
                                                    key={type}
                                                    className="btn" 
                                                    style={{
                                                        padding: '0.4rem 1rem', 
                                                        fontSize: '0.85rem',
                                                        background: filterType === type ? 'var(--surface)' : 'transparent',
                                                        boxShadow: filterType === type ? 'var(--shadow-sm)' : 'none',
                                                        color: filterType === type ? 'var(--accent)' : 'var(--muted)'
                                                    }}
                                                    onClick={() => {
                                                        const currentFilters = { quality: qualityFilter, supplier: supplierFilter, code: codeFilter, color: colorFilter };
                                                        const newFilters = { ...currentFilters, type: type === 'All' ? null : type };
                                                        let filtered = allCombinations.filter(c => {
                                                            return (!newFilters.type || c.type === newFilters.type) &&
                                                                   (!newFilters.quality || c.quality === newFilters.quality) &&
                                                                   (!newFilters.code || c.code === newFilters.code) &&
                                                                   (!newFilters.color || c.color === newFilters.color) &&
                                                                   (!newFilters.supplier || c.supplier === newFilters.supplier);
                                                        });
                                                        
                                                        const fields = ['quality', 'supplier', 'code', 'color'];
                                                        fields.forEach(f => {
                                                            const options = [...new Set(filtered.map(item => item[f]))].filter(Boolean);
                                                            if (options.length === 1) {
                                                                if (f === 'quality') setQualityFilter(options[0]);
                                                                else if (f === 'supplier') setSupplierFilter(options[0]);
                                                                else if (f === 'code') setCodeFilter(options[0]);
                                                                else if (f === 'color') setColorFilter(options[0]);
                                                            }
                                                        });
                                                        setFilterType(type);
                                                    }}
                                                >
                                                    {type}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr) auto', gap: '1rem', alignItems: 'end', marginBottom: '1.5rem' }}>
                                        <SearchableDropdown 
                                            label="Quality"
                                            placeholder="Search quality..."
                                            options={getOrderOptions('quality')}
                                            value={qualityFilter}
                                            onChange={val => handleOrderFilterSelect('quality', val)}
                                            emptyLabel="-- All Qualities --"
                                        />
                                        <SearchableDropdown 
                                            label="Code"
                                            placeholder="Search code..."
                                            options={getOrderOptions('code')}
                                            value={codeFilter}
                                            onChange={val => handleOrderFilterSelect('code', val)}
                                            emptyLabel="-- All Codes --"
                                        />
                                        <SearchableDropdown 
                                            label="Color"
                                            placeholder="Search color..."
                                            options={getOrderOptions('color')}
                                            value={colorFilter}
                                            onChange={val => handleOrderFilterSelect('color', val)}
                                            emptyLabel="-- All Colors --"
                                        />
                                        <SearchableDropdown 
                                            label="Supplier"
                                            placeholder="Search supplier..."
                                            options={getOrderOptions('supplier')}
                                            value={supplierFilter}
                                            onChange={val => handleOrderFilterSelect('supplier', val)}
                                            emptyLabel="-- All Suppliers --"
                                        />
                                        <div className="input-group" style={{ marginBottom: 0 }}>
                                            <label>From Date</label>
                                            <input type="date" value={fromDate} onChange={e => setFromDate(e.target.value)} style={{ borderRadius: '12px' }} />
                                        </div>
                                        <div className="input-group" style={{ marginBottom: 0 }}>
                                            <label>To Date</label>
                                            <input type="date" value={toDate} onChange={e => setToDate(e.target.value)} style={{ borderRadius: '12px' }} />
                                        </div>
                                        <button 
                                            className="btn btn-outline" 
                                            style={{padding: '0.75rem', borderRadius: '12px', alignSelf: 'end'}}
                                            onClick={() => { 
                                                setFromDate(''); setToDate(''); setOrderSearch(''); 
                                                setQualityFilter(''); setSupplierFilter(''); setCodeFilter(''); setColorFilter('');
                                            }}
                                            title="Clear Filters"
                                        >
                                            🔄 Filters
                                        </button>
                                    </div>

                                    <div className="input-group" style={{ marginBottom: 0 }}>
                                        <label>Search Orders</label>
                                        <input 
                                            type="text" 
                                            placeholder="Search quality, code, challan, lot, box... (use comma for multiple)" 
                                            value={orderSearch}
                                            onChange={e => setOrderSearch(e.target.value)}
                                            style={{ borderRadius: '12px' }}
                                        />
                                    </div>
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1.5rem', marginBottom: '2rem' }}>
                                <div className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.25rem' }}>
                                        <h3 style={{ fontSize: '1rem' }}>Active orders</h3>
                                        <div style={{ fontSize: '0.8rem', color: 'var(--muted)' }}>Current deals</div>
                                    </div>
                                    <div className="dashboard-grid" style={{ gridTemplateColumns: 'repeat(2, 1fr)', gap: '1rem', marginBottom: 0 }}>
                                        <div className="stat-card" style={{ boxShadow: 'none', border: '1px solid var(--border)', padding: '1rem', borderRadius: '12px' }}>
                                            <h3 style={{fontSize: '0.8rem'}}>Count</h3>
                                            <div className="value" style={{ fontSize: '1.5rem', color: 'var(--success)' }}>{stats.active.count}</div>
                                        </div>
                                        <div className="stat-card" style={{ boxShadow: 'none', border: '1px solid var(--border)', padding: '1rem', borderRadius: '12px' }}>
                                            <h3 style={{fontSize: '0.8rem'}}>Load (kg)</h3>
                                            <div className="value" style={{ fontSize: '1.5rem', color: 'var(--accent2)' }}>{stats.active.load.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 })}</div>
                                        </div>
                                        <div className="stat-card" style={{ boxShadow: 'none', border: '1px solid var(--border)', padding: '1rem', borderRadius: '12px' }}>
                                            <h3 style={{ color: 'var(--accent3)', fontSize: '0.8rem' }}>GR (kg)</h3>

                                                    acc + (batch.boxes || []).reduce((boxAcc, box) => boxAcc + (box.returnedWeight || 0), 0)
                                                , 0);
                                                const totalToDisplay = netReceived + totalReturned;
                                                const scaleBase = Math.max(order.orderedWeight, totalToDisplay);
                                                const netWithoutSurplus = Math.min(netReceived, order.orderedWeight);
                                                const surplus = Math.max(0, netReceived - order.orderedWeight);
                                                
                                                const netProgress = (netWithoutSurplus / scaleBase) * 100;
                                                const returnedProgress = (totalReturned / scaleBase) * 100;
                                                const surplusProgress = (surplus / scaleBase) * 100;
                                                return (
                                                    <tr key={order.id}>

                                                            <div style={{display: 'flex', gap: '0.4rem', justifyContent: 'center'}}>

                                                                <button className="btn btn-outline" style={{padding: '0.3rem 0.6rem', color: 'var(--error)', borderColor: 'transparent'}} onClick={() => deleteOrder(order.id)}>🗑️</button>
                                                            </div>
                                                        </td>

                            )}

                            <div style={{display: 'flex', gap: '1rem', marginTop: '1rem'}}>
                                <button 
                                    className="btn btn-primary" 
                                    style={{flex: 1, opacity: (isFormIncomplete || duplicateEntry || colorMismatchEntry) ? 0.5 : 1}} 
                                    onClick={() => {
                                        const trimmedData = {
                                            quality: formData.quality.trim(),
                                            code: formData.code.trim(),
                                            color: formData.color.trim(),
                                            type: formData.type || 'Polyester',
                                            supplier: formData.supplier.trim()
                                        };
                                        onSubmit(trimmedData);
                                    }}
                                    disabled={isFormIncomplete || duplicateEntry || colorMismatchEntry}
                                >
                                    {initialData ? 'Update Quality' : 'Add Quality'}
                                </button>
                                <button className="btn btn-outline" onClick={onClose}>Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const OrderFormModal = ({ onClose, onSubmit, qualities }) => {
            const [formData, setFormData] = useState({
                orderDate: new Date().toISOString().split('T')[0],
                supplier: '', quality: '', code: '', color: '', type: 'Warp', price: '', orderedWeight: ''
            });

            const getFilteredOptions = (field) => {
                let filtered = qualities;
                if (formData.quality && field !== 'quality') filtered = filtered.filter(q => q.quality === formData.quality);
                if (formData.code && field !== 'code') filtered = filtered.filter(q => q.code === formData.code);
                if (formData.color && field !== 'color') filtered = filtered.filter(q => q.color === formData.color);
                if (formData.supplier && field !== 'supplier') filtered = filtered.filter(q => q.supplier === formData.supplier);
                
                return [...new Set(filtered.map(q => q[field]))].sort();
            };

            const handleSelect = (field, value) => {
                const newFormData = { ...formData, [field]: value };
                let filtered = qualities.filter(q => {
                    return (!value || q[field] === value) &&
                           (!newFormData.quality || field === 'quality' || q.quality === newFormData.quality) &&
                           (!newFormData.code || field === 'code' || q.code === newFormData.code) &&
                           (!newFormData.color || field === 'color' || q.color === newFormData.color) &&
                           (!newFormData.supplier || field === 'supplier' || q.supplier === newFormData.supplier);
                });

                if (filtered.length === 1) {
                    const item = filtered[0];
                    setFormData({
                        ...newFormData,
                        quality: item.quality,
                        code: item.code,
                        color: item.color,
                        supplier: item.supplier
                    });
                } else {
                    setFormData(newFormData);
                }
            };

            const resetSelection = () => {
                setFormData({ ...formData, quality: '', code: '', color: '', supplier: '' });
            };

            const isSubmitDisabled = !formData.quality || !formData.code || !formData.color || !formData.supplier || !formData.price || !formData.orderedWeight;

            return (
                <div className="modal-overlay">
                    <div className="modal">
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem'}}>
                            <h2>Create New Deal</h2>
                            <button className="btn btn-outline" style={{padding: '0.4rem 0.8rem', fontSize: '0.8rem'}} onClick={resetSelection}>Reset Selection</button>
                        </div>
                        <div style={{marginTop: '1.5rem'}}>
                            <div className="input-group">
                                <label>Order Date</label>
                                <input 
                                    type="date" 
                                    value={formData.orderDate} 
                                    max={new Date().toISOString().split('T')[0]}
                                    onChange={e => setFormData({...formData, orderDate: e.target.value})} 
                                />
                            </div>

                            <div style={{background: 'var(--bg)', padding: '1.25rem', borderRadius: '15px', marginBottom: '1.5rem', border: '1px solid var(--border)', position: 'relative', zIndex: 10, overflow: 'visible'}}>
                                <label style={{display: 'block', fontSize: '0.8rem', fontWeight: '700', color: 'var(--accent)', marginBottom: '1rem', textTransform: 'uppercase'}}>Select from Directory</label>
                                
                                {qualities.length > 0 ? (
                                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                                        <SearchableDropdown 
                                            label="Quality"
                                            placeholder="Search quality..."
                                            options={getFilteredOptions('quality')}
                                            value={formData.quality}
                                            onChange={val => handleSelect('quality', val)}
                                            emptyLabel="-- Select --"
                                        />
                                        <SearchableDropdown 
                                            label="Code"
                                            placeholder="Search code..."
                                            options={getFilteredOptions('code')}
                                            value={formData.code}
                                            onChange={val => handleSelect('code', val)}
                                            emptyLabel="-- Select --"
                                        />
                                        <SearchableDropdown 
                                            label="Color"
                                            placeholder="Search color..."
                                            options={getFilteredOptions('color')}
                                            value={formData.color}
                                            onChange={val => handleSelect('color', val)}
                                            emptyLabel="-- Select --"
                                        />
                                        <SearchableDropdown 
                                            label="Supplier"
                                            placeholder="Search supplier..."
                                            options={getFilteredOptions('supplier')}
                                            value={formData.supplier}
                                            onChange={val => handleSelect('supplier', val)}
                                            emptyLabel="-- Select --"
                                        />
                                    </div>
                                ) : (
                                    <div style={{padding: '1rem', background: 'rgba(239, 68, 68, 0.1)', color: 'var(--error)', borderRadius: '10px', fontSize: '0.85rem', textAlign: 'center'}}>
                                        No qualities found. Please add a quality in the Quality Directory first.
                                    </div>
                                )}
                            </div>

                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                                <div className="input-group">
                                    <label>Type</label>
                                    <select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                        <option value="Warp">Warp</option>
                                        <option value="Weft">Weft</option>
                                    </select>
                                </div>
                                <div className="input-group">
                                    <label>Price (per kg)</label>
                                    <input type="number" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} placeholder="0.00" />
                                </div>
                            </div>
                            <div className="input-group">
                                <label>Ordered Weight (kg)</label>
                                <input type="number" value={formData.orderedWeight} onChange={e => setFormData({...formData, orderedWeight: e.target.value})} placeholder="0.00" />
                            </div>

                            <div style={{display: 'flex', gap: '1rem', marginTop: '1rem'}}>
                                <button 
                                    className="btn btn-primary" 
                                    style={{flex: 1, opacity: isSubmitDisabled ? 0.5 : 1}} 
                                    onClick={() => onSubmit(formData)}
                                    disabled={isSubmitDisabled}
                                >
                                    Create Order
                                </button>
                                <button className="btn btn-outline" onClick={onClose}>Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HeatMapView = ({ 
            orders, 
            qualities, 
            selectedQuality, 
            setSelectedQuality, 
            selectedSupplier, 
            setSelectedSupplier, 
            selectedCode, 
            setSelectedCode, 
            selectedColor, 
            setSelectedColor, 
            filterType, 
            setFilterType, 
            allCombinations,
            onNavigate 
        }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);

            const getOptions = (field) => {
                const otherFilters = {
                    quality: selectedQuality,
                    supplier: selectedSupplier,
                    code: selectedCode,
                    color: selectedColor,
                    type: filterType === 'All' ? null : filterType
                };
                delete otherFilters[field];

                const relevantCombos = allCombinations.filter(c => 
                    Object.keys(otherFilters).every(k => !otherFilters[k] || c[k] === otherFilters[k])
                );
                return [...new Set(relevantCombos.map(c => c[field]).filter(Boolean))].sort();
            };

            const handleSelect = (field, value) => {
                const newFilters = {
                    quality: selectedQuality,
                    supplier: selectedSupplier,
                    code: selectedCode,
                    color: selectedColor,
                    [field]: value
                };

                let currentFiltered = allCombinations.filter(c => {
                    return (!newFilters.quality || c.quality === newFilters.quality) &&
                           (!newFilters.code || c.code === newFilters.code) &&
                           (!newFilters.color || c.color === newFilters.color) &&
                           (!newFilters.supplier || c.supplier === newFilters.supplier) &&
                           (filterType === 'All' || c.type === filterType);
                });

                const updated = { ...newFilters };
                ['quality', 'supplier', 'code', 'color'].forEach(f => {
                    const options = [...new Set(currentFiltered.map(item => item[f]))].filter(Boolean);
                    if (options.length === 1) updated[f] = options[0];
                });

                setSelectedQuality(updated.quality || '');
                setSelectedSupplier(updated.supplier || '');
                setSelectedCode(updated.code || '');
                setSelectedColor(updated.color || '');
            };

            const filteredOrders = useMemo(() => {
                return orders.filter(o => {
                    return (!selectedQuality || o.quality === selectedQuality) &&
                           (!selectedSupplier || o.supplier === selectedSupplier) &&
                           (!selectedCode || o.code === selectedCode) &&
                           (!selectedColor || o.color === selectedColor) &&
                           (filterType === 'All' || o.type === filterType);
                });
            }, [orders, selectedQuality, selectedSupplier, selectedCode, selectedColor, filterType]);

            const monthData = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                
                const days = [];
                for (let i = 0; i < firstDay.getDay(); i++) days.push(null);
                
                for (let d = 1; d <= lastDay.getDate(); d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    
                    let ordersPlaced = [];
                    let ordersReceived = [];
                    let grItems = [];
                    
                    filteredOrders.forEach(o => {
                        const oDate = o.orderDate || (o.createdAt ? o.createdAt.split('T')[0] : '');
                        if (oDate === dateStr) ordersPlaced.push(o);
                        
                        (o.batches || []).forEach(b => {
                            const bDate = b.receiveDate || (b.receivedAt ? b.receivedAt.split('T')[0] : '');
                            if (bDate === dateStr) {
                                ordersReceived.push({ ...b, orderId: o.id, quality: o.quality, code: o.code, color: o.color, supplier: o.supplier, type: o.type });
                            }
                            
                            (b.boxes || []).forEach(box => {
                                if (box.returnedDate === dateStr && box.returnedWeight > 0) {
                                    const existing = grItems.find(g => g.challanNumber === b.challanNumber && g.orderId === o.id);
                                    if (existing) {
                                        existing.returnedWeight += box.returnedWeight;
                                    } else {
                                        grItems.push({ 
                                            orderId: o.id, 
                                            quality: o.quality, 
                                            code: o.code, 
                                            color: o.color, 
                                            supplier: o.supplier, 
                                            type: o.type, 
                                            challanNumber: b.challanNumber, 
                                            lotNumber: b.lotNumber,
                                            returnedWeight: box.returnedWeight 
                                        });
                                    }
                                }
                            });
                        });
                    });
                    
                    days.push({
                        day: d,
                        date: dateStr,
                        ordersPlaced,
                        ordersReceived,
                        grItems,
                        totalWeight: ordersPlaced.reduce((acc, o) => acc + Number(o.orderedWeight), 0) +
                                    ordersReceived.reduce((acc, b) => acc + b.totalWeight, 0) +
                                    grItems.reduce((acc, g) => acc + g.returnedWeight, 0)
                    });
                }
                return days;
            }, [currentDate, filteredOrders]);

            const maxWeight = useMemo(() => {
                return Math.max(...monthData.map(d => d?.totalWeight || 0), 100);
            }, [monthData]);

            const getHeatLevel = (weight) => {
                if (weight === 0) return 0;
                const ratio = weight / maxWeight;
                if (ratio < 0.2) return 1;
                if (ratio < 0.4) return 2;
                if (ratio < 0.6) return 3;
                if (ratio < 0.8) return 4;
                return 5;
            };

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
                    <div className="card" style={{ overflow: 'visible', zIndex: 100 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <h3 style={{ fontSize: '1.2rem', fontWeight: '700' }}>Heat Map Filters</h3>
                            <div style={{display: 'flex', gap: '0.5rem', background: 'var(--bg)', padding: '0.25rem', borderRadius: '10px'}}>
                                {['All', 'Warp', 'Weft'].map(type => (
                                    <button 
                                        key={type}
                                        className="btn" 
                                        style={{
                                            padding: '0.4rem 1rem', 
                                            fontSize: '0.85rem',
                                            background: filterType === type ? 'var(--surface)' : 'transparent',
                                            boxShadow: filterType === type ? 'var(--shadow-sm)' : 'none',
                                            color: filterType === type ? 'var(--accent)' : 'var(--muted)'
                                        }}
                                        onClick={() => {
                                            const currentFilters = { quality: selectedQuality, supplier: selectedSupplier, code: selectedCode, color: selectedColor };
                                            const newFilters = { ...currentFilters, type: type === 'All' ? null : type };
                                            let filtered = allCombinations.filter(c => {
                                                return (!newFilters.type || c.type === newFilters.type) &&
                                                       (!newFilters.quality || c.quality === newFilters.quality) &&
                                                       (!newFilters.code || c.code === newFilters.code) &&
                                                       (!newFilters.color || c.color === newFilters.color) &&
                                                       (!newFilters.supplier || c.supplier === newFilters.supplier);
                                            });
                                            
                                            const fields = ['quality', 'supplier', 'code', 'color'];
                                            fields.forEach(f => {
                                                const options = [...new Set(filtered.map(item => item[f]))].filter(Boolean);
                                                if (options.length === 1) {
                                                    if (f === 'quality') setSelectedQuality(options[0]);
                                                    else if (f === 'supplier') setSelectedSupplier(options[0]);
                                                    else if (f === 'code') setSelectedCode(options[0]);
                                                    else if (f === 'color') setSelectedColor(options[0]);
                                                }
                                            });
                                            setFilterType(type);
                                        }}
                                    >
                                        {type}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr) auto', gap: '1.25rem', alignItems: 'end' }}>
                            <SearchableDropdown 
                                label="Quality"
                                placeholder="Search quality..."
                                options={getOptions('quality')}
                                value={selectedQuality}
                                onChange={val => handleSelect('quality', val)}
                                emptyLabel="-- All Qualities --"
                            />
                            <SearchableDropdown 
                                label="Code"
                                placeholder="Search code..."
                                options={getOptions('code')}
                                value={selectedCode}
                                onChange={val => handleSelect('code', val)}
                                emptyLabel="-- All Codes --"
                            />
                            <SearchableDropdown 
                                label="Color"
                                placeholder="Search color..."
                                options={getOptions('color')}
                                value={selectedColor}
                                onChange={val => handleSelect('color', val)}
                                emptyLabel="-- All Colors --"
                            />
                            <SearchableDropdown 
                                label="Supplier"
                                placeholder="Search supplier..."
                                options={getOptions('supplier')}
                                value={selectedSupplier}
                                onChange={val => handleSelect('supplier', val)}
                                emptyLabel="-- All Suppliers --"
                            />
                            <button 
                                className="btn btn-outline" 
                                style={{padding: '0.75rem', borderRadius: '12px', alignSelf: 'end'}}
                                onClick={() => { 
                                    setSelectedQuality(''); setSelectedSupplier(''); setSelectedCode(''); setSelectedColor('');
                                    setFilterType('All');
                                }}
                                title="Clear Filters"
                            >
                                🔄
                            </button>
                        </div>
                    </div>

                    <div className="card heat-map-container" style={{ minHeight: '600px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <h2 style={{ fontFamily: 'var(--font-display)', fontSize: '1.8rem', background: 'linear-gradient(135deg, var(--accent), var(--accent2))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', margin: 0 }}>
                                {monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}
                            </h2>
                            <div style={{ display: 'flex', gap: '0.75rem' }}>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }} onClick={() => { const d = new Date(currentDate); d.setFullYear(d.getFullYear() - 1); setCurrentDate(d); }} title="Previous Year">◀◀</button>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }} onClick={() => { const d = new Date(currentDate); d.setMonth(d.getMonth() - 1); setCurrentDate(d); }} title="Previous Month">◀</button>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }} onClick={() => setCurrentDate(new Date())}>Today</button>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }} onClick={() => { const d = new Date(currentDate); d.setMonth(d.getMonth() + 1); setCurrentDate(d); }} title="Next Month">▶</button>
                                <button className="btn btn-outline" style={{ padding: '0.5rem 1rem' }} onClick={() => { const d = new Date(currentDate); d.setFullYear(d.getFullYear() + 1); setCurrentDate(d); }} title="Next Year">▶▶</button>
                            </div>
                        </div>

                        {/* RM delivery heat map Symbol & Intensity Legend */}
                        <div style={{ 
                            display: 'flex', 
                            flexWrap: 'wrap',
                            justifyContent: 'space-between',
                            alignItems: 'center',
                            gap: '1rem',
                            padding: '1rem 1.25rem',
                            background: 'var(--bg)',
                            borderRadius: '12px',
                            marginBottom: '2rem',
                            border: '1px solid var(--border)',
                            fontSize: '0.85rem',
                            fontWeight: '600'
                        }}>
                            <div style={{ display: 'flex', gap: '1.5rem', flexWrap: 'wrap' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <span style={{ fontSize: '1.25rem' }}>📦</span>
                                    <span style={{ color: 'var(--fg)' }}>RM Orders Placed</span>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <span style={{ fontSize: '1.25rem' }}>🚚</span>
                                    <span style={{ color: 'var(--fg)' }}>Goods Received (Deliveries)</span>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <span style={{ fontSize: '1.25rem' }}>🔄</span>
                                    <span style={{ color: 'var(--fg)' }}>Goods Returned (GR/Returns)</span>
                                </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                <span style={{ fontSize: '0.75rem', color: 'var(--muted)', marginRight: '4px' }}>Activity Level:</span>
                                <div style={{ display: 'flex', gap: '4px' }}>
                                    <span className="legend-box heat-level-0" style={{ width: '14px', height: '14px', borderRadius: '4px', border: '1px solid var(--border)', display: 'inline-block' }} title="No Activity"></span>
                                    <span className="legend-box heat-level-1" style={{ width: '14px', height: '14px', borderRadius: '4px', border: '1px solid var(--border)', display: 'inline-block' }} title="Low Activity"></span>
                                    <span className="legend-box heat-level-3" style={{ width: '14px', height: '14px', borderRadius: '4px', border: '1px solid var(--border)', display: 'inline-block' }} title="Medium Activity"></span>
                                    <span className="legend-box heat-level-5" style={{ width: '14px', height: '14px', borderRadius: '4px', border: '1px solid var(--border)', display: 'inline-block' }} title="Peak Activity"></span>
                                </div>
                            </div>
                        </div>

                        <div className="calendar-grid">
                        {["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"].map(d => (
                            <div key={d} style={{ textAlign: 'center', fontWeight: '800', fontSize: '0.85rem', color: 'var(--muted)', paddingBottom: '1.5rem', letterSpacing: '0.1em' }}>{d}</div>
                        ))}
                        {monthData.map((day, idx) => (
                            day ? (
                                <div 
                                    key={idx} 
                                    className={`calendar-day heat-level-${getHeatLevel(day.totalWeight)}`}
                                    style={{ cursor: (day.ordersPlaced.length + day.ordersReceived.length + day.grItems.length) > 0 ? 'pointer' : 'default' }}
                                    onClick={() => {
                                        if ((day.ordersPlaced.length + day.ordersReceived.length + day.grItems.length) > 0) {
                                            setSelectedDate(day);
                                        }
                                    }}
                                >
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span className="day-number">{day.day}</span>
                                    </div>
                                    <div className="day-content" style={{ display: 'flex', flexDirection: 'column', gap: '3px', marginTop: '6px' }}>
                                        {day.ordersPlaced.length > 0 && (
                                            <div className="item-detail-line item-pill-ordered" style={{ justifyContent: 'space-between', padding: '3px 6px' }}>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px' }}>
                                                    <span style={{ fontSize: '1.05rem', lineHeight: '1' }}>📦</span>
                                                    <span>{day.ordersPlaced.length}</span>
                                                </span>
                                                <span style={{ fontWeight: '700' }}>{day.ordersPlaced.reduce((acc, o) => acc + Number(o.orderedWeight), 0)}kg</span>
                                            </div>
                                        )}
                                        {day.ordersReceived.length > 0 && (
                                            <div className="item-detail-line item-pill-received" style={{ justifyContent: 'space-between', padding: '3px 6px' }}>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px' }}>
                                                    <span style={{ fontSize: '1.05rem', lineHeight: '1' }}>🚚</span>
                                                    <span>{day.ordersReceived.length}</span>
                                                </span>
                                                <span style={{ fontWeight: '700' }}>{day.ordersReceived.reduce((acc, r) => acc + r.totalWeight, 0).toFixed(0)}kg</span>
                                            </div>
                                        )}
                                        {day.grItems.length > 0 && (
                                            <div className="item-detail-line item-pill-gr" style={{ justifyContent: 'space-between', padding: '3px 6px' }}>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px' }}>
                                                    <span style={{ fontSize: '1.05rem', lineHeight: '1' }}>🔄</span>
                                                    <span>{day.grItems.length}</span>
                                                </span>
                                                <span style={{ fontWeight: '700' }}>{day.grItems.reduce((acc, g) => acc + g.returnedWeight, 0).toFixed(0)}kg</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div key={idx}></div>
                            )
                        ))}
                    </div>

                    {selectedDate && (
                        <DayDetailModal 
                            dateData={selectedDate} 
                            onClose={() => setSelectedDate(null)} 
                            onNavigate={onNavigate}
                        />
                    )}
                </div>
            </div>
            );
        };

        const DayDetailModal = ({ dateData, onClose, onNavigate }) => {
            return (
                <div className="modal-overlay">
                    <div className="modal" style={{ maxWidth: '1000px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2.5rem' }}>
                            <div>
                                <h2 style={{ fontSize: '1.8rem', marginBottom: '0.5rem' }}>Daily Activity Details</h2>
                                <p style={{ color: 'var(--muted)', fontWeight: '600' }}>{new Date(dateData.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                            </div>
                            <button className="btn btn-outline" onClick={onClose} style={{ padding: '0.6rem 1.2rem' }}>Close</button>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '2.5rem' }}>
                            {dateData.ordersPlaced.length > 0 && (
                                <div>
                                    <h3 style={{ color: 'var(--accent)', marginBottom: '1.25rem', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                        <span style={{ fontSize: '1.5rem' }}>📦</span> Orders Placed
                                    </h3>
                                    <div className="table-responsive">
                                        <table>

  <div style="position: fixed; top: 1.25rem; right: 1.5rem; z-index: 10002; display: none;">

  <script id="vishwa-theme-manager-js">
    function toggleTheme() {
      const isDark = !document.body.classList.contains('dark-mode');
      applyTheme(isDark);
      // Dispatch custom event for React components
      window.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark } }));
    }

    function applyTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
        document.body.classList.add('dark-mode');
        localStorage.setItem('vishwa_fashions_theme', 'true');
      } else {
        document.documentElement.classList.remove('dark-mode');
        document.body.classList.remove('dark-mode');
        localStorage.setItem('vishwa_fashions_theme', 'false');
      }
      
      const icon = document.getElementById('theme-toggle-icon');
      const text = document.getElementById('theme-toggle-text');
      if (icon) {
        icon.className = isDark ? 'ri-sun-line text-sm text-accent' : 'ri-moon-line text-sm text-accent';
      }
      if (text) {
        text.innerText = isDark ? 'Light Mode' : 'Dark Mode';
      }
    }

    (function() {
      const isDark = localStorage.getItem('vishwa_fashions_theme') === 'true' || 
                     (localStorage.getItem('vishwa_fashions_theme') === null && true);
      applyTheme(isDark);
    })();

    // --- Excel-Style Drag Cell Selection & Live Sum Calculation ---
    (function() {
        // 1. Inject Styles
        const style = document.createElement('style');
        style.textContent = `
            td.excel-selected {
                background-color: rgba(139, 92, 246, 0.22) !important;
                box-shadow: inset 0 0 0 2px var(--accent) !important;
                transition: background-color 0.1s ease;
            }
            .scroll-sum-box {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: rgba(26, 26, 46, 0.94);
                color: #ffffff;
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 16px;
                padding: 0.85rem 1.15rem;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
                z-index: 100010;
                font-family: var(--font-body), sans-serif;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                animation: excelSlideUp 0.3s ease;
                max-width: 380px;
            }
            .scroll-sum-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.72rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: rgba(255, 255, 255, 0.65);
                margin-bottom: 0.5rem;
                gap: 1.5rem;
            }
            .scroll-sum-close {
                background: transparent;
                border: none;
                color: rgba(255, 255, 255, 0.5);
                cursor: pointer;
                font-size: 0.85rem;
                line-height: 1;
                padding: 0.1rem 0.3rem;
                border-radius: 4px;
                transition: all 0.2s ease;
            }
            .scroll-sum-close:hover {
                color: #ffffff;
                background: rgba(255, 255, 255, 0.1);
            }
            .scroll-sum-body {
                display: flex;
                gap: 1.2rem;
                align-items: center;
            }
            .scroll-sum-stat {
                display: flex;
                flex-direction: column;
                gap: 0.1rem;
            }
            .stat-label {
                font-size: 0.65rem;
                color: rgba(255, 255, 255, 0.55);
                text-transform: uppercase;
                font-weight: 700;
                letter-spacing: 0.02em;
            }
            .stat-val {
                font-size: 0.98rem;
                font-weight: 800;
                font-family: var(--font-display), sans-serif;
            }
            #scroll-sum-meters { color: #a78bfa; }
            #scroll-sum-hours { color: #60a5fa; }
            #scroll-sum-salary { color: #f97316; }
            @keyframes excelSlideUp {
                from { transform: translateY(20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // 2. Inject HTML Widget
        const widgetHtml = `
            <div id="scroll-sum-widget" class="scroll-sum-box" style="display: none;">
                <div class="scroll-sum-header">
                    <span id="widget-box-title">📊 Selected Sum</span>
                    <button class="scroll-sum-close" id="scroll-sum-close-btn" title="Dismiss widget">✕</button>
                </div>
                <div class="scroll-sum-body">
                    <div class="scroll-sum-stat" id="stat-meters-wrap">
                        <span class="stat-label" id="stat-label-1">Meters</span>
                        <span class="stat-val" id="scroll-sum-meters">0.0 m</span>
                    </div>
                    <div class="scroll-sum-stat" id="stat-hours-wrap">
                        <span class="stat-label" id="stat-label-2">Hours</span>
                        <span class="stat-val" id="scroll-sum-hours">0.0 h</span>
                    </div>
                    <div class="scroll-sum-stat" id="stat-salary-wrap">
                        <span class="stat-label" id="stat-label-3">Salary</span>
                        <span class="stat-val" id="scroll-sum-salary">₹ 0.00</span>
                    </div>
                </div>
            </div>
        `;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = widgetHtml;
        document.body.appendChild(tempDiv.firstElementChild);

        // 3. Selection Logic State
        let isCellSelecting = false;
        let startCell = null;
        let anchorCell = null;
        const selectedCells = new Set();
        const currentDragCells = new Set();
        let isWidgetDismissed = false;

        window.dismissScrollWidget = function() {
            isWidgetDismissed = true;
            clearExcelSelection();
            const widget = document.getElementById('scroll-sum-widget');
            if (widget) widget.style.display = 'none';
        };

        document.getElementById('scroll-sum-close-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            window.dismissScrollWidget();
        });

        function clearExcelSelection() {
            document.querySelectorAll('td.excel-selected').forEach(cell => cell.classList.remove('excel-selected'));
            selectedCells.clear();
            currentDragCells.clear();
        }

        function updateVisualSelection() {
            document.querySelectorAll('td.excel-selected').forEach(cell => cell.classList.remove('excel-selected'));
            selectedCells.forEach(cell => cell.classList.add('excel-selected'));
            currentDragCells.forEach(cell => cell.classList.add('excel-selected'));

            const totalSize = selectedCells.size + currentDragCells.size;
            if (totalSize > 0) {
                calculateExcelSum();
            } else {
                const widget = document.getElementById('scroll-sum-widget');
                if (widget) widget.style.display = 'none';
            }
        }

        function getRangeCells(cellA, cellB) {
            const table = cellA.closest('table');
            const range = [];
            if (!table) return range;

            const rows = Array.from(table.querySelectorAll('tr'));
            const rowA = cellA.closest('tr');
            const rowB = cellB.closest('tr');

            const rowIndexA = rows.indexOf(rowA);
            const rowIndexB = rows.indexOf(rowB);

            if (rowIndexA === -1 || rowIndexB === -1) return range;

            const minRow = Math.min(rowIndexA, rowIndexB);
            const maxRow = Math.max(rowIndexA, rowIndexB);

            const colIndexA = cellA.cellIndex;
            let colIndexB = cellB.cellIndex;

            if (rowB.classList.contains('role-group-header-row') || rowB.classList.contains('summary-row') || rowB.classList.contains('group-header')) {
                colIndexB = colIndexA;
            }

            const minCol = Math.min(colIndexA, colIndexB);
            const maxCol = Math.max(colIndexA, colIndexB);

            for (let r = minRow; r <= maxRow; r++) {
                const row = rows[r];
                if (!row || row.style.display === 'none' || 
                    row.classList.contains('summary-row') || 
                    row.classList.contains('role-group-header-row') || 
                    row.classList.contains('group-header') ||
                    row.getAttribute('id') === 'table-header-row') continue;
                
                const cells = Array.from(row.children);
                for (let c = minCol; c <= maxCol; c++) {
                    const cell = cells[c];
                    if (cell && cell.tagName === 'TD') {
                        range.push(cell);
                    }
                }
            }
            return range;
        }

        function selectCellRange(cellA, cellB) {
            currentDragCells.clear();
            const range = getRangeCells(cellA, cellB);
            range.forEach(cell => currentDragCells.add(cell));
            updateVisualSelection();
        }

        function calculateExcelSum() {
            const widget = document.getElementById('scroll-sum-widget');
            if (!widget) return;

            const allCells = new Set([...selectedCells, ...currentDragCells]);
            if (allCells.size === 0) {
                handleSelectionSum();
                return;
            }

            const colMap = {};

            allCells.forEach(cell => {
                const table = cell.closest('table');
                if (!table) return;

                const colIdx = cell.cellIndex;
                const txt = cell.innerText.trim();
                if (!txt || txt === '-') return;

                let headerText = 'Column ' + (colIdx + 1);
                const thead = table.querySelector('thead');
                if (thead) {
                    const headerRows = Array.from(thead.querySelectorAll('tr'));
                    const lastHeaderRow = headerRows[headerRows.length - 1];
                    if (lastHeaderRow && lastHeaderRow.children[colIdx]) {
                        headerText = lastHeaderRow.children[colIdx].innerText.replace(/[\r\n]+/g, ' ').trim();
                    }
                }

                if (!colMap[colIdx]) {
                    colMap[colIdx] = {
                        header: headerText,
                        cellCount: 0,
                        numbers: [],
                        isCurrency: false,
                        isMeters: false,
                        isHours: false,
                        isKg: false
                    };
                }

                colMap[colIdx].cellCount++;

                if (txt.includes('₹')) colMap[colIdx].isCurrency = true;
                if (/\b\d+\.?\d*\s*m\b/i.test(txt)) colMap[colIdx].isMeters = true;
                if (/\b\d+\.?\d*\s*h\b/i.test(txt)) colMap[colIdx].isHours = true;
                if (/\b\d+\.?\d*\s*kg\b/i.test(txt)) colMap[colIdx].isKg = true;

                const salMatches = txt.match(/₹\s*([\d,]+\.?\d*)/g);
                if (salMatches) {
                    salMatches.forEach(m => {
                        const val = parseFloat(m.replace(/[₹\s,]/g, ''));
                        if (!isNaN(val)) colMap[colIdx].numbers.push(val);
                    });
                    return;
                }

                const mtrMatch = txt.match(/^([\d,]+\.?\d*)\s*m$/i);
                if (mtrMatch) {
                    const val = parseFloat(mtrMatch[1].replace(/,/g, ''));
                    if (!isNaN(val)) colMap[colIdx].numbers.push(val);
                    return;
                }

                const hrsMatch = txt.match(/^([\d,]+\.?\d*)\s*h$/i);
                if (hrsMatch) {
                    const val = parseFloat(hrsMatch[1].replace(/,/g, ''));
                    if (!isNaN(val)) colMap[colIdx].numbers.push(val);
                    return;
                }

                const kgMatch = txt.match(/^([\d,]+\.?\d*)\s*kg$/i);
                if (kgMatch) {
                    const val = parseFloat(kgMatch[1].replace(/,/g, ''));
                    if (!isNaN(val)) colMap[colIdx].numbers.push(val);
                    return;
                }

                const rawNums = txt.match(/[\d,]+\.?\d*/g);
                if (rawNums) {
                    rawNums.forEach(n => {
                        const val = parseFloat(n.replace(/,/g, ''));
                        if (!isNaN(val) && val > 0) colMap[colIdx].numbers.push(val);
                    });
                }
            });

            const colIndices = Object.keys(colMap);
            if (colIndices.length === 0) {
                updateScrollSumWidget();
                return;
            }

            // Single column selection down a specific column
            if (colIndices.length === 1) {
                const colData = colMap[colIndices[0]];
                const numbers = colData.numbers;
                if (numbers.length > 0) {
                    const cellCount = colData.cellCount;
                    const numCount = numbers.length;
                    const sum = numbers.reduce((acc, c) => acc + c, 0);
                    const avg = sum / numCount;
                    const min = Math.min(...numbers);
                    const max = Math.max(...numbers);

                    let prefix = colData.isCurrency ? '₹ ' : '';
                    let suffix = colData.isMeters ? ' m' : (colData.isHours ? ' h' : (colData.isKg ? ' kg' : ''));

                    widget.style.display = 'block';
                    document.getElementById('widget-box-title').innerText = `📊 ${colData.header} (${cellCount} ${cellCount === 1 ? 'cell' : 'cells'})`;

                    document.getElementById('stat-meters-wrap').style.display = 'flex';
                    document.getElementById('stat-hours-wrap').style.display = numCount > 1 ? 'flex' : 'none';
                    document.getElementById('stat-salary-wrap').style.display = numCount > 1 ? 'flex' : 'none';

                    document.getElementById('stat-label-1').innerText = 'TOTAL SUM';
                    document.getElementById('scroll-sum-meters').innerText = `${prefix}${sum.toLocaleString('en-IN', { minimumFractionDigits: colData.isCurrency ? 2 : 1, maximumFractionDigits: 2 })}${suffix}`;
                    document.getElementById('scroll-sum-meters').style.color = '#10b981';

                    document.getElementById('stat-label-2').innerText = 'AVERAGE';
                    document.getElementById('scroll-sum-hours').innerText = `${prefix}${avg.toLocaleString('en-IN', { minimumFractionDigits: 1, maximumFractionDigits: 2 })}${suffix}`;
                    document.getElementById('scroll-sum-hours').style.color = '#60a5fa';

                    const salLabel = document.querySelector('#stat-salary-wrap .stat-label');
                    if (salLabel) salLabel.innerText = 'MIN / MAX';
                    document.getElementById('scroll-sum-salary').innerText = `${min.toFixed(1)} / ${max.toFixed(1)}${suffix}`;
                    document.getElementById('scroll-sum-salary').style.color = '#a78bfa';
                    return;
                }
            }

            // Multi column selection
            let allNumbers = [];
            let isCurrency = false, isMeters = false, isHours = false, isKg = false;
            colIndices.forEach(idx => {
                allNumbers = allNumbers.concat(colMap[idx].numbers);
                if (colMap[idx].isCurrency) isCurrency = true;
                if (colMap[idx].isMeters) isMeters = true;
                if (colMap[idx].isHours) isHours = true;
                if (colMap[idx].isKg) isKg = true;
            });

            if (allNumbers.length > 0) {
                const cellCount = selectedCells.size;
                const numCount = allNumbers.length;
                const sum = allNumbers.reduce((acc, c) => acc + c, 0);
                const avg = sum / numCount;

                let prefix = isCurrency ? '₹ ' : '';
                let suffix = isMeters ? ' m' : (isHours ? ' h' : (isKg ? ' kg' : ''));

                widget.style.display = 'block';
                document.getElementById('widget-box-title').innerText = `📊 Selected ${colIndices.length} Columns (${cellCount} cells)`;

                document.getElementById('stat-meters-wrap').style.display = 'flex';
                document.getElementById('stat-hours-wrap').style.display = numCount > 1 ? 'flex' : 'none';
                document.getElementById('stat-salary-wrap').style.display = 'none';

                document.getElementById('stat-label-1').innerText = 'TOTAL SUM';
                document.getElementById('scroll-sum-meters').innerText = `${prefix}${sum.toLocaleString('en-IN', { minimumFractionDigits: isCurrency ? 2 : 1, maximumFractionDigits: 2 })}${suffix}`;
                document.getElementById('scroll-sum-meters').style.color = '#10b981';

                document.getElementById('stat-label-2').innerText = 'AVERAGE';
                document.getElementById('scroll-sum-hours').innerText = `${prefix}${avg.toLocaleString('en-IN', { minimumFractionDigits: 1, maximumFractionDigits: 2 })}${suffix}`;
                document.getElementById('scroll-sum-hours').style.color = '#60a5fa';
            } else {
                updateScrollSumWidget();
            }
        }

        // Initialize Event Listeners
        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('#scroll-sum-widget')) return;

            const td = e.target.closest('td');
            if (!td || e.target.closest('button') || e.target.closest('input') || e.target.closest('a') || e.target.closest('select')) {
                clearExcelSelection();
                updateVisualSelection();
                return;
            }

            const tr = td.closest('tr');
            if (tr && (tr.classList.contains('role-group-header-row') || tr.classList.contains('summary-row') || tr.classList.contains('group-header') || tr.getAttribute('id') === 'table-header-row')) {
                clearExcelSelection();
                updateVisualSelection();
                return;
            }

            if (window.getSelection) {
                window.getSelection().removeAllRanges();
            }

            isCellSelecting = true;
            startCell = td;
            currentDragCells.clear();

            if (e.shiftKey && anchorCell && anchorCell.closest('table') === td.closest('table')) {
                clearExcelSelection();
                const range = getRangeCells(anchorCell, td);
                range.forEach(cell => currentDragCells.add(cell));
            } else if (e.ctrlKey || e.metaKey) {
                anchorCell = td;
                currentDragCells.add(td);
            } else {
                clearExcelSelection();
                anchorCell = td;
                currentDragCells.add(td);
            }

            updateVisualSelection();
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mouseover', (e) => {
            if (!isCellSelecting || !startCell) return;
            const td = e.target.closest('td');
            if (td && td.closest('table') === startCell.closest('table')) {
                const tr = td.closest('tr');
                if (tr && (tr.classList.contains('role-group-header-row') || tr.classList.contains('summary-row') || tr.classList.contains('group-header') || tr.getAttribute('id') === 'table-header-row')) {
                    return;
                }

                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }

                if (e.shiftKey && anchorCell) {
                    selectCellRange(anchorCell, td);
                } else {
                    selectCellRange(startCell, td);
                }
            }

            const threshold = 60;
            const speed = 12;
            if (e.clientY > window.innerHeight - threshold) {
                window.scrollBy(0, speed);
            } else if (e.clientY < threshold) {
                window.scrollBy(0, -speed);
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (isCellSelecting) {
                isCellSelecting = false;
                document.body.style.userSelect = '';

                const td = e.target.closest('td');
                if (e && (e.ctrlKey || e.metaKey) && startCell && (!td || td === startCell)) {
                    if (selectedCells.has(startCell)) {
                        selectedCells.delete(startCell);
                    } else {
                        selectedCells.add(startCell);
                    }
                    currentDragCells.clear();
                } else {
                    currentDragCells.forEach(cell => selectedCells.add(cell));
                    currentDragCells.clear();
                }

                updateVisualSelection();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearExcelSelection();
                document.body.style.userSelect = '';
                const widget = document.getElementById('scroll-sum-widget');
                if (widget) widget.style.display = 'none';
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
                if (selectedCells.size > 0) {
                    const firstCell = [...selectedCells][0];
                    const table = firstCell.closest('table');
                    const rows = [];
                    if (table) {
                        Array.from(table.querySelectorAll('tr')).forEach(tr => {
                            const cells = Array.from(tr.querySelectorAll('td')).filter(td => selectedCells.has(td));
                            if (cells.length > 0) rows.push(cells.map(td => td.innerText.trim()).join('\t'));
                        });
                    }
                    navigator.clipboard.writeText(rows.join('\n')).catch(() => {});
                    e.preventDefault();
                }
            }
        });
    })();
    // --- END Excel-Style Selection ---
  </script>

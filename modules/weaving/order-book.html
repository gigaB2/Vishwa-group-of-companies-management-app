        const OrderDetailsModal = ({ order, onClose, onUpdate, onComplete, geminiApiKey, selectedGeminiModel, onOpenSettings }) => {
            const [showBatchForm, setShowBatchForm] = useState(false);
            const [editingBatch, setEditingBatch] = useState(null);
            const received = (order.batches || []).reduce((acc, b) => acc + b.totalWeight, 0);
            const gr = (order.batches || []).reduce((acc, batch) => acc + (batch.boxes || []).reduce((boxAcc, box) => boxAcc + (box.returnedWeight || 0), 0), 0);
            const grossReceived = received + gr;
            
            const isCompleted = order.status === 'Completed';
            const netDiff = received - order.orderedWeight;

            const handleBatchSubmit = (batchData) => {
                const processed = {
                    ...batchData,
                    receiveDate: addTimestampToDate(batchData.receiveDate),
                    boxes: batchData.boxes ? batchData.boxes.map(box => ({
                        ...box,
                        returnedDate: box.returnedDate ? addTimestampToDate(box.returnedDate) : ''
                    })) : []
                };
                let b = editingBatch ? order.batches.map(x => x.id === editingBatch.id ? { ...x, ...processed } : x) : [...order.batches, { ...processed, id: Date.now().toString(), receivedAt: new Date().toISOString() }];
                onUpdate({ ...order, batches: b }); setShowBatchForm(false); setEditingBatch(null);
            };
            return (
                <div className="modal-overlay"><div className="modal" style={{maxWidth: '1200px'}}>
                    <div style={{display: 'flex', justifyContent: 'space-between'}}><div><h2>{order.quality} — {order.supplier}</h2><p style={{color: 'var(--muted)'}}>{order.code} | {order.color} | {order.type}</p></div><button className="btn btn-outline" onClick={onClose}>Close</button></div>
                    <div className="dashboard-grid" style={{marginTop: '2rem', gridTemplateColumns: isCompleted ? 'repeat(6, 1fr)' : 'repeat(5, 1fr)'}}>
                        <div className="card"><h3>Ordered</h3><div className="value" style={{fontSize: '1.5rem'}}>{order.orderedWeight} kg</div></div>
                        <div className="card"><h3>Gross Received</h3><div className="value" style={{fontSize: '1.5rem'}}>{grossReceived.toFixed(1)}</div></div>
                        <div className="card"><h3>GR</h3><div className="value" style={{fontSize: '1.5rem', color: 'var(--accent3)'}}>{gr.toFixed(1)}</div></div>
                        <div className="card"><h3>Net Received</h3><div className="value" style={{fontSize: '1.5rem', color: 'var(--success)'}}>{received.toFixed(1)}</div></div>
                        {isCompleted && (
                            <div className="card" style={{ borderColor: netDiff >= 0 ? '#3b82f6' : 'var(--error)', background: netDiff >= 0 ? 'rgba(59, 130, 246, 0.05)' : 'rgba(239, 68, 68, 0.02)' }}>
                                <h3 style={{ color: netDiff >= 0 ? '#3b82f6' : 'var(--error)' }}>{netDiff >= 0 ? 'Surplus' : 'Shortfall'}</h3>
                                <div className="value" style={{ fontSize: '1.5rem', color: netDiff >= 0 ? '#3b82f6' : 'var(--error)' }}>
                                    {Math.abs(netDiff).toFixed(1)} kg
                                </div>
                            </div>
                        )}
                        <div className="card"><h3>Status</h3><div className="value" style={{fontSize: '1.5rem', color: 'var(--success)'}}>{order.status}</div></div>
                    </div>
                    <div style={{marginTop: '2rem'}}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem'}}><h3>Received Batches</h3>{order.status === 'Active' && <button className="btn btn-primary" onClick={() => { setEditingBatch(null); setShowBatchForm(true); }}>+ Add Batch</button>}</div>
                        {showBatchForm && (
                            <BatchForm 
                                order={order} 
                                onCancel={() => setShowBatchForm(false)} 
                                onSubmit={handleBatchSubmit} 
                                initialData={editingBatch} 
                                geminiApiKey={geminiApiKey}
                                selectedGeminiModel={selectedGeminiModel}
                                onOpenSettings={onOpenSettings}
                            />
                        )}
                        <div className="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Received Date</th>
                                        <th>Challan #</th>
                                        <th>Lot #</th>
                                        <th style={{color: 'var(--accent)'}}>Box Number</th>
                                        <th style={{color: 'var(--accent)'}}>In cones</th>
                                        <th style={{color: 'var(--accent)'}}>In weight(Kg)</th>
                                        <th style={{color: 'var(--error)'}}>GR Cones<br/><span style={{fontSize: '0.7rem', fontWeight: 400, opacity: 0.8}}>(Calculated)</span></th>
                                        <th style={{color: 'var(--error)'}}>GR (kg)</th>
                                        <th style={{color: 'var(--error)'}}>GR Date</th>
                                        <th>Net Weight</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>{[...(order.batches || [])].sort((a, b) => new Date(b.receiveDate) - new Date(a.receiveDate)).map((b, bIdx, bArr) => {
                                    const grossTotal = b.boxes.reduce((acc, box) => acc + box.weight, 0);
                                    const grTotal = b.boxes.reduce((acc, box) => acc + (box.returnedWeight || 0), 0);
                                    const conesTotal = b.boxes.reduce((acc, box) => acc + (Number(box.cones) || 0), 0);
                                    
                                    const calcGRCones = (box) => {
                                        if (!box.returnedWeight || !box.weight || !box.cones) return 0;
                                        return Math.round(box.returnedWeight / (box.weight / box.cones));
                                    };
                                    
                                    const grConesTotal = b.boxes.reduce((acc, box) => acc + calcGRCones(box), 0);

                                    return (
                                        <React.Fragment key={b.id}>{b.boxes.map((box, idx) => (
                                            <tr key={`${b.id}-${idx}`}>
                                                {idx === 0 && <React.Fragment><td rowSpan={b.boxes.length + 1}>{new Date(b.receiveDate).toLocaleDateString('en-GB')}</td><td rowSpan={b.boxes.length + 1}>{b.challanNumber}</td><td rowSpan={b.boxes.length + 1}>{b.lotNumber}</td></React.Fragment>}
                                                <td style={{fontWeight: '600'}}>{box.boxNumber}</td>
                                                <td>{box.cones || '-'}</td>
                                                <td>{box.weight.toFixed(1)}</td>
                                                <td style={{color: 'var(--error)', fontWeight: '600'}}>{calcGRCones(box) || '-'}</td>
                                                <td style={{color: box.returnedWeight > 0 ? 'var(--error)' : 'inherit'}}>{box.returnedWeight || '0.0'}</td>
                                                <td style={{color: 'var(--error)'}}>{box.returnedDate ? new Date(box.returnedDate).toLocaleDateString('en-GB') : '-'}</td>
                                                <td>{(box.weight - (box.returnedWeight || 0)).toFixed(1)}</td>
                                                {idx === 0 && <td rowSpan={b.boxes.length + 1}>
                                                    <div style={{display: 'flex', gap: '0.4rem', justifyContent: 'center'}}>
                                                        <button className="btn btn-outline" style={{padding: '0.3rem 0.6rem'}} onClick={() => { setEditingBatch(b); setShowBatchForm(true); }}>✏️</button>
                                                        <button className="btn btn-outline" style={{padding: '0.3rem 0.6rem', color: 'var(--error)', borderColor: 'transparent'}} onClick={() => { if(confirm('Delete this batch?')) onUpdate({ ...order, batches: order.batches.filter(x => x.id !== b.id) }); }}>🗑️</button>
                                                    </div>
                                                </td>}
                                            </tr>
                                        ))}
                                        <tr key={`${b.id}-total`} style={{background: 'var(--bg)', fontWeight: '700', fontSize: '0.85rem', borderTop: '2px solid var(--border)'}}>
                                            <td style={{color: 'var(--muted)', textAlign: 'right', paddingRight: '1rem'}}>BATCH TOTAL</td>
                                            <td>{conesTotal || '-'}</td>
                                            <td style={{color: 'var(--accent)'}}>{grossTotal.toFixed(1)}</td>
                                            <td style={{color: 'var(--error)'}}>{grConesTotal || '-'}</td>
                                            <td style={{color: 'var(--error)'}}>{grTotal.toFixed(1)}</td>
                                            <td style={{color: 'var(--muted)'}}>-</td>
                                            <td style={{color: 'var(--success)', fontSize: '0.95rem'}}>{b.totalWeight.toFixed(1)} kg</td>
                                        </tr>
                                        {bIdx < bArr.length - 1 && (
                                            <tr key={`${b.id}-sep`}><td colSpan="11" style={{padding: 0, border: 'none', height: '5px', background: '#000000', lineHeight: '0'}}></td></tr>
                                        )}
                                        </React.Fragment>
                                    );
                                })}</tbody>
                            </table>
                        </div>
                    </div>
                    {order.status === 'Active' && <div style={{marginTop: '2rem', textAlign: 'right'}}><button className="btn btn-primary" style={{background: 'var(--success)'}} onClick={() => { if(confirm('Mark as Completed?')) { onComplete(order.id); onClose(); } }}>Mark as Completed</button></div>}
                </div></div>
            );
        };

        const BatchForm = ({ order, onCancel, onSubmit, initialData, geminiApiKey, selectedGeminiModel, onOpenSettings }) => {
            const [challan, setChallan] = useState(initialData?.challanNumber || '');
            const [receiveDate, setReceiveDate] = useState(initialData?.receiveDate || new Date().toISOString().split('T')[0]);
            const [lotNumber, setLotNumber] = useState(initialData?.lotNumber || '');
            const [boxInputs, setBoxInputs] = useState(initialData?.boxes ? initialData.boxes.map(b => ({...b})) : [{ boxNumber: 'B1', cones: '', weight: '', returnedWeight: '', returnedDate: '' }]);
            const [error, setError] = useState(null);
            const [invalidFields, setInvalidFields] = useState({});
            const [isScanning, setIsScanning] = useState(false);

            const scanChallan = async (file) => {
                if (!geminiApiKey) {
                    setError(
                        <span>
                            API Key missing. Please configure it in <a href="#" onClick={(e) => { e.preventDefault(); onOpenSettings(); }} style={{ color: 'var(--accent)', textDecoration: 'underline' }}>Settings</a>.
                        </span>
                    );
                    return;
                }

                setIsScanning(true);
                setError(null);

                try {
                    const base64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });

                    const prompt = `Extract details from this yarn challan image. Return ONLY a JSON object with: 
                        {
                            "supplier": "Name of supplier",
                            "quality": "Quality/Yarn details",
                            "challanNumber": "Challan number",
                            "receiveDate": "Date in dd-mm-yyyy format",
                            "lotNumber": "Lot number",
                            "boxes": [{"boxNumber": "B1", "cones": 24, "weight": 60.5}, ...]
                        }`;

                    // Prioritize user selected model, then fallback to common 2026 models
                    const modelConfigs = [
                        { id: selectedGeminiModel || 'gemini-2.0-flash', ver: 'v1beta' },
                        { id: 'gemini-2.0-flash', ver: 'v1beta' },
                        { id: 'gemini-2.5-flash', ver: 'v1beta' },
                        { id: 'gemini-flash-latest', ver: 'v1' }
                    ];
                    
                    // Filter out duplicates if selectedGeminiModel matches one of the defaults
                    const uniqueConfigs = [];
                    const seenIds = new Set();
                    for (const config of modelConfigs) {
                        const key = `${config.id}-${config.ver}`;
                        if (!seenIds.has(key)) {
                            uniqueConfigs.push(config);
                            seenIds.add(key);
                        }
                    }

                    let success = false;
                    let lastError = "";

                    for (const config of uniqueConfigs) {
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/${config.ver}/models/${config.id}:generateContent?key=${geminiApiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{
                                        parts: [
                                            { text: prompt },
                                            { inline_data: { mime_type: file.type, data: base64 } }
                                        ]
                                    }]
                                })
                            });

                            const result = await response.json();
                            if (result.error) {
                                lastError = `${config.id} (${config.ver}): ${result.error.message}`;
                                continue; // Try next model
                            }

                            if (!result.candidates || !result.candidates[0]) {
                                lastError = `${config.id}: No candidates returned.`;
                                continue;
                            }

                            const text = result.candidates[0].content.parts[0].text;
                            const jsonMatch = text.match(/\{[\s\S]*\}/);
                            if (!jsonMatch) throw new Error("Could not parse data from image.");
                            
                            const data = JSON.parse(jsonMatch[0]);

                            // Validation check
                            const supplierMismatch = !data.supplier.toLowerCase().includes(order.supplier.toLowerCase()) && !order.supplier.toLowerCase().includes(data.supplier.toLowerCase());
                            const qualityMismatch = !data.quality.toLowerCase().includes(order.quality.toLowerCase()) && !order.quality.toLowerCase().includes(data.quality.toLowerCase());

                            if (supplierMismatch || qualityMismatch) {
                                const msg = `Discrepancy detected!\n\nExtracted: ${data.supplier} - ${data.quality}\nExpected: ${order.supplier} - ${order.quality}\n\nDo you want to continue anyway?`;
                                if (!confirm(msg)) {
                                    setIsScanning(false);
                                    return;
                                }
                            }

                            // Populate fields
                            setChallan(data.challanNumber || '');
                            setLotNumber(data.lotNumber || '');
                            
                            if (data.receiveDate) {
                                const parts = data.receiveDate.split('-');
                                if (parts.length === 3) {
                                    setReceiveDate(`${parts[2]}-${parts[1]}-${parts[0]}`);
                                }
                            }

                            if (data.boxes && Array.isArray(data.boxes)) {
                                setBoxInputs(data.boxes.map(b => ({
                                    boxNumber: b.boxNumber || '',
                                    cones: b.cones || '',
                                    weight: b.weight || '',
                                    returnedWeight: '',
                                    returnedDate: ''
                                })));
                            }

                            success = true;
                            break;
                        } catch (e) {
                            lastError = e.message;
                        }
                    }

                    if (!success) throw new Error(lastError || "All models failed to respond.");

                } catch (err) {
                    setError("Failed to scan challan: " + err.message);
                } finally {
                    setIsScanning(false);
                }
            };

            const handleSubmit = () => {
                const errors = [];
                const newInvalids = {};
                
                if (!challan) {
                    errors.push('Challan Number is required.');
                    newInvalids.challan = true;
                }
                if (!receiveDate) {
                    errors.push('Received Date is required.');
                    newInvalids.receiveDate = true;
                }

                const validBoxes = boxInputs.filter(b => b.weight !== '');
                if (validBoxes.length === 0) {
                    errors.push('Add at least one box weight.');
                }

                boxInputs.forEach((b, i) => {
                    const w = b.weight !== '' ? Number(b.weight) : null;
                    const c = b.cones !== '' ? Number(b.cones) : null;

                    if (w !== null || c !== null || b.returnedWeight !== '' || b.returnedDate !== '') {
                        if (w === null || w <= 0) {
                            errors.push(`Weight must be > 0 for ${b.boxNumber}`);
                            newInvalids[`weight-${i}`] = true;
                        }
                        if (c === null || c <= 0) {
                            errors.push(`Cones must be > 0 for ${b.boxNumber}`);
                            newInvalids[`cones-${i}`] = true;
                        }
                        if (Number(b.returnedWeight) > 0 && !b.returnedDate) {
                            errors.push(`Provide GR Date for ${b.boxNumber}`);
                            newInvalids[`grDate-${i}`] = true;
                        }
                        if (w !== null && Number(b.returnedWeight) > w) {
                            errors.push(`GR weight cannot exceed Box weight for ${b.boxNumber}`);
                            newInvalids[`gr-${i}`] = true;
                        }
                    }
                });

                if (errors.length > 0) {
                    setInvalidFields(newInvalids);
                    setError(errors);
                    return;
                }

                setError(null);
                setInvalidFields({});
                const boxes = validBoxes.map(b => ({ ...b, cones: Number(b.cones), weight: Number(b.weight), returnedWeight: Number(b.returnedWeight) || 0 }));
                const tw = boxes.reduce((acc, b) => acc + (b.weight - b.returnedWeight), 0);
                onSubmit({ challanNumber: challan, receiveDate, lotNumber, boxes, totalWeight: tw });
            };

            const inputStyle = (isInvalid) => ({
                border: isInvalid ? '1.5px solid var(--error)' : '1px solid var(--border)',
                background: isInvalid ? 'rgba(239, 68, 68, 0.05)' : 'var(--surface)'
            });

            return (
                <div className="card" style={{border: '1.5px solid var(--accent)', marginBottom: '1.5rem', position: 'relative'}}>
                    {isScanning && (
                        <div className="loading-overlay">
                            <div className="spinner"></div>
                            <p style={{fontWeight: '600'}}>Scanning Challan with Gemini AI...</p>
                            <p style={{fontSize: '0.8rem', color: 'var(--muted)', marginTop: '0.5rem'}}>Extracting weights and details</p>
                        </div>
                    )}
                    
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', paddingBottom: '1rem', borderBottom: '1px solid var(--border)' }}>
                        <h3 style={{ margin: 0 }}>{initialData ? 'Edit Batch' : 'Add New Batch'}</h3>
                        <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                            <button 
                                className="btn btn-outline" 
                                style={{ color: 'var(--error)', borderColor: 'var(--error)' }}
                                onClick={() => {
                                    setChallan('');
                                    setLotNumber('');
                                    setBoxInputs([{ boxNumber: 'B1', cones: '', weight: '', returnedWeight: '', returnedDate: '' }]);
                                    setError(null);
                                }}
                            >
                                🔄 Reset
                            </button>
                            <label className="btn btn-outline" style={{ cursor: 'pointer', margin: 0 }}>
                                📷 Scan Challan
                                <input 
                                    type="file" 
                                    accept="image/*" 
                                    style={{ display: 'none' }} 
                                    onChange={(e) => {
                                        if (e.target.files?.[0]) {
                                            const file = e.target.files[0];
                                            // Reset the input value so the same file can be picked again
                                            e.target.value = '';
                                            
                                            // Clear existing data before scanning
                                            setChallan('');
                                            setLotNumber('');
                                            setBoxInputs([]);
                                            setError(null);
                                            scanChallan(file);
                                        }
                                    }} 
                                />
                            </label>
                        </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem'}}>
                        <div className="input-group"><label>Received Date</label><input type="date" style={inputStyle(invalidFields.receiveDate)} value={receiveDate} onChange={e => setReceiveDate(e.target.value)} /></div>
                        <div className="input-group"><label>Challan Number</label><input type="text" style={inputStyle(invalidFields.challan)} value={challan} onChange={e => setChallan(e.target.value)} /></div>
                        <div className="input-group"><label>Lot Number</label><input type="text" value={lotNumber} onChange={e => setLotNumber(e.target.value)} /></div>
                    </div>
                    
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 0.8fr 1fr 1fr 1.5fr auto', gap: '0.5rem', marginBottom: '0.5rem', padding: '0 0.5rem'}}>
                       <div style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--muted)'}}>BOX NUMBER</div>
                       <div style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--muted)'}}>IN CONES</div>
                       <div style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--muted)'}}>IN WEIGHT (KG)</div>
                       <div style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--error)'}}>GR (KG)</div>
                       <div style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--error)'}}>GR DATE</div>
                       <div style={{width: '32px'}}></div>
                    </div>

                    {boxInputs.map((box, i) => (
                        <div key={i} style={{display: 'grid', gridTemplateColumns: '1fr 0.8fr 1fr 1fr 1.5fr auto', gap: '0.5rem', marginBottom: '0.5rem', alignItems: 'center'}}>
                            <input type="text" value={box.boxNumber} onChange={e => { let n = [...boxInputs]; n[i] = { ...n[i], boxNumber: e.target.value }; setBoxInputs(n); }} />
                            <input type="number" step="1" min="0" style={inputStyle(invalidFields[`cones-${i}`])} placeholder="Cones" value={box.cones} onChange={e => { 
                                let val = e.target.value;
                                if (val !== '' && Number(val) < 0) return;
                                let n = [...boxInputs]; 
                                n[i] = { ...n[i], cones: val }; 
                                setBoxInputs(n); 
                            }} />
                            <input type="number" min="0" style={inputStyle(invalidFields[`weight-${i}`])} placeholder="Weight" value={box.weight} onChange={e => { 
                                let val = e.target.value;
                                if (val !== '' && Number(val) < 0) return;
                                let n = [...boxInputs]; 
                                n[i] = { ...n[i], weight: val }; 
                                setBoxInputs(n); 
                            }} />
                            <input type="number" min="0" style={inputStyle(invalidFields[`gr-${i}`])} placeholder="GR" value={box.returnedWeight} onChange={e => { 
                                let val = e.target.value;
                                if (val !== '' && Number(val) < 0) return;
                                let n = [...boxInputs]; 
                                n[i] = { ...n[i], returnedWeight: val }; 
                                if (!val || Number(val) === 0) n[i].returnedDate = '';
                                setBoxInputs(n); 
                            }} />
                            <input type="date" style={inputStyle(invalidFields[`grDate-${i}`])} value={box.returnedDate || ''} disabled={!box.returnedWeight} min={receiveDate} onChange={e => { let n = [...boxInputs]; n[i] = { ...n[i], returnedDate: e.target.value }; setBoxInputs(n); }} />
                            <button 
                                className="btn btn-outline" 
                                style={{ padding: '0.4rem', color: 'var(--error)', borderColor: 'transparent', width: '32px', height: '32px', justifyContent: 'center' }}
                                onClick={() => {
                                    const newInputs = boxInputs.filter((_, idx) => idx !== i);
                                    setBoxInputs(newInputs.length > 0 ? newInputs : [{ boxNumber: 'B1', cones: '', weight: '', returnedWeight: '', returnedDate: '' }]);
                                }}
                                title="Remove row"
                            >
                                ✖
                            </button>
                        </div>
                    ))}
                    <button className="btn btn-outline" style={{width: '100%'}} onClick={() => setBoxInputs([...boxInputs, { boxNumber: `B${boxInputs.length + 1}`, cones: '', weight: '', returnedWeight: '', returnedDate: '' }])}>+ Add Box</button>
                    
                    {error && (
                        <div style={{ 
                            padding: '1rem', 
                            background: 'rgba(239, 68, 68, 0.1)', 
                            color: 'var(--error)', 
                            borderRadius: '10px', 
                            fontSize: '0.85rem', 
                            marginTop: '1.5rem',
                            border: '1px solid rgba(239, 68, 68, 0.2)',
                        }}>
                            <div style={{fontWeight: '700', marginBottom: '0.4rem', display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                <span>⚠️ Error</span>
                            </div>
                            <div style={{opacity: 0.9, margin: 0}}>
                                {Array.isArray(error) ? error.map((err, idx) => (
                                    <div key={idx} style={{marginBottom: '0.2rem'}}>- {err}</div>
                                )) : error}
                            </div>
                        </div>
                    )}

                    <div style={{display: 'flex', gap: '1rem', marginTop: '1.5rem'}}><button className="btn btn-primary" style={{flex: 1}} onClick={handleSubmit}>Save</button><button className="btn btn-outline" onClick={onCancel}>Cancel</button></div>
                </div>
            );
        };

        const AnalyticsView = ({
            orders,
            qualities,
            selectedQuality,
            setSelectedQuality,
            selectedSupplier,
            setSelectedSupplier,
            selectedCode,
            setSelectedCode,
            selectedColor,
            setSelectedColor,
            fromDate,
            setFromDate,
            toDate,
            setToDate,
            filterType,
            setFilterType,
            setOrderSort,
            highlightedOrderId,
            setHighlightedOrderId,
            isolatedOrderId,
            setIsolatedOrderId,
            setSelectedOrder,
            setOrderSearch,
            setView,
            onGRClick,
            onCardClick,
            timelineDirection,
            setTimelineDirection,
            timelineScrollPos,
            setTimelineScrollPos
        }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);
            const timelineRef = React.useRef(null);
            const savedScrollPos = React.useRef(timelineScrollPos);

            // Save scroll position in real-time
            useEffect(() => {
                const container = timelineRef.current;
                if (!container) return;

                const handleScroll = () => {
                    setTimelineScrollPos(container.scrollLeft);
                };

                container.addEventListener('scroll', handleScroll, { passive: true });
                return () => container.removeEventListener('scroll', handleScroll);
            }, [setTimelineScrollPos]);

            const allCombinations = useMemo(() => {
                const combos = [];
                orders.forEach(o => combos.push({ 
                    quality: o.quality, supplier: o.supplier, code: o.code, color: o.color, type: o.type 
                }));
                qualities.forEach(q => {
                    combos.push({ quality: q.quality, supplier: q.supplier, code: q.code, color: q.color, type: 'All' });
                });

                const seen = new Set();
                return combos.filter(c => {
                    const key = `${c.quality}|${c.supplier}|${c.code}|${c.color}|${c.type}`;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
            }, [qualities, orders]);

            const getOptions = (field) => {
                const otherFilters = {
                    quality: selectedQuality,
                    supplier: selectedSupplier,
                    code: selectedCode,
                    color: selectedColor,
                    type: filterType === 'All' ? null : filterType
                };
                delete otherFilters[field];

                const relevantCombos = allCombinations.filter(c => 
                    Object.keys(otherFilters).every(k => !otherFilters[k] || c[k] === otherFilters[k])
                );
                return [...new Set(relevantCombos.map(c => c[field]).filter(Boolean))].sort();
            };

            const analyticsData = useMemo(() => {
                if (!selectedQuality && !selectedSupplier && !selectedCode && !selectedColor && filterType === 'All') return [];
                let data = orders
                    .filter(o => {
                        const matchesFilters = (!selectedQuality || o.quality === selectedQuality) && 
                                             (!selectedSupplier || o.supplier === selectedSupplier) &&
                                             (!selectedCode || o.code === selectedCode) &&
                                             (!selectedColor || o.color === selectedColor) &&
                                             (filterType === 'All' || o.type === filterType);

                        if (!matchesFilters) return false;

                        const oDate = o.orderDate || (o.createdAt ? o.createdAt.split('T')[0] : '');
                        if (fromDate && oDate < fromDate) return false;
                        if (toDate && oDate > toDate) return false;
                        return true;
                    });
                
                if (isolatedOrderId) {
                    data = data.filter(o => o.id === isolatedOrderId);
                }

                return data.sort((a, b) => new Date(a.orderDate || a.createdAt) - new Date(b.orderDate || b.createdAt));
            }, [selectedQuality, selectedSupplier, selectedCode, selectedColor, fromDate, toDate, orders, filterType, isolatedOrderId]);

            const lifecycleStats = useMemo(() => {
                if (analyticsData.length === 0) return null;

                const calculateWeights = (orderList) => {
                    let ordered = 0;
                    let received = 0;
                    let gr = 0;
                    orderList.forEach(o => {
                        ordered += Number(o.orderedWeight);
                        (o.batches || []).forEach(b => {
                            received += b.totalWeight;
                            (b.boxes || []).forEach(box => {
                                gr += (box.returnedWeight || 0);
                            });
                        });
                    });
                    return { ordered, received, gr };
                };

                const active = analyticsData.filter(o => o.status === 'Active');
                const completed = analyticsData.filter(o => o.status === 'Completed');

                const activeWeights = calculateWeights(active);
                const completedWeights = calculateWeights(completed);
                const totalWeights = calculateWeights(analyticsData);

                const activePending = Math.max(0, activeWeights.ordered - activeWeights.received);

                return {
                    active: {
                        count: active.length,
                        load: activeWeights.ordered,
                        gr: activeWeights.gr,
                        pending: activePending
                    },
                    completed: {
                        count: completed.length,
                        load: completedWeights.ordered,
                        gr: completedWeights.gr,
                        received: completedWeights.received
                    },
                    total: {
                        count: analyticsData.length,
                        load: totalWeights.ordered,
                        gr: totalWeights.gr,
                        received: totalWeights.received
                    }
                };
            }, [analyticsData]);

            const timelineEvents = useMemo(() => {
                if (!selectedQuality && !selectedSupplier && !selectedCode && !selectedColor && filterType === 'All') return [];

                const events = [];
                const GROUP_COLORS = ['#8b5cf6', '#ec4899', '#3b82f6', '#f59e0b', '#10b981', '#6366f1'];

                const matchingOrders = orders.filter(o => 
                    (!selectedQuality || o.quality === selectedQuality) && 
                    (!selectedSupplier || o.supplier === selectedSupplier) &&
                    (!selectedCode || o.code === selectedCode) &&
                    (!selectedColor || o.color === selectedColor) &&
                    (filterType === 'All' || o.type === filterType)
                ).sort((a, b) => new Date(a.orderDate || a.createdAt) - new Date(b.orderDate || b.createdAt));

                matchingOrders.forEach((order, idx) => {
                    if (isolatedOrderId && order.id !== isolatedOrderId) return;
                    
                    const groupColor = GROUP_COLORS[idx % GROUP_COLORS.length];
                    const dealNum = idx + 1;

                    const oDateStr = order.orderDate || (order.createdAt ? order.createdAt.split('T')[0] : '');
                    const oDate = new Date(oDateStr);
                    const isOrderInRange = (!fromDate || oDateStr >= fromDate) && (!toDate || oDateStr <= toDate);

                    if (isOrderInRange) {
                        events.push({
                            type: 'order',
                            orderId: order.id,
                            groupColor,
                            dealNum,
                            date: oDate,
                            data: { ...order, status: order.status }
                        });
                    }

                    (order.batches || []).forEach(batch => {
                        const aDateStr = batch.receiveDate || (batch.receivedAt ? batch.receivedAt.split('T')[0] : '');
                        const aDate = new Date(aDateStr);
                        const effectiveADate = aDate < oDate ? oDate : aDate;

                        const isArrivalInRange = (!fromDate || aDateStr >= fromDate) && (!toDate || aDateStr <= toDate);
                        const grossWeight = (batch.boxes || []).reduce((acc, box) => acc + box.weight, 0);

                        if (isArrivalInRange) {
                            events.push({
                                type: 'arrival',
                                orderId: order.id,
                                groupColor,
                                dealNum,
                                date: effectiveADate,
                                data: { ...batch, quality: order.quality, code: order.code, color: order.color, grossWeight }
                            });
                        }

                        let totalBatchGRWeight = 0;
                        let latestGRDateStr = null;
                        (batch.boxes || []).forEach(box => {
                            const rw = Number(box.returnedWeight) || 0;
                            if (rw > 0 && box.returnedDate) {
                                totalBatchGRWeight += rw;
                                if (!latestGRDateStr || box.returnedDate > latestGRDateStr) {
                                    latestGRDateStr = box.returnedDate;
                                }
                            }
                        });

                        if (totalBatchGRWeight > 0 && latestGRDateStr) {
                            const grDate = new Date(latestGRDateStr);
                            const effectiveGRDate = grDate < oDate ? oDate : grDate;

                            const isGRInRange = (!fromDate || latestGRDateStr >= fromDate) && (!toDate || latestGRDateStr <= toDate);
                            if (isGRInRange) {
                                events.push({
                                    type: 'gr',
                                    orderId: order.id,
                                    groupColor,
                                    dealNum,
                                    date: effectiveGRDate,
                                    data: { 
                                        weight: totalBatchGRWeight, 
                                        quality: order.quality, 
                                        code: order.code, 
                                        color: order.color, 
                                        challanNumber: batch.challanNumber 
                                    }
                                });
                            }
                        }
                    });
                });

                return events.sort((a, b) => {
                    const dateDiff = timelineDirection === 'RTL' ? b.date - a.date : a.date - b.date;
                    if (dateDiff !== 0) return dateDiff;
                    const priority = { 'gr': 3, 'arrival': 2, 'order': 1 };
                    return timelineDirection === 'RTL' ? priority[b.type] - priority[a.type] : priority[a.type] - priority[b.type];
                });

                let ordersWithGRCount = 0;
                let totalOrdered = 0;
                let grossWeight = 0;
                let returnedWeight = 0;

                analyticsData.forEach(order => {
                    let hasGRInRange = false;
                    let orderGrossInRange = 0;
                    let orderReturnedInRange = 0;

                    (order.batches || []).forEach(batch => {
                        const aDate = batch.receiveDate || (batch.receivedAt ? batch.receivedAt.split('T')[0] : '');
                        const isArrivalInRange = (!fromDate || aDate >= fromDate) && (!toDate || aDate <= toDate);

                        if (isArrivalInRange) {

                                const rw = (box.returnedWeight || 0);
                                orderReturnedInRange += rw;
                                if (rw > 0) hasGRInRange = true;
                            });
                        }

                        ordersWithGRCount++;
                        totalOrdered += Number(order.orderedWeight);
                        grossWeight += orderGrossInRange;
                        returnedWeight += orderReturnedInRange;
                    }
                });

                if (ordersWithGRCount === 0) return null;
                const netWeight = grossWeight - returnedWeight;
                const returnRate = grossWeight > 0 ? (returnedWeight / grossWeight) * 100 : 0;

        const QualityFormModal = ({ onClose, onSubmit, initialData, existingQualities, suppliers }) => {
            const [formData, setFormData] = useState(initialData || { quality: '', code: '', color: '', type: 'Polyester', supplier: '' });
            
            // Levenshtein distance for fuzzy matching
            const getLevenshteinDistance = (a, b) => {
                const matrix = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(null));
                for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
                for (let j = 0; j <= b.length; j++) matrix[j][0] = j;
                for (let j = 1; j <= b.length; j++) {
                    for (let i = 1; i <= a.length; i++) {
                        const substitutionCost = a[i - 1] === b[j - 1] ? 0 : 1;
                        matrix[j][i] = Math.min(matrix[j - 1][i] + 1, matrix[j][i - 1] + 1, matrix[j - 1][i - 1] + substitutionCost);
                    }
                }
                return matrix[b.length][a.length];
            };

            const duplicateEntry = useMemo(() => {
                const trimLower = (s) => (s || '').trim().toLowerCase();
                return existingQualities?.find(q => 
                    trimLower(q.quality) === trimLower(formData.quality) &&
                    trimLower(q.code) === trimLower(formData.code) &&
                    trimLower(q.color) === trimLower(formData.color) &&
                    trimLower(q.supplier) === trimLower(formData.supplier) &&
                    (!initialData || q.id !== initialData.id)
                );
            }, [formData, existingQualities, initialData]);

            const colorMismatchEntry = useMemo(() => {
                const trimLower = (s) => (s || '').trim().toLowerCase();
                if (!formData.quality || !formData.code || !formData.supplier || !formData.color) return null;
                
                return existingQualities?.find(q => 
                    trimLower(q.quality) === trimLower(formData.quality) &&
                    trimLower(q.supplier) === trimLower(formData.supplier) &&
                    trimLower(q.code) === trimLower(formData.code) &&
                    trimLower(q.color) !== trimLower(formData.color) &&
                    (!initialData || q.id !== initialData.id)
                );
            }, [formData, existingQualities, initialData]);

            const similarEntries = useMemo(() => {
                const trimLower = (s) => (s || '').trim().toLowerCase().replace(/\s+/g, '');
                const currentStr = trimLower(formData.quality + formData.code + formData.color + formData.supplier);
                
                if (currentStr.length < 4 || duplicateEntry || colorMismatchEntry) return [];

                return (existingQualities || []).filter(q => {
                    if (initialData && q.id === initialData.id) return false;
                    const existingStr = trimLower(q.quality + q.code + q.color + q.supplier);
                    
                    // Simple similarity check
                    const distance = Math.abs(currentStr.length - existingStr.length);
                    if (distance > 3) return false;

                    // Check if one is a substring of the other or has very few differences
                    const longer = currentStr.length > existingStr.length ? currentStr : existingStr;
                    const shorter = currentStr.length > existingStr.length ? existingStr : currentStr;
                    
                    if (longer.includes(shorter) && longer !== shorter) return true;

                    // Basic char-diff for speed instead of full Levenshtein in render loop
                    let diff = 0;
                    const map = {};
                    for(let char of longer) map[char] = (map[char] || 0) + 1;
                    for(let char of shorter) map[char] = (map[char] || 0) - 1;
                    for(let char in map) diff += Math.abs(map[char]);
                    
                    return diff <= 4; // Threshold for similarity
                }).slice(0, 3); // Limit to top 3 suggestions
            }, [formData, existingQualities, initialData, duplicateEntry, colorMismatchEntry]);

            const capitalizeWords = (str) => {
                if (!str) return '';
                return str.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            };

            const isFormIncomplete = !formData.quality.trim() || !formData.code.trim() || !formData.color.trim() || !formData.supplier.trim();

            return (
                <div className="modal-overlay">
                    <div className="modal">
                        <h2>{initialData ? 'Edit Quality' : 'Add New Quality'}</h2>
                        <div style={{marginTop: '1.5rem'}}>
                            <div className="input-group">
                                <label>Yarn Type</label>
                                <select

                                    onChange={e => setFormData({...formData, type: e.target.value})}

                                    <option value="Nylon">Nylon</option>

                                    <option value="Silk">Silk</option>
                                    <option value="Linen">Linen</option>
                                    <option value="Wool">Wool</option>
                                    <option value="Acrylic">Acrylic</option>
                                    <option value="Blend">Blend</option>
                                </select>
                            </div>
                            <div className="input-group">
                                <label>Quality</label>
                                <input type="text" value={formData.quality} onChange={e => setFormData({...formData, quality: capitalizeWords(e.target.value)})} placeholder="e.g. Cotton 40s" />
                            </div>
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                                <div className="input-group">
                                    <label>Code</label>
                                    <input type="text" value={formData.code} onChange={e => setFormData({...formData, code: capitalizeWords(e.target.value)})} placeholder="e.g. C40-X" />
                                </div>
                                <div className="input-group">
                                    <label>Color</label>
                                    <input type="text" value={formData.color} onChange={e => setFormData({...formData, color: capitalizeWords(e.target.value)})} placeholder="e.g. White" />
                                </div>
                            </div>

                                    placeholder="Select supplier..."

                                    value={formData.supplier}
                                    onChange={val => setFormData({...formData, supplier: capitalizeWords(val)})}
                                    emptyLabel="-- Type or Select --"
                                    showEmpty={false}
                                />
                            </div>

                            {duplicateEntry && (
                                <div style={{ 
                                    padding: '1rem', 
                                    background: 'rgba(239, 68, 68, 0.1)', 
                                    color: 'var(--error)', 
                                    borderRadius: '10px', 
                                    fontSize: '0.85rem', 
                                    marginBottom: '1rem',
                                    border: '1px solid rgba(239, 68, 68, 0.2)',
                                }}>
                                    <div style={{fontWeight: '700', marginBottom: '0.4rem', display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                        <span>⚠️ Duplicate Combination Found</span>
                                    </div>
                                    <p style={{opacity: 0.9}}>This combination already exists in the directory:</p>
                                    <div style={{ 
                                        marginTop: '0.6rem', 
                                        padding: '0.6rem', 
                                        background: 'rgba(255,255,255,0.5)', 
                                        borderRadius: '8px',
                                        fontSize: '0.8rem',
                                        color: 'var(--fg)'
                                    }}>
                                        <strong>{duplicateEntry.quality}</strong> | {duplicateEntry.code} | {duplicateEntry.color} | {duplicateEntry.supplier}
                                    </div>
                                </div>

                            {colorMismatchEntry && (
                                <div style={{ 
                                    padding: '1rem', 
                                    background: 'rgba(239, 68, 68, 0.1)', 
                                    color: 'var(--error)', 
                                    borderRadius: '10px',

                                    fontSize: '0.85rem',

                                        <span>💡 Similar Combinations Found</span>
                                    </div>
                                    <p style={{opacity: 0.9}}>Did you mean one of these existing entries?</p>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem', marginTop: '0.6rem' }}>
                                        {similarEntries.map(s => (
                                            <div key={s.id} style={{ 
                                                padding: '0.5rem', 
                                                background: 'rgba(255,255,255,0.5)', 
                                                borderRadius: '8px',

                                                <strong>{s.quality}</strong> | {s.code} | {s.color} | {s.supplier}
                                            </div>
                                        ))}
                                    </div>

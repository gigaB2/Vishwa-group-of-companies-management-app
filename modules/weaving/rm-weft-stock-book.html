                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ============================================
        // MAIN APP COMPONENT

        function App() {
            const [activeTab, setActiveTab] = useState(() => {
                const urlTab = new URLSearchParams(window.location.search).get('tab');
                return (urlTab === 'dashboard' || !urlTab) ? 'item-detail' : urlTab;
            });
            const [selectedYarnTypeFilterV2, setSelectedYarnTypeFilterV2] = useState('All');
            const [selectedQualityFilterV2, setSelectedQualityFilterV2] = useState('All');
            
            // LocalStorage Data
            const [orders, setOrders] = useLocalStorage('yarn-orders', DEMO_ORDERS);
            const [qualities, setQualities] = useLocalStorage('yarn-qualities', DEMO_QUALITIES);
            const [issues, setIssues] = useLocalStorage('yarn-issues', []);
            const currentFYVal = getFinancialYearForDate(new Date().toISOString().slice(0, 10));
            const [selectedFY, setSelectedFY] = useLocalStorage('vishwa_fashions_selected_fy', currentFYVal || 'All');

            const availableFYs = useMemo(() => {
                const years = new Set();
                const currentFY = getFinancialYearForDate(new Date().toISOString().slice(0, 10));
                if (currentFY) years.add(currentFY);

                (orders || []).forEach(o => {
                    if (o.orderDate) {
                        const fy = getFinancialYearForDate(o.orderDate);
                        if (fy) years.add(fy);
                    }
                    (o.batches || []).forEach(b => {
                        if (b.receiveDate) {
                            const fy = getFinancialYearForDate(b.receiveDate);
                            if (fy) years.add(fy);
                        }
                    });
                });

                (issues || []).forEach(i => {
                    if (i.date) {
                        const fy = getFinancialYearForDate(i.date);
                        if (fy) years.add(fy);
                    }
                });

                return ['All', ...Array.from(years).sort().reverse()];
            }, [orders, issues]);

            // Processed State
            const inventory = useMemo(() => processData(orders, qualities, issues, selectedFY), [orders, qualities, issues, selectedFY]);

            const availableYarnTypesV2 = useMemo(() => {
                const types = new Set();
                (inventory || []).forEach(item => {
                    const q = (qualities || []).find(x => x.quality === item.quality);
                    const type = q ? (q.type || 'Blend') : 'Blend';
                    types.add(type);
                });
                return ['All', ...Array.from(types).sort()];
            }, [inventory, qualities]);

            const availableQualitiesV2 = useMemo(() => {
                const list = new Set();
                (inventory || []).forEach(item => {
                    const q = (qualities || []).find(x => x.quality === item.quality);
                    const type = q ? (q.type || 'Blend') : 'Blend';
                    if (selectedYarnTypeFilterV2 === 'All' || type === selectedYarnTypeFilterV2) {
                        if (item.quality) list.add(item.quality);
                    }
                });
                return ['All', ...Array.from(list).sort()];
            }, [inventory, qualities, selectedYarnTypeFilterV2]);

            const filteredInventoryV2 = useMemo(() => {
                return (inventory || []).filter(item => {
                    const q = (qualities || []).find(x => x.quality === item.quality);
                    const type = q ? (q.type || 'Blend') : 'Blend';
                    const matchesType = (selectedYarnTypeFilterV2 === 'All' || type === selectedYarnTypeFilterV2);
                    const matchesQuality = (selectedQualityFilterV2 === 'All' || item.quality === selectedQualityFilterV2);
                    return matchesType && matchesQuality;
                });
            }, [inventory, qualities, selectedYarnTypeFilterV2, selectedQualityFilterV2]);

            // Reset yarn quality filter if it doesn't match the new selected yarn type
            useEffect(() => {
                if (selectedQualityFilterV2 !== 'All') {
                    const stillValid = (inventory || []).some(item => {
                        if (item.quality !== selectedQualityFilterV2) return false;
                        const q = (qualities || []).find(x => x.quality === item.quality);
                        const type = q ? (q.type || 'Blend') : 'Blend';
                        return selectedYarnTypeFilterV2 === 'All' || type === selectedYarnTypeFilterV2;
                    });
                    if (!stillValid) {
                        setSelectedQualityFilterV2('All');
                    }
                }
            }, [selectedYarnTypeFilterV2, qualities, inventory, selectedQualityFilterV2]);
            
            const [loading, setLoading] = useState(false); // No longer async loading
            const [selectedTreeNode, setSelectedTreeNode] = useState(null);
            const [drawerIssueForm, setDrawerIssueForm] = useState({ date: new Date().toISOString().slice(0, 10), cones: '', details: '' });
            const [search, setSearch] = useState('');
            const [issueSearch, setIssueSearch] = useState('');
            const [qualityFilter, setQualityFilter] = useState('');
            const [yarnTypeFilter, setYarnTypeFilter] = useState('');
            const [dateFilter, setDateFilter] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedChallan, setSelectedChallan] = useState(null);
            const [selectedBox, setSelectedBox] = useState(null);
            const [editingIssueId, setEditingIssueId] = useState(null);
            const [editingIssueDraft, setEditingIssueDraft] = useState(null);
            const [newQualityForm, setNewQualityForm] = useState({
                quality: '',
                company: '',
                code: '',
                color: ''
            });
            const [multiIssueForm, setMultiIssueForm] = useState([{
                id: Date.now(),
                date: new Date().toISOString().slice(0, 10),
                quality: '',
                code: '',
                color: '',
                box: '',
                cones: '',
                net: '',
                details: ''
            }]);
            const [qualitySearchFilter, setQualitySearchFilter] = useState('');
            const [lowStockThreshold, setLowStockThreshold] = useState(10);
            const [lowStockSearch, setLowStockSearch] = useState('');
            const [sortState, setSortState] = useState({
                'history-table': { column: 'date', dir: 'desc' }
            });
            const [newBoxForm, setNewBoxForm] = useState({
                boxNumber: '',
                inCones: '',
                inKg: ''
            });
            const [yarnInForm, setYarnInForm] = useState({
                quality: '',
                code: '',
                color: '',
                challanNumber: '',
                date: new Date().toISOString().slice(0, 10),
                boxes: [{ id: 1, boxNumber: '', inCones: '', inKg: '' }]
            });
            const [challanFromDate, setChallanFromDate] = useState('');
            const [challanToDate, setChallanToDate] = useState('');
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('vishwa_fashions_theme') === 'true' || 
                       (localStorage.getItem('vishwa_fashions_theme') === null && true);
            });

            useEffect(() => {
                const handleThemeChange = (e) => {
                    setDarkMode(e.detail.isDark);
                };
                window.addEventListener('themeChanged', handleThemeChange);
                return () => window.removeEventListener('themeChanged', handleThemeChange);
            }, []);

            useEffect(() => {
                const handleFYChange = (e) => {
                    setSelectedFY(e.detail.fy);
                };
                window.addEventListener('fyChanged', handleFYChange);
                return () => window.removeEventListener('fyChanged', handleFYChange);
            }, []);

            useEffect(() => {
                const tabNames = {
                    'item-detail': 'Stock Register',
                    'item-ledger-v2': 'Item-wise Ledger v2',
                    'challan-detail': 'Challan Details',
                    'box-detail': 'Box Details',
                    'low-stock': 'Low Stock Alerts',
                    'challan-history': 'Challan Register',
                    'log': 'Transaction Log'
                };
                const tabName = tabNames[activeTab] || 'RM Weft Stock Book';
                document.title = tabName;
            }, [activeTab]);

            const uniqueQualities = useMemo(() => [...new Set(inventory.map(i => i.quality).filter(q => !!q))].sort(), [inventory]);
            const uniqueYarnTypes = useMemo(() => [...new Set(qualities.map(q => q.type).filter(t => !!t))].sort(), [qualities]);

            // Sync selected items with updated inventory to keep data fresh without page refresh
            useEffect(() => {
                if (selectedItem) {
                    const updated = inventory.find(i => 
                        i.quality === selectedItem.quality && 
                        i.code === selectedItem.code && 
                        i.color === selectedItem.color
                    );
                    if (updated && JSON.stringify(updated) !== JSON.stringify(selectedItem)) {
                        setSelectedItem(updated);
                    }
                }
            }, [inventory]); // Only re-run when inventory changes

            useEffect(() => {
                if (selectedChallan && movementRows.length > 0) {
                    const updated = movementRows.find(r => r.challanNumber === selectedChallan.challanNumber);
                    if (updated && JSON.stringify(updated) !== JSON.stringify(selectedChallan)) {
                        setSelectedChallan(updated);
                    }
                }
            }, [movementRows]);

            useEffect(() => {
                if (selectedBox && challanBoxRows.length > 0) {
                    const updated = challanBoxRows.find(b => b.boxNumber === selectedBox.boxNumber);
                    if (updated && JSON.stringify(updated) !== JSON.stringify(selectedBox)) {
                        setSelectedBox(updated);
                    }
                }
            }, [challanBoxRows]);

            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }, [darkMode]);

            // Sidebar active class syncing useEffect
            useEffect(() => {
                document.querySelectorAll('.vf-sb-link').forEach(el => {
                    const href = el.getAttribute('href') || '';
                    const isWeftLink = href.includes('rm-weft-stock-book.html') || href.includes('rm-weft-stock-book.html');
                    if (!isWeftLink) {
                        el.classList.remove('active');
                        return;
                    }
                    
                    const tabMatch = href.match(/[?&]tab=([^&]+)/);
                    const linkTab = tabMatch ? tabMatch[1] : 'dashboard';
                    
                    let currentTargetTab = activeTab || 'dashboard';
                    if (currentTargetTab === 'challan-detail' || currentTargetTab === 'box-detail') {
                        currentTargetTab = 'challan-history';
                    }

                    if (linkTab === currentTargetTab) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                });
            }, [activeTab]);



            const toggleSort = (tableId, column) => {
                setSortState(prev => {
                    const current = prev[tableId];
                    const next = !current ? { column, dir: 'desc' }
                        : current.column !== column ? { column, dir: 'desc' }
                        : current.dir === 'desc' ? { column, dir: 'asc' }
                        : null;
                    return { ...prev, [tableId]: next };
                });
            };

            const getSortArrow = (tableId, column) => {
                const state = sortState[tableId];
                if (!state || state.column !== column) return '';
                return state.dir === 'asc' ? ' ↑' : ' ↓';
            };

            const sortData = (data, tableId, columns) => {
                const state = sortState[tableId];
                if (!state) return data;
                const sorted = [...data].sort((a, b) => {
                    const aVal = a[state.column];
                    const bVal = b[state.column];
                    const isNum = (typeof aVal === 'number' || (typeof aVal === 'string' && /^-?\d+(\.\d+)?$/.test(aVal))) &&
                                  (typeof bVal === 'number' || (typeof bVal === 'string' && /^-?\d+(\.\d+)?$/.test(bVal)));
                    const cmp = isNum
                        ? parseFloat(aVal) - parseFloat(bVal)
                        : String(aVal || '').localeCompare(String(bVal || ''));
                    return state.dir === 'asc' ? cmp : -cmp;
                });
                return sorted;
            };

            const addTimestampToDate = (dateStr) => {
                if (!dateStr) return dateStr;
                if (dateStr.includes('T') || dateStr.includes(':') || dateStr.length > 10) {
                    return dateStr;
                }
                const now = new Date();
                const pad = (num) => String(num).padStart(2, '0');
                const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${String(now.getMilliseconds()).padStart(3, '0')}`;
                return `${dateStr}T${timeStr}`;
            };

            const formatDate = (dateStr) => {
                if (!dateStr || dateStr === '—') return '—';
                const dateOnly = dateStr.includes('T') ? dateStr.split('T')[0] : dateStr.split(' ')[0];
                const [year, month, day] = dateOnly.split('-');
                return `${day}-${month}-${year}`;
            };

            const filteredInventory = useMemo(() => {
                return inventory.filter(item => {
                    const matchesSearch = !search ||
                        (item.quality || '').toLowerCase().includes(search.toLowerCase()) ||
                        (item.color || '').toLowerCase().includes(search.toLowerCase()) ||
                        (item.company || '').toLowerCase().includes(search.toLowerCase()) ||
                        String(item.code || '').toLowerCase().includes(search.toLowerCase());
                    const matchesQuality = !qualityFilter || item.quality === qualityFilter;
                    
                    const qObj = qualities.find(q => q.quality === item.quality && q.code === item.code && q.color === item.color);
                    const itemType = qObj ? qObj.type : 'Specialty';
                    const matchesYarnType = !yarnTypeFilter || itemType === yarnTypeFilter;
                    
                    return matchesSearch && matchesQuality && matchesYarnType;
                }).sort((a, b) => {
                    const dateA = a.lastArrivalDate || '';
                    const dateB = b.lastArrivalDate || '';
                    return dateB.localeCompare(dateA);
                });
            }, [inventory, search, qualityFilter, yarnTypeFilter, qualities]);

            const stats = useMemo(() => {
                const totalStock = filteredInventory.reduce((acc, item) => acc + (parseFloat(item.remainingKg) || 0), 0);
                const totalCones = filteredInventory.reduce((acc, item) => acc + (parseInt(item.remainingCones) || 0), 0);
                const uniqueQualitiesCount = new Set(filteredInventory.map(item => item.quality)).size;
                return { totalStock, totalCones, uniqueQualities: uniqueQualitiesCount };
            }, [filteredInventory]);

            const lowStockItems = useMemo(() => {
                const q = lowStockSearch.toLowerCase();
                return inventory
                    .filter(item => {
                        const remaining = item.remainingKg;
                        const matchesSearch = !q ||
                            (item.quality || '').toLowerCase().includes(q) ||
                            (item.company || '').toLowerCase().includes(q) ||
                            String(item.code || '').toLowerCase().includes(q) ||
                            (item.color || '').toLowerCase().includes(q);
                        return remaining < lowStockThreshold && matchesSearch;
                    })
                    .sort((a, b) => a.remainingKg - b.remainingKg);
            }, [inventory, lowStockThreshold, lowStockSearch]);

            const filteredIssues = useMemo(() => {
                let filtered = issues;
                const { start, end } = getFYDateRange(selectedFY);
                if (start && end) {
                    filtered = filtered.filter(issue => issue.date >= start && issue.date <= end);
                }
                if (dateFilter) {
                    filtered = filtered.filter(issue => issue.date === dateFilter);
                }
                if (issueSearch.trim()) {
                    const isExact = issueSearch.includes(',');
                    const terms = issueSearch.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
                    filtered = filtered.filter(issue => {
                        const searchParts = [
                            issue.date,
                            issue.quality,
                            issue.supplier,
                            issue.code,
                            issue.color,
                            issue.box,
                            issue.cones,
                            issue.net,
                            issue.details,
                            issue.challan
                        ];
                        const searchPartsLower = searchParts.map(v => (v ?? '').toString().toLowerCase());
                        const finalContent = searchPartsLower.join(' ');
                        
                        return terms.every(term => {
                            if (isExact) {
                                return searchPartsLower.some(val => val === term);
                            } else {
                                return finalContent.includes(term);
                            }
                        });
                    });
                }
                return filtered;
            }, [issues, dateFilter, issueSearch]);

            const selectedIssues = useMemo(() => {
                if (!selectedItem) return [];
                return issues.filter(issue =>
                    issue.quality === selectedItem.quality &&
                    issue.code === selectedItem.code
                );
            }, [selectedItem, issues]);

            const movementRows = useMemo(() => {
                if (!selectedItem) return [];
                const rowsByKey = new Map();

                for (const box of (selectedItem.boxes || [])) {
                    const ch = box.challan || box.challanNumber || 'unknown';
                    const lot = box.lotNumber || '—';
                    const key = `${ch}|${lot}`;
                    const existing = rowsByKey.get(key) || {
                        id: key,
                        challanNumber: ch,
                        lotNumber: lot,
                        arrivalDate: box.arrivalDate || '',
                        inCones: 0, inKg: 0, grCones: 0, grKg: 0, outCones: 0, outKg: 0,
                        isCarriedForward: box.isCarriedForward
                    };
                    
                    if (box.isCarriedForward) {
                        existing.inCones += box.openingStockCones;
                        existing.inKg += box.openingStockKg;
                    } else {
                        const boxInCones = parseInt(box.cones) || 0;
                        const boxInKg = parseFloat(box.totalWeight || box.stock) || 0;
                        const rawBoxGrKg = parseFloat(box.returnedWeight) || 0;
                        const boxGrCones = (rawBoxGrKg && boxInKg && boxInCones) ? Math.round(rawBoxGrKg / (boxInKg / boxInCones)) : 0;
                        const boxGrKg = boxGrCones * (boxInCones > 0 ? (boxInKg / boxInCones) : 0);

                        existing.inCones += boxInCones;
                        existing.inKg += boxInKg;
                        existing.grCones += boxGrCones;
                        existing.grKg += boxGrKg;
                    }
                    rowsByKey.set(key, existing);
                }

                for (const issue of selectedIssues) {
                    const { start, end } = getFYDateRange(selectedFY);
                    if (start && (issue.date < start || issue.date > end)) continue;

                    const ch = issue.challan || 'unknown';
                    let foundKey = null;
                    for (const [key, val] of rowsByKey.entries()) {
                        if (val.challanNumber === ch) {
                            foundKey = key;
                            break;
                        }
                    }

                    if (foundKey) {
                        const existing = rowsByKey.get(foundKey);
                        existing.outCones = (parseInt(existing.outCones) || 0) + (parseFloat(issue.cones) || 0);
                        existing.outKg = (parseFloat(existing.outKg) || 0) + (parseFloat(issue.net) || 0);
                    } else {
                        const key = `${ch}|—`;
                        const existing = rowsByKey.get(key) || {
                            id: key, challanNumber: ch, lotNumber: '—', arrivalDate: '',
                            inCones: 0, inKg: 0, grCones: 0, grKg: 0, outCones: 0, outKg: 0
                        };
                        existing.outCones = (parseInt(existing.outCones) || 0) + (parseFloat(issue.cones) || 0);
                        existing.outKg = (parseFloat(existing.outKg) || 0) + (parseFloat(issue.net) || 0);
                        rowsByKey.set(key, existing);
                    }
                }

                return [...rowsByKey.values()];
            }, [selectedItem, selectedIssues, selectedFY]);

            const filteredMovementRows = useMemo(() => {
                if (!challanFromDate && !challanToDate) return movementRows;
                return movementRows.filter(row => {
                    if (challanFromDate && row.arrivalDate < challanFromDate) return false;
                    if (challanToDate && row.arrivalDate > challanToDate) return false;
                    return true;
                });
            }, [movementRows, challanFromDate, challanToDate]);

            const movementTotals = useMemo(() => {
                const totalInKg    = filteredMovementRows.reduce((acc, row) => acc + (parseFloat(row.inKg) || 0), 0);
                const totalGrKg    = filteredMovementRows.reduce((acc, row) => acc + (parseFloat(row.grKg) || 0), 0);
                const totalOutKg   = filteredMovementRows.reduce((acc, row) => acc + (parseFloat(row.outKg) || 0), 0);
                const totalInCones = filteredMovementRows.reduce((acc, row) => acc + (parseInt(row.inCones) || 0), 0);
                const totalGrCones = filteredMovementRows.reduce((acc, row) => acc + (parseInt(row.grCones) || 0), 0);
                const totalOutCones= filteredMovementRows.reduce((acc, row) => acc + (parseInt(row.outCones) || 0), 0);
                
                const netInKg = totalInKg - totalGrKg;
                const netInCones = totalInCones - totalGrCones;

                return {
                    totalInKg, totalGrKg, totalOutKg, totalInCones, totalGrCones, totalOutCones,
                    netInKg, netInCones,
                    balanceKg: netInKg - totalOutKg,
                    balanceCones: netInCones - totalOutCones
                };
            }, [filteredMovementRows]);

            const openItemDetail = (item) => {
                setSelectedItem(item);
                setSelectedChallan(null);
                setSelectedBox(null);
                setChallanFromDate('');
                setChallanToDate('');
                setActiveTab('item-detail');
            };

            const openChallanDetail = (row) => {
                setSelectedChallan(row);
                setActiveTab('challan-detail');
            };

            const handleAddNewBox = (e) => {
                e.preventDefault();
                alert('To add a box to an existing challan, use the Yarn In tab with the same challan number.');
            };

            const openBoxDetail = (row) => {
                setSelectedBox(row);
                setActiveTab('box-detail');
            };

            const challanBoxRows = useMemo(() => {
                if (!selectedItem || !selectedChallan) return [];
                const rowsByBox = new Map();
                const selectedChallanNumber = String(selectedChallan.challanNumber || '');

                const incomingBoxes = Array.isArray(selectedItem.boxes) && selectedItem.boxes.length
                    ? selectedItem.boxes.filter(b => String(b.challan || b.challanNumber || '') === selectedChallanNumber)
                    : [];

                for (const box of incomingBoxes) {
                    rowsByBox.set(box.boxNumber, {
                        id: box.id || box.boxNumber,
                        boxNumber: box.boxNumber,
                        challanNumber: selectedChallanNumber,
                        cones: box.cones,
                        totalWeight: box.totalWeight,
                        grCones: box.grCones,
                        grWeight: box.grWeight,
                        returnedDate: box.returnedDate,
                        arrivalDate: box.arrivalDate,
                        orderId: box.orderId,
                        issuedCones: box.issuedCones,
                        issuedKg: box.issuedKg,
                        isCarriedForward: box.isCarriedForward,
                        openingStockKg: box.openingStockKg,
                        openingStockCones: box.openingStockCones
                    });
                }

                return [...rowsByBox.values()];
            }, [selectedItem, selectedChallan]);

            const boxIssueRows = useMemo(() => {
                if (!selectedItem || !selectedChallan || !selectedBox) return [];
                const selectedChallanNumber = String(selectedChallan.challanNumber || '');
                const selectedBoxNumber = String(selectedBox.boxNumber || '');
                const rowsByDate = new Map();

                for (const issue of issues) {
                    if (issue.quality === selectedItem.quality &&
                        issue.code === selectedItem.code &&
                        issue.challan === selectedChallanNumber &&
                        issue.box === selectedBoxNumber) {
                        const issueDate = issue.date;
                        const existing = rowsByDate.get(issueDate) || { date: issueDate, outCones: 0, outKg: 0 };
                        existing.outCones = (parseInt(existing.outCones) || 0) + (parseFloat(issue.cones) || 0);
                        existing.outKg = (parseFloat(existing.outKg) || 0) + (parseFloat(issue.net) || 0);
                        rowsByDate.set(issueDate, existing);
                    }
                }
                return [...rowsByDate.values()].sort((a, b) => a.date.localeCompare(b.date));
            }, [selectedItem, selectedChallan, selectedBox, issues]);

            const boxIssueEntries = useMemo(() => {
                if (!selectedItem || !selectedChallan || !selectedBox) return [];
                const selectedChallanNumber = String(selectedChallan.challanNumber || '');
                const selectedBoxNumber = String(selectedBox.boxNumber || '');
                return issues.filter(issue =>
                    issue.quality === selectedItem.quality &&
                    issue.code === selectedItem.code &&
                    issue.challan === selectedChallanNumber &&
                    issue.box === selectedBoxNumber
                ).sort((a, b) => a.date.localeCompare(b.date));
            }, [selectedItem, selectedChallan, selectedBox, issues]);

            const boxCombinedEntries = useMemo(() => {
                if (!selectedBox) return [];
                const entries = boxIssueEntries.map(i => ({ ...i, isIssue: true }));
                if ((parseFloat(selectedBox.grWeight) || 0) > 0 || (parseInt(selectedBox.grCones) || 0) > 0) {
                    entries.push({
                        id: `gr-${selectedBox.id}`,
                        date: selectedBox.returnedDate || selectedBox.arrivalDate || '—',
                        cones: 0,
                        net: 0,
                        grCones: selectedBox.grCones,
                        grWeight: selectedBox.grWeight,
                        isGR: true,
                        orderId: selectedBox.orderId,
                        details: 'Goods Return'
                    });
                }
                return entries.sort((a, b) => String(a.date).localeCompare(String(b.date)));
            }, [boxIssueEntries, selectedBox]);

            const editGR = (orderId, quality, code) => {
                const search = orderId || `${quality} ${code}`;
                const url = `order-book.html?search=${encodeURIComponent(search)}&openDetails=${orderId ? 'true' : 'false'}`;
                window.open(url, '_blank');
            };

            const selectedBoxConeWeight = () => {
                if (!selectedItem || !selectedBox) return 0;
                const box = selectedItem.boxes?.find(b => b.boxNumber === selectedBox.boxNumber);
                if (!box || !box.cones) return 0;
                return (parseFloat(box.totalWeight) || 0) / (parseInt(box.cones) || 1);
            };

            const getIssueConeWeight = (issue) => {
                if (!issue) return 0;
                const item = inventory.find(i =>
                    i.quality === issue.quality &&
                    i.company === issue.supplier &&
                    i.code === issue.code &&
                    i.color === issue.color
                );
                if (!item) return 0;
                const box = item.boxes?.find(b => b.boxNumber === issue.box && b.challan === issue.challan);
                if (!box || !box.cones) return 0;
                return (parseFloat(box.totalWeight) || 0) / (parseInt(box.cones) || 1);
            };

            const updateIssueDraft = (field, value) => {
                setEditingIssueDraft(prev => ({ ...prev, [field]: value }));
            };

            const updateIssueDraftWithSnapping = (field, value) => {
                setEditingIssueDraft(prev => {
                    let updated = { ...prev, [field]: value };
                    
                    if (field === 'quality' || field === 'code' || field === 'color') {
                        let filtered = inventory.filter(item => {
                            return (!updated.quality || item.quality === updated.quality) &&
                                   (!updated.code || item.code === updated.code) &&
                                   (!updated.color || item.color === updated.color);
                        });

                        if (filtered.length === 1) {
                            const item = filtered[0];
                            updated.quality = item.quality;
                            updated.code = item.code;
                            updated.color = item.color;
                        }
                    }

                    if (field === 'box') {
                        const boxNumber = value.includes(' (') ? value.split(' (')[0] : value;
                        updated.box = boxNumber;

                        let possibleItems = inventory.filter(item => 
                            (item.boxes || []).some(b => b.boxNumber === boxNumber)
                        );
                        
                        if (updated.quality) possibleItems = possibleItems.filter(i => i.quality === updated.quality);
                        if (updated.code) possibleItems = possibleItems.filter(i => i.code === updated.code);
                        if (updated.color) possibleItems = possibleItems.filter(i => i.color === updated.color);

                        if (possibleItems.length === 1) {
                            updated.quality = possibleItems[0].quality;
                            updated.code = possibleItems[0].code;
                            updated.color = possibleItems[0].color;
                        }
                    }

                    if (field === 'quality' && value === '') { updated.code = ''; updated.color = ''; updated.box = ''; }
                    if (field === 'code' && value === '') { updated.color = ''; updated.box = ''; }
                    if (field === 'color' && value === '') { updated.box = ''; }
                    
                    return updated;
                });
            };

            const updateIssueConesDraft = (value) => {
                const cw = (editingIssueDraft && editingIssueDraft.quality) ? getIssueConeWeight(editingIssueDraft) : selectedBoxConeWeight();
                const c = parseFloat(value) || 0;
                setEditingIssueDraft(prev => ({
                    ...prev,
                    cones: value,
                    net: cw > 0 ? (c * cw).toFixed(3) : prev.net
                }));
            };

            const startIssueEdit = (issue) => {
                setEditingIssueId(issue.id);
                setEditingIssueDraft({ ...issue });
            };

            const cancelIssueEdit = () => {
                setEditingIssueId(null);
                setEditingIssueDraft(null);
            };

            const saveIssueEdit = () => {
                if (!editingIssueDraft) return;

                const item = inventory.find(i =>
                    i.quality === editingIssueDraft.quality &&
                    i.company === editingIssueDraft.supplier &&
                    i.code === editingIssueDraft.code &&
                    i.color === editingIssueDraft.color
                );
                if (!item) {
                    alert('Yarn item for this issue not found in inventory.');
                    return;
                }
                const box = item.boxes?.find(b => b.boxNumber === editingIssueDraft.box && b.challan === editingIssueDraft.challan);
                if (!box) {
                    alert('Box for this issue not found in inventory.');
                    return;
                }

                // Validation: Prevent negative stock
                const inCones = parseInt(box.cones) || 0;
                const grCones = parseInt(box.grCones) || 0;
                const netInCones = inCones - grCones;

                const otherIssuesCones = issues
                    .filter(i => i.id !== editingIssueId && i.quality === editingIssueDraft.quality && i.code === editingIssueDraft.code && i.box === editingIssueDraft.box && i.challan === editingIssueDraft.challan)
                    .reduce((s, i) => s + (parseInt(i.cones) || 0), 0);
                
                const newTotalCones = otherIssuesCones + (parseInt(editingIssueDraft.cones) || 0);

                if (newTotalCones > netInCones) {
                    alert(`Invalid entry: Total issued cones (${newTotalCones}) would exceed available stock (${netInCones}) for this box.`);
                    return;
                }

                const cw = getIssueConeWeight(editingIssueDraft);
                const c = parseFloat(editingIssueDraft.cones) || 0;
                const autoNet = cw > 0 ? (c * cw).toFixed(3) : editingIssueDraft.net;

                setIssues(prev => prev.map(i => i.id === editingIssueId ? {
                    ...editingIssueDraft,
                    date: addTimestampToDate(editingIssueDraft.date),
                    cones: parseFloat(editingIssueDraft.cones) || 0,
                    net: parseFloat(autoNet) || 0
                } : i));
                cancelIssueEdit();
            };

            const deleteIssue = (issueId) => {
                const ok = window.confirm('Delete this issue entry? This removes it from history and all box deduction totals.');
                if (!ok) return;
                setIssues(prev => prev.filter(i => i.id !== issueId));
                if (editingIssueId === issueId) cancelIssueEdit();
            };

            const addIssueRow = () => {
                setMultiIssueForm(prev => [...prev, {
                    id: Date.now() + Math.random(),
                    date: new Date().toISOString().slice(0, 10),
                    quality: '',
                    supplier: '',
                    code: '',
                    color: '',
                    box: '',
                    cones: '',
                    net: '',
                    details: ''
                }]);
            };

            const removeIssueRow = (id) => {
               if (multiIssueForm.length === 1) {
                   alert('At least one issue entry is required.');
                   return;
               }
               setMultiIssueForm(prev => prev.filter(row => row.id !== id));
            };

            const resetIssueRow = (id) => {
               setMultiIssueForm(prev => prev.map(row => {
                   if (row.id === id) {
                       return {
                           ...row,
                           quality: '',
                           supplier: '',
                           code: '',
                           color: '',
                           box: '',
                           cones: '',
                           net: '',
                           details: ''
                       };
                   }
                   return row;
               }));
            };

            const updateIssueRow = (id, field, value) => {
                setMultiIssueForm(prev => prev.map(row => {
                    if (row.id === id) {
                        let updated = { ...row, [field]: value };
                        
                        // Smart Snapping Logic
                        if (field === 'quality' || field === 'supplier' || field === 'code' || field === 'color') {
                            let filtered = inventory.filter(item => {
                                return (!updated.quality || item.quality === updated.quality) &&
                                       (!updated.supplier || item.company === updated.supplier) &&
                                       (!updated.code || item.code === updated.code) &&
                                       (!updated.color || item.color === updated.color);
                            });

                            if (filtered.length === 1) {
                                const item = filtered[0];
                                updated.quality = item.quality;
                                updated.supplier = item.company;
                                updated.code = item.code;
                                updated.color = item.color;
                            }
                        }

                        if (field === 'box') {
                            // Extract box number if it's in "B1 (10 cones)" format
                            const boxNumber = value.includes(' (') ? value.split(' (')[0] : value;
                            updated.box = boxNumber;

                            let possibleItems = inventory.filter(item => 
                                (item.boxes || []).some(b => b.boxNumber === boxNumber)
                            );
                            
                            if (updated.quality) possibleItems = possibleItems.filter(i => i.quality === updated.quality);
                            if (updated.supplier) possibleItems = possibleItems.filter(i => i.company === updated.supplier);
                            if (updated.code) possibleItems = possibleItems.filter(i => i.code === updated.code);
                            if (updated.color) possibleItems = possibleItems.filter(i => i.color === updated.color);

                            if (possibleItems.length === 1) {
                                updated.quality = possibleItems[0].quality;
                                updated.supplier = possibleItems[0].company;
                                updated.code = possibleItems[0].code;
                                updated.color = possibleItems[0].color;
                            }
                        }

                        // Auto-calculate weight
                        const rowItem = inventory.find(i => i.quality === updated.quality && i.code === updated.code && (!updated.supplier || i.company === updated.supplier));
                        const rowBox = rowItem?.boxes.find(b => b.boxNumber === updated.box);
                        if (rowBox && rowBox.cones > 0) {
                            const coneWeight = (parseFloat(rowBox.totalWeight) || 0) / (parseInt(rowBox.cones) || 1);
                            const c = parseFloat(updated.cones) || 0;
                            if (c > 0) {
                                updated.net = (c * coneWeight).toFixed(3);
                            }
                        }

                        if (field === 'quality' && value === '') {
                            updated.supplier = '';
                            updated.code = '';
                            updated.color = '';
                            updated.box = '';
                            updated.net = '';
                        }
                        if (field === 'supplier' && value === '') {
                            updated.code = '';
                            updated.color = '';
                            updated.box = '';
                            updated.net = '';
                        }
                        if (field === 'code' && value === '') {
                            updated.color = '';
                            updated.box = '';
                            updated.net = '';
                        }
                        if (field === 'color' && value === '') {
                            updated.box = '';
                            updated.net = '';
                        }
                        return updated;
                    }
                    return row;
                }));
            };

            const getFilteredOptionsForRow = (row, field) => {
                let filtered = inventory;
                if (row.quality && field !== 'quality') filtered = filtered.filter(i => i.quality === row.quality);
                if (row.supplier && field !== 'supplier') filtered = filtered.filter(i => i.company === row.supplier);
                if (row.code && field !== 'code') filtered = filtered.filter(i => i.code === row.code);
                if (row.color && field !== 'color') filtered = filtered.filter(i => i.color === row.color);
                
                if (field === 'box') {
                    const options = [];
                    const seen = new Set();
                    filtered.flatMap(item => item.boxes || [])
                        .map(box => {
                            const issuedCones = (box.issues || []).reduce((sum, issue) => sum + (parseInt(issue.cones) || 0), 0);
                            const remainingCones = (parseInt(box.openingStockCones) || 0) - issuedCones;
                            return { ...box, remainingCones };
                        })
                        .filter(box => box.remainingCones > 0)
                        .forEach(box => {
                            const label = `${box.boxNumber} [${box.remainingCones} cones]`;
                            if (!seen.has(label)) {
                                options.push({ label, value: box.boxNumber });
                                seen.add(label);
                            }
                        });
                    return options;
                }

                const valueField = field === 'supplier' ? 'company' : field;
                return [...new Set(filtered.map(i => i[valueField]).filter(Boolean))].sort();
            };

            const handleAddIndividualIssue = (e) => {
                e.preventDefault();
                
                const newIssues = [];
                const boxUsage = {}; // Track cones used in this batch per box

                for (const row of multiIssueForm) {
                    if (!row.box || !row.date || !row.quality || !row.code || !row.supplier) {
                        alert('Please fill in all required fields (Date, Quality, Supplier, Code, Box) for all entries.');
                        return;
                    }

                    let foundBox = null;
                    for (const item of inventory) {
                        if (item.quality === row.quality && item.company === row.supplier && item.code === row.code && item.color === row.color) {
                            const box = item.boxes?.find(b => b.boxNumber === row.box);
                            if (box) { foundBox = box; break; }
                        }
                    }

                    if (!foundBox) {
                        alert(`Box number "${row.box}" not found for quality "${row.quality}" from supplier "${row.supplier}" code "${row.code}".`);
                        return;
                    }

                    const boxKey = `${row.quality}|${row.supplier}|${row.code}|${row.box}`;
                    const existingIssuedCones = (foundBox.issues || []).reduce((sum, issue) => sum + (parseInt(issue.cones) || 0), 0);
                    const remainingCones = (parseInt(foundBox.openingStockCones) || 0) - existingIssuedCones;
                    
                    const newIssueCones = parseFloat(row.cones) || 0;
                    const batchUsedSoFar = boxUsage[boxKey] || 0;

                    if (newIssueCones + batchUsedSoFar > remainingCones) {
                        alert(`Insufficient stock in Box "${row.box}" for one of the entries (Remaining: ${remainingCones}, requested in batch: ${newIssueCones + batchUsedSoFar}).`);
                        return;
                    }

                    boxUsage[boxKey] = batchUsedSoFar + newIssueCones;

                    newIssues.push({
                        id: (Date.now() + Math.random()).toString(),
                        date: addTimestampToDate(row.date),
                        quality: row.quality,
                        supplier: row.supplier,
                        code: row.code,
                        color: row.color,
                        box: row.box,
                        challan: foundBox.challan,
                        cones: parseFloat(row.cones) || 0,
                        net: parseFloat(row.net) || 0,
                        details: row.details || ''
                    });
                }

                setIssues(prev => [...newIssues, ...prev]);
                setMultiIssueForm([{
                    id: Date.now(),
                    date: new Date().toISOString().slice(0, 10),
                    quality: '',
                    supplier: '',
                    code: '',
                    color: '',
                    box: '',
                    cones: '',
                    net: '',
                    details: ''
                }]);
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 3000);
            };

            if (loading) {
                return (
                    <div className={`app-container ${darkMode ? 'dark-mode' : ''}`} style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
                        <div style={{textAlign:'center',color:'var(--muted)'}}>
                            <p style={{fontSize:'1.5rem',marginBottom:'0.5rem'}}>Loading...</p>
                            <p style={{fontSize:'0.9rem'}}>Connecting to database</p>

                    </div>
                );
            }

            const Breadcrumbs = () => {

                // Root is always Dashboard/Stock Register
                crumbs.push({

                            Stock Register
                        </span>

                if (selectedItem) {

                            <span style={{ display: 'inline-flex', alignItems: 'center', gap: '0.35rem', flexWrap: 'wrap' }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '2px'}}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                                <span style={{ opacity: 0.6 }}>Ledger:</span>

                                                                            <th style={{ padding: '0.5rem', textAlign: 'right' }}>Original</th>
                                                                            <th style={{ padding: '0.5rem', textAlign: 'right' }}>Issued</th>
                                                                            <th style={{ padding: '0.5rem', textAlign: 'right' }}>Balance</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {batch.boxes.map((bx, idx) => {
                                                                            const isCf = bx.isCarriedForward;
                                                                            const displayCones = isCf ? bx.openingStockCones : bx.cones;
                                                                            const displayWeight = isCf ? bx.openingStockKg : bx.totalWeight;
                                                                            const displayGrCones = isCf ? 0 : bx.grCones;
                                                                            const displayGrWeight = isCf ? 0 : bx.grWeight;
                                                                            
                                                                            const remainingCones = displayCones - displayGrCones - (parseInt(bx.issuedCones) || 0);
                                                                            const remainingKg = displayWeight - displayGrWeight - (parseFloat(bx.issuedKg) || 0);

                                                                            return (
                                                                                <tr key={idx} className="clickable-row" onClick={() => {
                                                                                    setSelectedTreeNode({
                                                                                        id: `box-${batch.id}-${bx.boxNumber}`,
                                                                                        name: `Box ${bx.boxNumber}`,
                                                                                        type: 'box',
                                                                                        details: bx,
                                                                                        parentItem: item
                                                                                    });
                                                                                }}>
                                                                                    <td style={{ padding: '0.5rem' }}>
                                                                                        <strong>{bx.boxNumber}</strong>
                                                                                    </td>
                                                                                    <td style={{ padding: '0.5rem', textAlign: 'right' }} className="font-mono">
                                                                                        {displayWeight.toFixed(1)} kg
                                                                                    </td>
                                                                                    <td style={{ padding: '0.5rem', textAlign: 'right' }} className="font-mono">
                                                                                        {(bx.issuedKg || 0).toFixed(1)} kg
                                                                                    </td>
                                                                                    <td style={{ padding: '0.5rem', textAlign: 'right' }} className="font-mono" style={{ color: 'var(--success)' }}>
                                                                                        {remainingKg.toFixed(1)} kg
                                                                                    </td>
                                                                                </tr>
                                                                            );
                                                                        })}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    </div>

                                            <th>Color</th>
                                            <th className="in-col">In cones</th>
                                            <th className="in-col">In weight(Kg)</th>
                                            <th style={{color: 'var(--error)'}}>Gr cones (calculated)</th>
                                            <th style={{color: 'var(--error)'}}>Gr weight(Kg) (calculated)</th>
                                            <th style={{color: 'var(--accent)'}}>Net weight</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            const challanMap = new Map();
                                            for (const item of inventory) {
                                                if (!item.boxes) continue;
                                                for (const box of item.boxes) {
                                                    const challanKey = `${box.challan || box.challanNumber}_${box.lotNumber}_${item.company}_${item.quality}_${item.code}_${item.color}`;
                                                    if (!challanMap.has(challanKey)) {
                                                        challanMap.set(challanKey, {
                                                            challanId: box.challanId || box.challan,
                                                            date: box.arrivalDate || item.date,
                                                            challanNumber: box.challan || box.challanNumber,
                                                            lotNumber: box.lotNumber,
                                                            quality: item.quality,
                                                            code: item.code,
                                                            color: item.color,
                                                            supplier: item.company || '—',
                                                            totalCones: 0,
                                                            totalKg: 0,
                                                            totalGrCones: 0,
                                                            totalGrWeight: 0,
                                                            item: item
                                                        });
                                                    }
                                                    const entry = challanMap.get(challanKey);
                                                    const inCones = parseInt(box.cones) || 0;
                                                    const inKg = parseFloat(box.totalWeight) || 0;
                                                    const rawGrWeight = parseFloat(box.returnedWeight) || 0;
                                                    const grCones = (rawGrWeight && inKg && inCones) ? Math.round(rawGrWeight / (inKg / inCones)) : 0;
                                                    const grWeight = grCones * (inCones > 0 ? (inKg / inCones) : 0);

                                                    entry.totalCones += inCones;
                                                    entry.totalKg += inKg;
                                                    entry.totalGrCones += grCones;
                                                    entry.totalGrWeight += grWeight;
                                                }
                                            }
                                            const historyRows = Array.from(challanMap.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
                                            return historyRows.map((row, idx) => {
                                                const navToChallanBoxes = () => {
                                                    setSelectedItem(row.item);
                                                    setSelectedChallan({
                                                        challanNumber: row.challanNumber,
                                                        challanId: row.challanId,
                                                        arrivalDate: row.date,
                                                        lotNumber: row.lotNumber,
                                                        quality: row.quality,
                                                        code: row.code,
                                                        color: row.color
                                                    });
                                                    setActiveTab('challan-detail');
                                                };
                                                return (
                                                    <tr key={idx} className="clickable-row" onClick={navToChallanBoxes} title="Click to view challan boxes">
                                                        <td>{formatDate(row.date)}</td>
                                                        <td>{row.supplier}</td>
                                                        <td>{row.quality}</td>
                                                        <td>{row.code}</td>
                                                        <td>{row.color}</td>
                                                        <td style={{color: 'var(--accent)', fontWeight: '500'}}>{row.totalCones || '—'}</td>
                                                        <td style={{color: 'var(--accent)', fontWeight: '500'}}>{row.totalKg ? row.totalKg.toFixed(3) : '—'}</td>
                                                        <td style={{color: 'var(--error)'}}>{row.totalGrCones || '0'}</td>
                                                        <td style={{color: 'var(--error)'}}>{row.totalGrWeight ? row.totalGrWeight.toFixed(3) : '0.000'}</td>
                                                        <td style={{color: 'var(--accent)', fontWeight: '700'}}>{(row.totalKg - row.totalGrWeight).toFixed(3)} kg</td>
                                                    </tr>
                                                );
                                            });
                                        })()}
                                    </tbody>
                                </table>
                            </div>
                        </main>
                    )}
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            console.error('Render error:', err);
            window.onerror('React Render Error: ' + err.message, '', 0, 0, err);
        }
    </script>

        document.head.appendChild(style);

        // 2. Inject HTML Widget
        const widgetHtml = `

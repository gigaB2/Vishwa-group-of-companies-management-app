    <meta charset="UTF-8">

    <title>RM Weft Stock Book</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg:      #f8f7fc;
            --surface: #ffffff;
            --fg:      #1a1a2e;
            --muted:   #8b8fa3;
            --border:  #e8e7f1;
            --accent:  #8b5cf6;
            --accent2: #ec4899;
            --accent3: #f97316;
            --error:   #ef4444;
            --success: #10b981;

            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

            --radius: 16px;
            --container: 1450px;

            --shadow-sm:  0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md:  0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg:  0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-xl:  0 16px 48px rgba(0, 0, 0, 0.12);

            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
            --transition-slow: 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 4px;
            border: 2px solid var(--bg);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
        }

        body {
            background: linear-gradient(135deg, #f8f7fc 0%, #faf5ff 50%, #f0f4ff 100%);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .dark-mode body {
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #0f0f1a 100%);
            --bg:      #000000;
            --surface: #0a0a0a;
            --fg:      #ffffff;
            --muted:   #a1a1aa;
            --border:  #27272a;
            --card-bg: #18181b;
            --accent:  #7c3aed;
            --accent2: #a855f7;
            --accent3: #f97316;
            --error:   #ef4444;
            --success: #10b981;
            --accent-light: rgba(124, 58, 237, 0.15);
        }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        h1 { font-size: 2rem; }
        h2 { font-size: 1.4rem; }
        h3 { font-size: 1.1rem; }
        h4 { font-size: 1rem; }

        .app-container {
            display: flex;
            flex-direction: column;
            max-width: var(--container);
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }
            
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1.5rem 0;
            }
            
            .nav-tabs {
                width: 100%;
                margin-top: 1rem;
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 0 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            opacity: 0.5;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            cursor: default;
            transition: transform var(--transition-base);
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .nav-tabs {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
            position: relative;
        }

        .nav-tab {
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.65rem 1.25rem;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            background: transparent;
            border: none;
            border-radius: 8px;
            transition: all var(--transition-base);
            white-space: nowrap;
            font-family: var(--font-body);
            position: relative;
            overflow: hidden;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left var(--transition-slow);
        }

        .nav-tab:hover::before {
            left: 100%;
        }

        .nav-tab:hover {
            color: var(--accent);
            background: rgba(139, 92, 246, 0.08);
            transform: translateY(-1px);
        }

        .nav-tab.active {
            color: var(--accent);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(236, 72, 153, 0.06));
            border-bottom-color: var(--accent);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.15);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            border-color: rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card.gradient-purple {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(139, 92, 246, 0.02));
            border-color: rgba(139, 92, 246, 0.25);
        }

        .stat-card.gradient-pink {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.08), rgba(236, 72, 153, 0.02));
            border-color: rgba(236, 72, 153, 0.25);
        }

        .stat-card.gradient-orange {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.08), rgba(249, 115, 22, 0.02));
            border-color: rgba(249, 115, 22, 0.25);
        }

        .stat-card h4 {
            font-family: var(--font-body);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .stat-card .value {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .table-container {
            width: 100%;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            position: relative;
        }

        .table-container::-webkit-scrollbar {
            height: 10px;
        }
        .table-container::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 5px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .table-container table {
            width: 100%;
        }

        .table-container tr {
            display: flex;
            width: 100%;
        }

        .table-container th,
        .table-container td {
            flex: 1;
            min-width: 0;
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 0.4rem !important;
            font-size: 0.8rem !important;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 1.1rem 1rem;
            border-bottom: 1.5px solid var(--border);
            font-family: var(--font-body);
            font-weight: 600;
            color: var(--fg);
            background: linear-gradient(to bottom, rgba(139, 92, 246, 0.04), transparent);
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            white-space: normal;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            transition: background-color var(--transition-fast);
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
            max-width: 300px;
            overflow: hidden;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background: rgba(139, 92, 246, 0.04) !important;
        }

        .tag {
            display: inline-block;
            padding: 0.35rem 0.8rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(236, 72, 153, 0.06));
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            font-weight: 600;
            transition: all var(--transition-base);
        }

        .tag:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--fg);
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: var(--font-body);
            color: var(--fg);
            outline: none;
            transition: all var(--transition-base);
            font-size: 0.95rem;
        }

        input:hover, select:hover, textarea:hover {
            border-color: rgba(139, 92, 246, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            background: rgba(139, 92, 246, 0.02);
        }

        button {
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left var(--transition-slow);
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .search-bar > div {
            flex: 1;
        }

        .success-toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
            backdrop-filter: blur(10px);
        }

        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translate(-50%, 0); }
            to { opacity: 0; transform: translate(-50%, -20px); }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .csv-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            margin: 1rem 0;
        }

        .csv-summary {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .subtle-button {
            background: var(--surface) !important;
            color: var(--fg) !important;
            border: 1.5px solid var(--border) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        .subtle-button:hover {
            border-color: var(--accent) !important;
            background: rgba(139, 92, 246, 0.05) !important;
            transform: translateY(-1px);
        }

        .danger-button {
            background: var(--surface) !important;
            color: var(--fg) !important;
            border: 1.5px solid var(--border) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        .danger-button:hover {
            border-color: var(--error) !important;
            background: rgba(239, 68, 68, 0.05) !important;
            transform: translateY(-1px);
        }

        .mini-button {
            padding: 0.5rem 1rem !important;
            font-size: 0.85rem !important;
            border-radius: 8px !important;
            box-shadow: var(--shadow-sm) !important;
            transition: all var(--transition-fast) !important;
        }

        .mini-button:hover {
            transform: translateY(-1px);
        }

        .error-note {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.05);
            border-left: 3px solid var(--error);
            border-radius: 6px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .csv-input {
            min-width: 90px;
            padding: 0.45rem 0.5rem;
            border-color: transparent;
            background: transparent;
        }

        .csv-input:focus {
            background: var(--surface);
            border-color: var(--accent);
        }

        .csv-details-input {
            min-width: 100px;
        }



        .clickable-row {
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .clickable-row:hover td {
            background: rgba(139, 92, 246, 0.07) !important;
        }

        .clickable-row:active td {
            background: rgba(139, 92, 246, 0.12) !important;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            gap: 1.5rem;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .detail-title {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 0.95;
        }

        .movement-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .movement-summary .card {
            margin-bottom: 0;
        }

        .movement-table th.in-col,
        .movement-table td.in-col {
            background: color-mix(in oklch, var(--bg) 68%, var(--surface));
        }

        .movement-table th.out-col,
        .movement-table td.out-col {
            background: color-mix(in oklch, var(--accent) 6%, var(--surface));
        }

        .movement-table th.remaining-col,
        .movement-table td.remaining-col {
            background: color-mix(in oklch, var(--fg) 4%, var(--surface));
            font-weight: 600;
        }

        /* Hover & Active Overrides for specific cell hues to show uniform row highlight */
        tr:hover td.in-col,
        tr:hover td.out-col,
        tr:hover td.remaining-col {
            background: rgba(139, 92, 246, 0.04) !important;
        }
        .clickable-row:hover td.in-col,
        .clickable-row:hover td.out-col,
        .clickable-row:hover td.remaining-col {
            background: rgba(139, 92, 246, 0.07) !important;
        }
        .clickable-row:active td.in-col,
        .clickable-row:active td.out-col,
        .clickable-row:active td.remaining-col {
            background: rgba(139, 92, 246, 0.12) !important;
        }

        .app-container.dark-mode tr:hover td.in-col,
        .app-container.dark-mode tr:hover td.out-col,
        .app-container.dark-mode tr:hover td.remaining-col {
            background: rgba(124, 58, 237, 0.12) !important;
        }
        .app-container.dark-mode .clickable-row:hover td.in-col,
        .app-container.dark-mode .clickable-row:hover td.out-col,
        .app-container.dark-mode .clickable-row:hover td.remaining-col {
            background: rgba(124, 58, 237, 0.18) !important;
        }
        .app-container.dark-mode .clickable-row:active td.in-col,
        .app-container.dark-mode .clickable-row:active td.out-col,
        .app-container.dark-mode .clickable-row:active td.remaining-col {
            background: rgba(124, 58, 237, 0.26) !important;
        }

        .link-button {
            background: none;
            color: var(--fg);
            border: 0;
            border-bottom: 1px solid var(--accent);
            padding: 0;
            font-family: var(--font-body);
            font-size: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
        }

        .link-button::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent2);
            transition: width var(--transition-base);
        }

        .link-button:hover {

    <script type="text/babel">
        const getFinancialYearForDate = (dateStr) => {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return null;
            const year = date.getFullYear();
            const month = date.getMonth();
            if (month >= 3) {
                return `${year}-${(year + 1).toString().slice(-2)}`;
            } else {
                return `${year - 1}-${year.toString().slice(-2)}`;
            }
        };

        const getFYDateRange = (fy) => {
            if (!fy || fy === 'All') return { start: null, end: null };
            const parts = fy.split('-');
            const startYear = parseInt(parts[0]);
            return {
                start: `${startYear}-04-01`,
                end: `${startYear + 1}-03-31`
            };
        };

        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SearchableDropdown = ({ options = [], value, onChange, placeholder, label, showEmpty = true, emptyLabel = "-- Select --", className = "" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                        setSearch('');
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filteredOptions = options.filter(opt => {
                const searchStr = typeof opt === 'object' ? opt.label : opt;
                return (searchStr || '').toString().toLowerCase().includes(search.toLowerCase());
            });

            const getDisplayValue = () => {
                if (isOpen) return search;
                const found = options.find(o => (o && typeof o === 'object' ? o.value : o) === value);
                if (found && typeof found === 'object') return found.label;
                return found || value || '';
            };

            return (
                <div className="input-group" style={{ marginBottom: 0, position: 'relative', zIndex: isOpen ? 1001 : 1 }} ref={dropdownRef}>
                    {label && <label>{label}</label>}
                    <div className="select-input-wrapper" onClick={() => setIsOpen(!isOpen)}>
                        <input 
                            type="text" 
                            placeholder={placeholder} 
                            value={getDisplayValue()}
                            onChange={(e) => {
                                if (!isOpen) setIsOpen(true);
                                setSearch(e.target.value);
                            }}
                            onClick={(e) => e.stopPropagation()}
                            onFocus={() => {
                                setIsOpen(true);
                                setSearch('');
                            }}
                            autoComplete="off"
                            className={className}
                            style={{ cursor: 'text', ...(className ? {} : { borderRadius: '16px', padding: '1rem 1.5rem' }) }}
                        />
                        <i>{isOpen ? '▴' : '▾'}</i>
                    </div>

                    {isOpen && (
                        <div className="dropdown-list">
                            {showEmpty && (
                                <div 
                                    className={`dropdown-item ${!value ? 'selected' : ''}`}
                                    onClick={() => {
                                        onChange('');
                                        setIsOpen(false);
                                        setSearch('');
                                    }}
                                >
                                    {emptyLabel}
                                </div>
                            )}
                            {filteredOptions.map((opt, idx) => {
                                const optValue = typeof opt === 'object' ? opt.value : opt;
                                const optLabel = typeof opt === 'object' ? opt.label : opt;
                                return (
                                    <div 
                                        key={`${optValue}-${idx}`}
                                        className={`dropdown-item ${value === optValue ? 'selected' : ''}`}
                                        onClick={() => {
                                            onChange(optValue);
                                            setIsOpen(false);
                                            setSearch('');
                                        }}
                                    >
                                        {optLabel}
                                    </div>
                                );
                            })}
                            {filteredOptions.length === 0 && (
                                <div className="dropdown-empty">No options found</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Custom Hook for LocalStorage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    if (!item) return initialValue;
                    try {
                        const parsed = JSON.parse(item);
                        if (Array.isArray(initialValue) && !Array.isArray(parsed)) {
                            return initialValue;
                        }
                        return parsed;
                    } catch (e) {
                        if (Array.isArray(initialValue)) {
                            return initialValue;
                        }
                        return item;
                    }
                } catch (error) {
                    console.log(error);
                    return initialValue;
                }
            });

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === key) {
                        try {
                            const item = window.localStorage.getItem(key);
                            if (!item) {
                                setStoredValue(initialValue);
                            } else {
                                try {
                                    const parsed = JSON.parse(item);
                                    if (Array.isArray(initialValue) && !Array.isArray(parsed)) {
                                        setStoredValue(initialValue);
                                    } else {
                                        setStoredValue(parsed);
                                    }
                                } catch (e) {
                                    if (Array.isArray(initialValue)) {
                                        setStoredValue(initialValue);
                                    } else {
                                        setStoredValue(item);
                                    }
                                }
                            }
                        } catch (error) {
                            console.error('Error parsing storage change:', error);
                        }
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [key, initialValue]);

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.log(error);
                }
            };

            return [storedValue, setValue];
        }

        // Helper to process RM Order Book data into Stock Book format
        function processData(orders, qualities, issues, selectedFY) {
            const inventoryMap = new Map();
            const { start, end } = getFYDateRange(selectedFY);

            // Filter for Weft orders only
            const weftOrders = (orders || []).filter(o => o.type && o.type.trim().toLowerCase() === 'weft');

            // Add boxes from weft orders (challans/batches)
            for (const order of weftOrders) {
                const key = `${order.quality}|${order.supplier}|${order.code}|${order.color}`;
                
                let orderHasVisibleBox = false;
                const tempBoxes = [];

                for (const batch of (order.batches || [])) {
                    for (const box of (batch.boxes || [])) {
                        const arrivalDate = batch.receiveDate || order.orderDate || (order.createdAt ? order.createdAt.split('T')[0] : '');
                        
                        // If it's a future year box, skip it
                        if (end && arrivalDate > end) continue;

                        const weight = parseFloat(box.weight) || 0;
                        const rawReturnedWeight = parseFloat(box.returnedWeight) || 0;
                        const inCones = parseInt(box.cones) || 0;
                        const grCones = (rawReturnedWeight && weight && inCones) ? Math.round(rawReturnedWeight / (weight / inCones)) : 0;
                        const kgPerCone = inCones > 0 ? weight / inCones : 0;
                        const grWeight = grCones * kgPerCone;
                        const inKg = weight - grWeight;

                        let isCarriedForward = false;
                        let openingStockKg = inKg;
                        let openingStockCones = inCones - grCones;

                        // If it arrived in a previous year, calculate opening stock
                        if (start && arrivalDate < start) {
                            isCarriedForward = true;
                            const boxIssuesBefore = (issues || []).filter(i => 
                                i.quality === order.quality && 
                                (!i.supplier || i.supplier === order.supplier) &&
                                i.code === order.code && 
                                i.box === box.boxNumber &&
                                i.challan === batch.challanNumber &&
                                i.date < start
                            );
                            const issuedKgBefore = boxIssuesBefore.reduce((s, i) => s + (parseFloat(i.net) || 0), 0);
                            const issuedConesBefore = boxIssuesBefore.reduce((s, i) => s + (parseInt(i.cones) || 0), 0);

                            openingStockKg = Math.max(0, inKg - issuedKgBefore);
                            openingStockCones = Math.max(0, inCones - grCones - issuedConesBefore);

                            // If opening stock is zero, it's fully consumed. Don't carry it forward.
                            if (openingStockKg <= 0 && openingStockCones <= 0) continue;
                        }

                        orderHasVisibleBox = true;

                        tempBoxes.push({
                            id: `${batch.id}-${box.boxNumber}`,
                            boxNumber: box.boxNumber,
                            lotNumber: batch.lotNumber,
                            cones: inCones,
                            totalWeight: weight,
                            returnedWeight: rawReturnedWeight,
                            grCones: grCones,
                            grWeight: grWeight,
                            returnedDate: box.returnedDate,
                            stock: inKg,
                            challan: batch.challanNumber,
                            challanId: batch.id,
                            orderId: order.id,
                            arrivalDate: batch.receiveDate,
                            isCarriedForward,
                            openingStockKg,
                            openingStockCones,
                            issues: []
                        });
                    }
                }

                if (orderHasVisibleBox) {
                    if (!inventoryMap.has(key)) {
                        inventoryMap.set(key, {
                            id: order.id,
                            quality: order.quality,
                            company: order.supplier,
                            code: order.code,
                            color: order.color,
                            lastArrivalDate: order.orderDate || (order.createdAt ? order.createdAt.split('T')[0] : ''),
                            cones: 0,
                            stock: 0,
                            totalGrCones: 0,
                            totalGrWeight: 0,
                            boxes: []
                        });
                    }
                    const item = inventoryMap.get(key);
                    const currentOrderDate = order.orderDate || (order.createdAt ? order.createdAt.split('T')[0] : '');
                    if (currentOrderDate > item.lastArrivalDate) {
                        item.lastArrivalDate = currentOrderDate;
                    }
                    
                    for (const tb of tempBoxes) {
                        item.boxes.push(tb);
                        item.cones += tb.isCarriedForward ? tb.openingStockCones : (tb.cones - tb.grCones);
                        item.stock += tb.isCarriedForward ? tb.openingStockKg : tb.stock;
                        item.totalGrCones += tb.isCarriedForward ? 0 : tb.grCones;
                        item.totalGrWeight += tb.isCarriedForward ? 0 : tb.grWeight;
                    }
                }
            }

            // Link issues and calculate remaining amounts
            for (const item of inventoryMap.values()) {
                let itemIssuedKg = 0;
                let itemIssuedCones = 0;

                for (const box of item.boxes) {
                    box.issues = (issues || []).filter(i => 
                        i.quality === item.quality && 
                        (!i.supplier || i.supplier === item.company) &&
                        i.code === item.code && 
                        i.box === box.boxNumber &&
                        i.challan === box.challan &&
                        (!start || i.date >= start) &&
                        (!end || i.date <= end)
                    );
                    
                    const boxIssuedKg = box.issues.reduce((s, i) => s + (parseFloat(i.net) || 0), 0);
                    const boxIssuedCones = box.issues.reduce((s, i) => s + (parseInt(i.cones) || 0), 0);
                    
                    box.issuedKg = boxIssuedKg;
                    box.issuedCones = boxIssuedCones;
                    box.remainingKg = box.openingStockKg - boxIssuedKg;
                    box.remainingCones = box.openingStockCones - boxIssuedCones;

                    itemIssuedKg += boxIssuedKg;
                    itemIssuedCones += boxIssuedCones;
                }
                
                item.issuedKg = itemIssuedKg;
                item.issuedCones = itemIssuedCones;
                item.remainingKg = item.stock - itemIssuedKg;
                item.remainingCones = item.cones - itemIssuedCones;
            }

            return Array.from(inventoryMap.values());
        }

        // Zoom-Pan Container component for Tree View
        const TreeZoomPan = ({ children }) => {
            const [scale, setScale] = useState(1);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const containerRef = useRef(null);

            const handleMouseDown = (e) => {
                if (e.target.closest('.tree-node-card') || e.target.closest('button')) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - position.x, y: e.clientY - position.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setPosition({
                    x: e.clientX - dragStart.x,
                    y: e.clientY - dragStart.y
                });
            };

            const handleMouseUp = () => {
                setIsDragging(false);
            };

            const zoomIn = () => setScale(prev => Math.min(prev + 0.1, 1.6));
            const zoomOut = () => setScale(prev => Math.max(prev - 0.1, 0.4));
            const reset = () => {
                setScale(1);
                setPosition({ x: 0, y: 0 });
            };

            const handleWheel = useCallback((e) => {
                e.preventDefault();
                const zoomFactor = e.deltaY < 0 ? 1.08 : 0.92;
                setScale(prev => Math.min(Math.max(prev * zoomFactor, 0.4), 2.0));
            }, []);

            useEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                el.addEventListener('wheel', handleWheel, { passive: false });
                return () => el.removeEventListener('wheel', handleWheel);
            }, [handleWheel]);

            return (
                <div 
                    ref={containerRef}
                    className="tree-zoom-pan-container"
                    onMouseDown={handleMouseDown}
                    onMouseMove={handleMouseMove}
                    onMouseUp={handleMouseUp}
                    onMouseLeave={handleMouseUp}
                    style={{ 
                        cursor: isDragging ? 'grabbing' : 'grab',
                        overflow: 'hidden',
                        position: 'relative'
                    }}
                >
                    <div className="zoom-controls" style={{
                        position: 'absolute',
                        bottom: '20px',
                        right: '20px',
                        zIndex: 10
                    }}>
                        <button type="button" onClick={zoomIn} className="zoom-btn">+</button>
                        <button type="button" onClick={zoomOut} className="zoom-btn">-</button>
                        <button type="button" onClick={reset} className="zoom-btn">Reset</button>
                    </div>

                    <div style={{
                        position: 'absolute',
                        top: '20px',
                        left: '20px',
                        zIndex: 10,
                        color: 'var(--muted)',
                        fontSize: '0.8rem',
                        pointerEvents: 'none',
                        background: 'var(--surface)',
                        border: '1px solid var(--border)',
                        padding: '4px 8px',
                        borderRadius: '6px'
                    }}>
                        🖱️ Scroll to Zoom | Drag background to Pan | Click nodes for details
                    </div>

                    <div 
                        style={{
                            transform: `translate(${position.x}px, ${position.y}px) scale(${scale})`,
                            transformOrigin: '0 0',
                            transition: isDragging ? 'none' : 'transform 0.25s cubic-bezier(0.32, 0.72, 0, 1)',
                            display: 'inline-block',
                            padding: '60px',
                            minWidth: '100%',
                            minHeight: '100%'
                        }}
                    >
                        {children}
                    </div>
                </div>
            );

                                                                                                        <div className="mindmap-tag" style={{ color: statusColor }}>{boxStatus}</div>
                                                                                                        <div className="mindmap-title">Box {box.boxNumber}</div>
                                                                                                        <div className="mindmap-desc font-mono">
                                                                                                            Bal: <strong>{remKg.toFixed(1)} / {parseFloat(displayWeight).toFixed(1)} kg</strong>
                                                                                                        </div>
                                                                                                        <div className="mindmap-desc font-mono">
                                                                                                            Cones: <strong>{remCones} / {displayCones}</strong>
                                                                                                        </div>
                                                                                                    </div>
                                                                                                    <div 
                                                                                                        className="mindmap-bar level-box" 
                                                                                                        style={{ background: statusColor }} 
                                                                                                        data-node-id={boxKey}

                                                                                                    />
                                                                                                </div>
                                                                                            </div>
                                                                                        );
